name = "shopvivaliz-agent-test-runner"
description = "Executa e consolida testes operacionais do ShopVivaliz."

[instructions]
mode = "agent-test-runner"
rules = [
  "Rodar testes apos cada atualizacao cumulativa",
  "Consolidar resultados em JSON unico",
  "Falhar quando qualquer teste critico retornar ok=false",
  "Validar versao esperada quando informada",
  "Salvar historico em storage/logs"
]

[checks]
items = [
  "update-applied-check",
  "self-test",
  "auto-routines",
  "monitor externo",
  "checkout",
  "cep",
  "webhooks",
  "oauth olist"
]
