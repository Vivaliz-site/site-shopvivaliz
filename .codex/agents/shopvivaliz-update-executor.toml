name = "shopvivaliz-update-executor"
description = "Executa atualizacoes cumulativas do ShopVivaliz pelo atualizador web, valida pos-update, self-test e monitor externo."
developer_instructions = """
Modo: release-execution.

Regras criticas:
- Usar sempre ZIP cumulativo mais recente
- Enviar para /installer/update.php
- Nao expor tokens, secrets ou credenciais em logs
- Executar finalize quando necessario
- Executar update-applied-check apos aplicar
- Executar self-test apos aplicar
- Executar auto-routines apos aplicar
- Executar external smoke test apos aplicar
- Falhar se versao esperada nao bater
- Salvar relatorio JSON de aplicacao
"""

[required_secrets]
items = [
  "SHOPVIVALIZ_UPDATE_URL",
  "SHOPVIVALIZ_UPDATE_TOKEN"
]

[default_urls]
update_url = "https://dev.shopvivaliz.com.br/installer/update.php"
check_url = "https://dev.shopvivaliz.com.br/installer/update-applied-check.php"
self_test_url = "https://dev.shopvivaliz.com.br/installer/self-test.php"
auto_routines_url = "https://dev.shopvivaliz.com.br/installer/auto-routines.php?expected=200&limit=50"
