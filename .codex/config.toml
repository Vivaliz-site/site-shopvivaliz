approval_policy = "never"
sandbox_mode = "danger-full-access"
permission_profile = ":danger-full-access"
approvals_reviewer = "user"
model_verbosity = "low"
model_reasoning_effort = "high"
personality = "friendly"
web_search = "live"

[sandbox_workspace_write]
network_access = true

project = "ShopVivaliz"
default_agent = "shopvivaliz-release"

[context]
language = "pt-BR"
stack = "PHP 8.3, MySQL 5.7, JavaScript, CSS"
site_dev = "https://dev.shopvivaliz.com.br"
release_policy = "cumulative"

[quality]
require_php_lint = true
require_zip_integrity = true
require_self_test = true
require_no_secrets = true

[features]
apps = true
goals = true
hooks = true
multi_agent = true
personality = true
remote_plugin = true
shell_tool = true
unified_exec = true

[mcp_servers.codex_bridge]
command = "python"
args = ["scripts/codex-mesh-bridge.py"]
enabled = true
required = true
startup_timeout_sec = 30
tool_timeout_sec = 120
default_tools_approval_mode = "prompt"

[paths]
app = "app"
admin = "admin"
api = "api"
installer = "installer"
database = "database"
docs = "docs"
tools = "tools"
