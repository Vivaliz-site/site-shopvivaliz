approval_policy = "never"
sandbox_mode = "danger-full-access"
permission_profile = ":danger-full-access"
approvals_reviewer = "user"
model_verbosity = "low"
model_reasoning_effort = "low"

[sandbox_workspace_write]
network_access = true

project = "ShopVivaliz"
default_agent = "shopvivaliz-release"

[context]
language = "pt-BR"
stack = "PHP 8.3, MySQL 5.7, JavaScript, CSS"
site_dev = "https://dev.shopvivaliz.com.br"
release_policy = "cumulative"

[quality]
require_php_lint = true
require_zip_integrity = true
require_self_test = true
require_no_secrets = true

[paths]
app = "app"
admin = "admin"
api = "api"
installer = "installer"
database = "database"
docs = "docs"
tools = "tools"
