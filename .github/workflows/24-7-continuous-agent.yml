name: PAUSADO - 24-7 Continuous Agent (substituido por autonomous-watchdog.yml)
# 2026-07-18: autonomous-watchdog.yml ja documentava desde 2026-07-10 que este
# workflow deveria estar pausado (chamava o mesmo endpoint api/agent/autonomous-watchdog.php
# em paralelo, a cada 5min, duplicando o watchdog canonico). O comentario existia mas o
# schedule nunca tinha sido removido de fato -- corrigido agora. Rodar apenas manualmente.

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: 'Quantidade de ciclos seguros do watchdog'
        required: false
        default: '1'

permissions:
  contents: read

concurrency:
  group: continuous-agent-24-7
  cancel-in-progress: true

env:
  SHOPVIVALIZ_BASE_URL: https://dev.shopvivaliz.com.br

jobs:
  verify-resident-agent:
    name: Validar agente residente 24/7
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Coletar relatorio autonomo
        shell: bash
        run: |
          mkdir -p reports
          HTTP_CODE=$(curl -sS -L \
            --max-time 60 \
            --retry 2 \
            --retry-delay 5 \
            --retry-all-errors \
            -H "Accept: application/json" \
            -o reports/continuous-agent-report.json \
            -w "%{http_code}" \
            "${SHOPVIVALIZ_BASE_URL%/}/api/agent/autonomous-report.php")

          echo "HTTP_CODE=$HTTP_CODE"
          cat reports/continuous-agent-report.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Relatorio autonomo retornou HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Validar agente residente recente
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("reports/continuous-agent-report.json").read_text(encoding="utf-8"))
          cycle = payload.get("autonomous_cycle", {})
          if payload.get("agent") != "autonomous-report":
              raise SystemExit("Resposta inesperada do relatorio autonomo")
          if not cycle.get("available"):
              raise SystemExit("Sem ciclo autonomo registrado")
          age = cycle.get("file_age_s")
          if age is None or int(age) > 3600:
              raise SystemExit(f"Ciclo autonomo desatualizado: {age}")
          print("Agente residente OK:", cycle.get("last_cycle_at", "sem-data"))
          PY
