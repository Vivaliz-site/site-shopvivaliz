name: 24/7 Agentes Continuos - Processamento Automtico

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  execute-tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install google-generativeai anthropic openai

      - name: Configurar Git
        run: |
          git config user.name "Agentes ShopVivaliz"
          git config user.email "agentes@shopvivaliz.com.br"

      - name: Executar executor de tarefas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "[$(date +'%H:%M:%S')] Iniciando ciclo de tarefas..."
          python3 scripts/real-task-executor.py
          echo "[$(date +'%H:%M:%S')] Ciclo concluido!"

      - name: Commitar progresso
        continue-on-error: true
        run: |
          git add -A tasks-queue.json logs/execution/
          git commit -m "feat: agentes executaram tarefas [$(date +'%H:%M:%S')]" || true
          git push || true

  verify-status:
    needs: execute-tasks
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Verificar status da fila
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path

          queue_file = Path('tasks-queue.json')
          if not queue_file.exists():
              print("Fila de tarefas nao encontrada!")
              exit(1)

          with open(queue_file) as f:
              data = json.load(f)

          tasks = data.get('queue', [])
          completed = [t for t in tasks if t['status'] == 'completed']
          pending = [t for t in tasks if t['status'] == 'pending']

          total = len(tasks)
          completed_count = len(completed)
          pending_count = len(pending)
          progress = (completed_count / total * 100) if total > 0 else 0

          print(f"\n{'='*50}")
          print(f"STATUS DA FILA DE TAREFAS")
          print(f"{'='*50}")
          print(f"Total:       {total}")
          print(f"Completadas: {completed_count} ({progress:.1f}%)")
          print(f"Pendentes:   {pending_count}")
          print(f"{'='*50}\n")
          EOF
