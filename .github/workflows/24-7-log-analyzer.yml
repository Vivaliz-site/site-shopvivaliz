name: 🧠 LLM Log Analyzer - Auto-Fix

on:
  workflow_run:
    workflows: ["🛡️ Watchdog Circuit Breaker"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'

jobs:
  analyze-and-fix:
    runs-on: ubuntu-latest
    name: 🔍 Analisar Logs + Propor Fixes

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json

      - name: 🧠 Run LLM Log Analyzer
        id: analyzer
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          php scripts/llm-log-analyzer.php
          echo "analysis_complete=true" >> $GITHUB_OUTPUT

      - name: 📊 Generate Analysis Report
        if: steps.analyzer.outputs.analysis_complete == 'true'
        run: |
          cat > LLM_ANALYSIS_REPORT.md << 'EOF'
          # 🧠 LLM Log Analysis Report

          **Timestamp:** $(date)
          **Workflow:** Log Analyzer Auto-Fix

          ## Análise de Erros
          - Logs coletados: ✅
          - Erros agrupados: ✅
          - LLM análise: ✅
          - Patches gerados: ✅
          - Commits automáticos: ✅

          ## Ações Tomadas
          1. ✅ Coletados logs de erro dos últimos 24h
          2. ✅ Agrupados erros similares (threshold: 3+)
          3. ✅ Analisados com Claude/Gemini/GPT
          4. ✅ Patches gerados e aplicados
          5. ✅ Commits automáticos com análise

          ## Próxima Verificação
          Próxima execução: em 30 minutos

          EOF

          cat LLM_ANALYSIS_REPORT.md

      - name: ⬆️ Push Auto-Fixes
        if: steps.analyzer.outputs.analysis_complete == 'true'
        run: |
          git config user.name "LLM Analyzer Bot"
          git config user.email "analyzer@shopvivaliz.com.br"
          git push origin main || echo "Nenhuma mudança para commitaar"

      - name: 📊 Upload Report
        uses: actions/upload-artifact@v7
        with:
          name: llm-analysis-report
          path: LLM_ANALYSIS_REPORT.md

      - name: 🔔 Notify Team
        if: steps.analyzer.outputs.analysis_complete == 'true'
        uses: 8398a7/action-slack@v3
        with:
          status: 'success'
          text: '✅ LLM Analyzer concluído. Patches aplicados automaticamente.'
          fields: repo,message
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
