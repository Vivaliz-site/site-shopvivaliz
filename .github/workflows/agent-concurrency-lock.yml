name: 🔒 Agent Concurrency Lock - Previne Race Conditions

on:
  workflow_call:
    inputs:
      agent_id:
        required: true
        type: string
        description: 'ID do agente (claude, gemini, openai)'
      resource_file:
        required: true
        type: string
        description: 'Arquivo que será modificado'

jobs:
  acquire-lock:
    runs-on: ubuntu-latest
    outputs:
      lock_acquired: ${{ steps.acquire.outputs.success }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🔒 Adquirir Lock Exclusivo
        id: acquire
        run: |
          LOCK_FILE=".agent-locks/${{ hashFiles(inputs.resource_file) }}.lock"
          mkdir -p .agent-locks
          
          if [ -f "$LOCK_FILE" ]; then
            LOCK_AGE=$(( $(date +%s) - $(stat -c %Y "$LOCK_FILE") ))
            if [ $LOCK_AGE -gt 300 ]; then
              echo "🔓 Lock expirado, removendo..."
              rm "$LOCK_FILE"
            else
              echo "🚫 Lock ativo por: ${{ inputs.agent_id }}"
              echo "success=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          
          echo "🔒 Criando lock para ${{ inputs.agent_id }}"
          echo "agent_id: ${{ inputs.agent_id }}" > "$LOCK_FILE"
          echo "timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$LOCK_FILE"
          echo "pid: $$" >> "$LOCK_FILE"
          
          echo "success=true" >> $GITHUB_OUTPUT
          cat "$LOCK_FILE"

      - name: 📤 Upload Lock
        if: steps.acquire.outputs.success == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: agent-lock-${{ inputs.agent_id }}
          path: .agent-locks/
          retention-days: 1

  release-lock:
    runs-on: ubuntu-latest
    needs: acquire-lock
    if: needs.acquire-lock.outputs.lock_acquired == 'true'
    steps:
      - name: 🔓 Liberar Lock
        run: |
          echo "🔓 Liberando lock para ${{ inputs.agent_id }}"
          rm -f ".agent-locks/${{ hashFiles(inputs.resource_file) }}.lock"
