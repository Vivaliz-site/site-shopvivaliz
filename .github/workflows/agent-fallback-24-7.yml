name: 🔄 Agent Fallback 24/7 - Auto-takeover se um agente cair

on:
  schedule:
    # Verificar a cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fallback-check:
    name: Verificar Fallback de Agentes
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🔍 Verificar Status de Claude
        id: claude_check
        run: |
          if [ -f ".agent-heartbeats/claude.heartbeat" ]; then
            AGE=$(( $(date +%s) - $(stat -c %Y .agent-heartbeats/claude.heartbeat) ))
            if [ $AGE -lt 600 ]; then
              echo "status=alive" >> $GITHUB_OUTPUT
              echo "✅ Claude: ATIVO"
            else
              echo "status=dead" >> $GITHUB_OUTPUT
              echo "❌ Claude: INATIVO (Age: ${AGE}s)"
            fi
          else
            echo "status=dead" >> $GITHUB_OUTPUT
            echo "❌ Claude: SEM HEARTBEAT"
          fi

      - name: 🔍 Verificar Status de Gemini
        id: gemini_check
        run: |
          if [ -f ".agent-heartbeats/gemini.heartbeat" ]; then
            AGE=$(( $(date +%s) - $(stat -c %Y .agent-heartbeats/gemini.heartbeat) ))
            if [ $AGE -lt 600 ]; then
              echo "status=alive" >> $GITHUB_OUTPUT
              echo "✅ Gemini: ATIVO"
            else
              echo "status=dead" >> $GITHUB_OUTPUT
              echo "❌ Gemini: INATIVO (Age: ${AGE}s)"
            fi
          else
            echo "status=dead" >> $GITHUB_OUTPUT
            echo "❌ Gemini: SEM HEARTBEAT"
          fi

      - name: 🔍 Verificar Status de GPT
        id: gpt_check
        run: |
          if [ -f ".agent-heartbeats/gpt.heartbeat" ]; then
            AGE=$(( $(date +%s) - $(stat -c %Y .agent-heartbeats/gpt.heartbeat) ))
            if [ $AGE -lt 600 ]; then
              echo "status=alive" >> $GITHUB_OUTPUT
              echo "✅ GPT: ATIVO"
            else
              echo "status=dead" >> $GITHUB_OUTPUT
              echo "❌ GPT: INATIVO (Age: ${AGE}s)"
            fi
          else
            echo "status=dead" >> $GITHUB_OUTPUT
            echo "❌ GPT: SEM HEARTBEAT"
          fi

      - name: 🔄 Ativar Fallback (se necessário)
        run: |
          CLAUDE_STATUS="${{ steps.claude_check.outputs.status }}"
          GEMINI_STATUS="${{ steps.gemini_check.outputs.status }}"
          GPT_STATUS="${{ steps.gpt_check.outputs.status }}"
          
          echo "════════════════════════════════════════"
          echo "🔄 VERIFICAÇÃO DE FALLBACK"
          echo "════════════════════════════════════════"
          echo ""
          echo "Claude:  $CLAUDE_STATUS"
          echo "Gemini:  $GEMINI_STATUS"
          echo "GPT:     $GPT_STATUS"
          echo ""
          
          # Se Claude cair, Gemini assume
          if [ "$CLAUDE_STATUS" = "dead" ] && [ "$GEMINI_STATUS" = "alive" ]; then
            echo "⚠️ Claude inativo - Gemini assume tarefas!"
            echo "FALLBACK: gemini-primary" > .fallback-status
          fi
          
          # Se Gemini cair, GPT assume
          if [ "$GEMINI_STATUS" = "dead" ] && [ "$GPT_STATUS" = "alive" ]; then
            echo "⚠️ Gemini inativo - GPT assume tarefas!"
            echo "FALLBACK: gpt-primary" > .fallback-status
          fi
          
          # Se Claude e Gemini caem, GPT assume
          if [ "$CLAUDE_STATUS" = "dead" ] && [ "$GEMINI_STATUS" = "dead" ] && [ "$GPT_STATUS" = "alive" ]; then
            echo "🚨 Claude e Gemini inativos - GPT assume tudo!"
            echo "FALLBACK: gpt-emergency" > .fallback-status
          fi
          
          # Se todos estão ativos
          if [ "$CLAUDE_STATUS" = "alive" ] && [ "$GEMINI_STATUS" = "alive" ] && [ "$GPT_STATUS" = "alive" ]; then
            echo "✅ Todos os agentes ATIVOS"
            echo "FALLBACK: none" > .fallback-status
          fi
          
          echo ""
          echo "════════════════════════════════════════"

      - name: 💾 Registrar Fallback
        run: |
          git config user.email "agente-autonomo@shopvivaliz.com.br"
          git config user.name "Agente Autonomo ShopVivaliz"
          
          git add .fallback-status .agent-heartbeats/ 2>/dev/null || true
          git commit -m "auto: verificação fallback $(cat .fallback-status 2>/dev/null)" 2>/dev/null || echo "Fallback status atualizado"
