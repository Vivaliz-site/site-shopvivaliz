name: "🤖 Agentes Listener - Issue Dispatcher"

on:
  issues:
    types: [opened, reopened, labeled]
  pull_request:
    types: [opened, synchronize]
  schedule:
    # Poll a cada 5 minutos para pegar issues novas
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  listen-for-agent-requests:
    runs-on: ubuntu-latest
    name: "🔍 Monitorar Issues de Agentes"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Agentes Leitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_ENVIRONMENT: "github-actions"
        run: |
          python scripts/agentes-leitor.py

  notify-remote-agents:
    runs-on: ubuntu-latest
    name: "📢 Notificar Agentes em Outras Estações"
    needs: listen-for-agent-requests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Extrair issues com label 'agentes'
        id: get-issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'agentes',
              state: 'open',
              per_page: 10,
            });

            console.log(`Encontradas ${issues.data.length} issues de agentes`);

            for (const issue of issues.data) {
              console.log(`  - Issue #${issue.number}: ${issue.title}`);
            }

            return issues.data.length;

      - name: Log final
        run: |
          echo "✅ Verificação de issues concluída"
          echo "📍 Próxima verificação: em 5 minutos (via schedule)"
          echo "💡 Para executar imediatamente em outra estação:"
          echo "   python scripts/agentes-leitor.py --env ubuntu-vm --watch"
          echo "   python scripts/agentes-leitor.py --env windows-remote"

  daily-summary:
    runs-on: ubuntu-latest
    name: "📊 Resumo Diário de Atividades"
    if: github.event_name == 'schedule'
    # Executar apenas uma vez por dia
    # (o horário é definido automaticamente pela GitHub)

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Gerar resumo de issues de agentes
        uses: actions/github-script@v7
        with:
          script: |
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'agentes',
              state: 'open',
            });

            const closedToday = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'agentes',
              state: 'closed',
              per_page: 100,
            });

            console.log(`
            📊 RESUMO DIÁRIO - AGENTES AUTÔNOMOS
            =====================================
            Abertas: ${openIssues.data.length}
            Fechadas hoje: ${closedToday.data.length}

            Issues abertas:
            ${openIssues.data.map(i => `  - #${i.number}: ${i.title}`).join('\n')}
            `);
