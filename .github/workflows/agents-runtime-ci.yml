name: Agents runtime CI

on:
  push:
    branches: [main]
    paths:
      - 'agents/runtime/**'
      - '.github/workflows/agents-runtime-ci.yml'
  pull_request:
    paths:
      - 'agents/runtime/**'
      - '.github/workflows/agents-runtime-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
      - name: Install dependencies
        working-directory: agents/runtime
        run: uv sync
      - name: Compile Python
        working-directory: agents/runtime
        run: uv run python -m py_compile agent.py main.py
      - name: Start health server
        working-directory: agents/runtime
        env:
          PORT: '8421'
        run: |
          uv run python main.py >/tmp/shopvivaliz-agents.log 2>&1 &
          echo $! >/tmp/shopvivaliz-agents.pid
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:8421/health && exit 0
            sleep 1
          done
          cat /tmp/shopvivaliz-agents.log
          exit 1
