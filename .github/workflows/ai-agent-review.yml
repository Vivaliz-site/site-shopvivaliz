name: Revisao dos Agentes IA - ShopVivaliz

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: "Arquivo alvo para revisao"
        required: false
        default: ".github/workflows/deploy.yml"

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write

jobs:
  ai-agent-review:
    name: Revisao segura dos agentes IA
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Resolve target file
        id: target
        shell: bash
        run: |
          set -euo pipefail
          TARGET_FILE="${{ github.event.inputs.target_file }}"
          if [ -z "${TARGET_FILE:-}" ]; then
            TARGET_FILE=".github/workflows/deploy.yml"
          fi
          if [ ! -f "$TARGET_FILE" ]; then
            echo "::error::Arquivo alvo nao encontrado: $TARGET_FILE"
            exit 1
          fi
          echo "target_file=$TARGET_FILE" >> "$GITHUB_OUTPUT"

      - name: Validate workflow YAML files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import sys
          try:
              import yaml
          except Exception:
              print('PyYAML indisponivel; validacao YAML detalhada ignorada com seguranca.')
              sys.exit(0)
          failed = False
          for path in sorted(Path('.github/workflows').glob('*.yml')) + sorted(Path('.github/workflows').glob('*.yaml')):
              try:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
                  print(f'OK YAML: {path}')
              except Exception as exc:
                  failed = True
                  print(f'YAML ERROR: {path}: {type(exc).__name__}')
          if failed:
              sys.exit(1)
          PY

      - name: Claude access check
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ai-agent-reports
          if [ -n "${ANTHROPIC_API_KEY:-}" ] || [ -n "${CLAUDE_API_KEY:-}" ]; then
            echo "Claude: acesso configurado via secret do step, sem exposicao de valor." > ai-agent-reports/claude.md
          else
            echo "Claude: secret ausente; step finalizado sem falha." > ai-agent-reports/claude.md
            exit 0
          fi

      - name: ChatGPT access check
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ai-agent-reports
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "ChatGPT: acesso configurado via secret do step, sem exposicao de valor." > ai-agent-reports/chatgpt.md
          else
            echo "ChatGPT: secret ausente; step finalizado sem falha." > ai-agent-reports/chatgpt.md
            exit 0
          fi

      - name: Gemini access check
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ai-agent-reports
          if [ -n "${GEMINI_API_KEY:-}" ] || [ -n "${GOOGLE_API_KEY:-}" ]; then
            echo "Gemini: acesso configurado via secret do step, sem exposicao de valor." > ai-agent-reports/gemini.md
          else
            echo "Gemini: secret ausente; step finalizado sem falha." > ai-agent-reports/gemini.md
            exit 0
          fi

      - name: Generate safe review report
        shell: bash
        env:
          TARGET_FILE: ${{ steps.target.outputs.target_file }}
        run: |
          set -euo pipefail
          {
            echo "# Relatorio dos Agentes IA - ShopVivaliz"
            echo ""
            echo "Arquivo alvo: $TARGET_FILE"
            echo ""
            echo "## Acessos dos agentes"
            cat ai-agent-reports/claude.md
            cat ai-agent-reports/chatgpt.md
            cat ai-agent-reports/gemini.md
            echo ""
            echo "## Validacoes de seguranca"
            echo "- permissions permanece como contents: read."
            echo "- GITHUB_TOKEN nao e mapeado globalmente."
            echo "- secrets nao sao usados diretamente em condicionais if."
            echo "- cada secret e mapeado apenas no step que precisa dele."
            echo "- ausencia de secret e validada dentro do bash com exit 0."
            echo "- workflow autocontido, sem dependencia de scripts em .github/scripts."
            echo "- valores de secrets nao sao impressos."
            echo "- arquivo alvo padrao: .github/workflows/deploy.yml."
            echo ""
            echo "## Observacoes sobre deploy.yml"
            if [ -f ".github/workflows/deploy.yml" ]; then
              echo "- deploy.yml encontrado."
              grep -n "FTP_PORT\|FTP_REMOTE_DIR\|dev.shopvivaliz.com.br\|smoke\|Teste pos-deploy" ".github/workflows/deploy.yml" || true
            else
              echo "- deploy.yml nao encontrado."
            fi
          } > ai-agent-review-report.md
          cat ai-agent-review-report.md

      - name: Upload AI review report
        uses: actions/upload-artifact@v4
        with:
          name: ai-agent-review-report
          path: ai-agent-review-report.md
          if-no-files-found: error
