name: 🤖 Hybrid AI Orchestrator (24/7)

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:
  push:
    paths:
      - 'tasks-queue.json'
      - 'ai-system/**'

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q -r ai-system/requirements.txt

      - name: 🧠 Initialize AI Memory
        env:
          PYTHONPATH: ${{ github.workspace }}/ai-system
        run: |
          python ai-system/memory/vector_memory.py

      - name: 🎯 Run orchestration cycle
        env:
          PYTHONPATH: ${{ github.workspace }}/ai-system
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python ai-system/orchestrator/runtime.py

      - name: 📊 Generate status report
        if: always()
        run: |
          cat > /tmp/ai-status.md << 'EOF'
          # 🤖 AI Orchestrator Status

          **Timestamp:** $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          **Status:** ✅ Online
          **Mode:** Hybrid (Local + Cloud APIs)

          ## Configuration
          - Local Model: Mistral 7B (quantized)
          - GPU: NVIDIA MX110 (2GB VRAM)
          - RAM: 32GB
          - Daily Budget: $10.00

          ## Next Cycle
          Scheduled in 10 minutes

          ---
          Generated by ShopVivaliz AI System
          EOF
          cat /tmp/ai-status.md

      - name: 💰 Check API costs
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}/ai-system
        run: |
          python -c "
          from ai-system.orchestrator.core import AIOrchestrator
          orch = AIOrchestrator()
          status = orch.get_status_report()
          print(f'Daily Cost: \${status[\"daily_cost\"]:.2f} / \${status[\"daily_limit\"]}')
          print(f'Budget Remaining: \${status[\"remaining_budget\"]:.2f}')
          print(f'Usage: {status[\"budget_percent\"]:.1f}%')
          " 2>/dev/null || echo "Cost check skipped"

      - name: 📝 Commit task queue updates
        if: github.event_name == 'schedule'
        run: |
          git config --local user.email "ai@shopvivaliz.local"
          git config --local user.name "🤖 AI Orchestrator"
          git add -A
          git diff-index --quiet HEAD || git commit -m "🤖 ai: orchestration cycle $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main || echo "No changes to push"
        continue-on-error: true
