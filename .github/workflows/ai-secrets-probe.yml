name: AI Secrets Probe — Shopee + TikTok

on:
  workflow_dispatch:

jobs:
  probe:
    name: Probe Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
      SHOPEE_TEST_PARTNER_ID: ${{ secrets.SHOPEE_TEST_PARTNER_ID }}
      SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
      SHOPEE_TEST_PARTNER_KEY: ${{ secrets.SHOPEE_TEST_PARTNER_KEY }}
      SHOPEE_TEST_API_KEY: ${{ secrets.SHOPEE_TEST_API_KEY }}
      SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
      SHOPEE_REFRESH_TOKEN: ${{ secrets.SHOPEE_REFRESH_TOKEN }}
      SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
      SHOPEE_BASE_URL: "https://openplatform.sandbox.test-stable.shopee.sg/api/v2"
      TIKTOK_SERVICE_ID: ${{ secrets.TIKTOK_SERVICE_ID }}
      TIKTOK_APP_KEY: ${{ secrets.TIKTOK_APP_KEY }}
      TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
      TIKTOK_SHOP_CIPHER: ${{ secrets.TIKTOK_SHOP_CIPHER }}
      TIKTOK_SHOP_ID: ${{ secrets.TIKTOK_SHOP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install requests
        run: pip install requests

      - name: Probe secret combinations
        run: python scripts/probe-marketplace-secrets.py
