name: "🔍 24/7 Audit Monitor (Cron)"

on:
  schedule:
    # A cada 30 minutos
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  audit:
    name: "Production 24/7 Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: |
          pip install requests

      - name: "🔍 Run 24/7 Audit Monitor"
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'fredmourao@gmail.com' }}
        run: |
          python3 scripts/audit-monitor-24-7.py

      - name: "📊 Upload audit logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs-${{ github.run_id }}
          path: logs/audit-24-7-*.log
          retention-days: 30
