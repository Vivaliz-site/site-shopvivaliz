name: Auto Approve Bot PRs

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    name: Auto approve trusted automation PRs
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Approve PR from trusted bot
        uses: actions/github-script@v7
        with:
          script: |
            const trustedAuthors = new Set([
              'github-actions[bot]',
              'Copilot',
            ]);

            const pr = context.payload.pull_request;
            const author = pr.user.login;

            if (!trustedAuthors.has(author)) {
              core.info(`Skipping PR #${pr.number}: author ${author} is not in the trusted allowlist.`);
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const alreadyApproved = reviews.some((review) =>
              review.user?.login === 'github-actions[bot]' && review.state === 'APPROVED'
            );

            if (alreadyApproved) {
              core.info(`PR #${pr.number} already has an approval from github-actions[bot].`);
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'Auto-approved because this PR was opened by a trusted automation account.',
            });

            core.info(`Approved PR #${pr.number} authored by ${author}.`);
