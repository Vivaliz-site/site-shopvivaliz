name: Auto Git Push

# Automatically detect changes and push every 10 minutes
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-push:
    name: Detect changes and auto-push
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --local user.email "autopush@shopvivaliz.com.br"
          git config --local user.name "Auto-Push Bot"

      - name: Run autonomous git push script
        continue-on-error: true
        run: |
          python3 scripts/autonomous-git-push.py

      - name: Check script output
        continue-on-error: true
        run: |
          if [ -f logs/autonomous-git-push.json ]; then
            echo "=== PUSH STATUS ==="
            cat logs/autonomous-git-push.json | head -20
          else
            echo "No push report generated"
          fi

      - name: Upload logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: push-logs
          path: logs/autonomous-git-push.*
          retention-days: 7
