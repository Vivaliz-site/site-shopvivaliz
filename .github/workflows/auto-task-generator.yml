name: Auto Task Generator - Agentes Criam Tarefas

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Git
        run: |
          git config user.name "Trio IA Autonomo"
          git config user.email "trio@shopvivaliz.com.br"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install google-generativeai anthropic

      - name: Gerar novas tarefas autonomamente
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/auto-task-generator.py

      - name: Commitar novas tarefas
        continue-on-error: true
        run: |
          git add tasks-queue.json || true
          git commit -m "feat: novas tarefas geradas autonomamente ($(date +'%Y-%m-%d %H:%M:%S'))" || true
          git push || true
