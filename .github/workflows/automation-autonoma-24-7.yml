name: Automacao Autonoma 24/7

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automacao-produtos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q openai openpyxl requests

      - name: Executar Pipeline Automacao
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_KEY: ${{ secrets.TIKTOK_APP_KEY }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python scripts/automation/pipeline_orchestrator.py planilhas/shopee.xlsx

      - name: Upload Shopee
        if: success()
        env:
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
        run: |
          python scripts/integrations/shopee.py --update-all

      - name: Upload TikTok
        if: success()
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_SHOP_ID: ${{ secrets.TIKTOK_SHOP_ID }}
        run: |
          python scripts/integrations/tiktok.py --update-all

      - name: Deploy Images FTP
        if: success()
        run: |
          python scripts/integrations/ftp_uploader.py storage/ia_images/

      - name: Validar 20 Items
        if: always()
        run: |
          python scripts/validation/full_validator.py

      - name: Enviar Relatorio
        if: always()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/automation/send_report.py

      - name: Git Commit Results
        if: always()
        run: |
          git config user.name "AI Autonoma"
          git config user.email "automation@shopvivaliz.com.br"
          git add logs/ storage/ia_images/ || true
          git commit -m "automation: Execucao autonoma $(date +%Y-%m-%d\ %H:%M)" || true
          git push origin main || true

      - name: Update Dashboard Live
        if: always()
        run: |
          python scripts/automation/update_dashboard.py

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Automacao Autonoma: ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
