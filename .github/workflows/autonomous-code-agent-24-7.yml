name: Autonomous Code Agent 24/7

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autonomous-code-agent-24-7
  cancel-in-progress: false

jobs:
  improve:
    if: ${{ vars.ENABLE_GITHUB_HOSTED_RUNNERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate credential
        shell: bash
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY não configurada"
            exit 1
          fi
          echo "::add-mask::$OPENAI_API_KEY"

      - name: Install coding agent
        run: npm install --global @openai/codex

      - name: Create isolated branch
        shell: bash
        run: |
          BRANCH="agent/autonomous-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          echo "AGENT_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Execute one real autonomous improvement
        shell: bash
        run: |
          codex exec --full-auto --json --output-last-message logs/codex-last-message.txt "$(cat <<'PROMPT'
          Você é o agente autônomo residente do ShopVivaliz. Trabalhe no repositório real; não simule, não invente arquivos ou testes e não marque tarefa como concluída sem evidência.

          Leia AGENTS.md, tasks-queue.json, roadmap, relatórios de saúde e o código. Faça autoauditoria, escolha exatamente uma correção ou melhoria segura de maior prioridade e implemente-a de verdade. Se não houver tarefa pendente, descubra um erro reproduzível, falha de teste, vulnerabilidade, problema de estabilidade, desempenho, acessibilidade, SEO ou conversão e corrija-o.

          Restrições obrigatórias: não altere preços, descontos ou margens; não publique/ative campanhas; não aumente orçamento; não execute transações financeiras; não acesse nem imprima segredos; não faça deploy diretamente; não remova funcionalidade existente. Alterações de código devem ser pequenas, reversíveis e auditáveis.

          Execute testes proporcionais à mudança. Deixe no working tree somente uma melhoria real e seu teste/documentação necessária. Se não conseguir produzir mudança verificável, não altere a fila e finalize sem fabricar resultado.
          PROMPT
          )"

      - name: Require auditable source change
        id: diff
        shell: bash
        run: |
          git status --short
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nenhuma mudança segura produzida; ciclo encerrado como idle."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Governance guard
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          python scripts/autonomous-change-guard.py --base HEAD

      - name: Real validation gate
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          python -m py_compile scripts/*.py
          find . -path './vendor' -prune -o -path './node_modules' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
          php scripts/quality/run-all.php
          python scripts/system-health-check.py

      - name: Commit and push verified change
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "ShopVivaliz Autonomous Agent"
          git config user.email "agent@shopvivaliz.com.br"
          git add -A
          git commit -m "fix: autonomous verified improvement"
          git push --set-upstream origin "$AGENT_BRANCH"

      - name: Open PR and enable tested auto-merge
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          PR_URL=$(gh pr create --base main --head "$AGENT_BRANCH" --title "fix: autonomous verified improvement" --body "Mudança produzida por agente de código autônomo. O workflow exige guardião de governança, lint PHP/Python, quality suite e health check antes do commit. Auto-merge aguarda os checks obrigatórios da branch.")
          gh pr merge "$PR_URL" --auto --squash --delete-branch

      - name: Upload execution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-code-agent-${{ github.run_id }}
          path: |
            logs/codex-last-message.txt
            logs/system-health-check.json
          if-no-files-found: ignore
          retention-days: 14
