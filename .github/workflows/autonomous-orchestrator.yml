name: Autonomous Orchestrator

# Central coordinator for all autonomous operations
on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  orchestrate:
    name: Coordinate autonomous operations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --quiet pyyaml requests

      - name: Configure Git
        run: |
          git config --local user.email "orchestrator@shopvivaliz.com.br"
          git config --local user.name "Autonomous Orchestrator"

      - name: STEP 1 - Git Fetch (5 min)
        continue-on-error: true
        run: |
          echo "=== FETCHING REMOTE ==="
          git fetch origin main --quiet
          echo "✓ Fetch complete"

          # Check if remote is ahead
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            echo "⚠ Local branch is $BEHIND commits behind remote"
          else
            echo "✓ Local branch is up to date"
          fi

      - name: STEP 2 - Detect Local Changes
        id: detect_changes
        continue-on-error: true
        run: |
          echo "=== DETECTING CHANGES ==="
          CHANGES=$(git status --porcelain | wc -l)
          echo "changes_count=$CHANGES" >> $GITHUB_OUTPUT

          if [ "$CHANGES" -gt 0 ]; then
            echo "✓ Detected $CHANGES file(s) with changes"
            git status --short | head -10
          else
            echo "✓ No local changes detected"
          fi

      - name: STEP 3 - Health Check
        id: health_check
        continue-on-error: true
        run: |
          echo "=== HEALTH CHECK ==="

          # Check workflows
          WF_COUNT=$(find .github/workflows -name "*.yml" | wc -l)
          echo "✓ Found $WF_COUNT workflows"

          # Check scripts
          PY_COUNT=$(find scripts -name "*.py" | wc -l)
          echo "✓ Found $PY_COUNT Python scripts"

          # Check directories
          for dir in logs scripts catalogo includes images; do
            if [ -d "$dir" ]; then
              echo "✓ Directory exists: $dir"
            else
              echo "⚠ Missing directory: $dir"
              mkdir -p "$dir"
            fi
          done

          echo "health_status=ok" >> $GITHUB_OUTPUT

      - name: STEP 4 - Generate Report
        run: |
          echo "=== AUTONOMOUS ORCHESTRATOR REPORT ==="
          echo ""
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Last commit: $(git rev-parse --short HEAD)"
          echo "Remote URL: $(git config --get remote.origin.url)"
          echo ""
          echo "=== LOCAL STATUS ==="
          git status --short | head -20 || echo "✓ All clean"
          echo ""
          echo "=== RECENT COMMITS ==="
          git log -5 --oneline || echo "No commits"

      - name: STEP 5 - Save Orchestrator Report
        run: |
          mkdir -p logs
          cat > logs/orchestrator-report.json << 'EOF'
          {
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "orchestrator_status": "completed",
            "operations_queued": [
              {"name": "auto-sync", "interval": "2 minutes", "status": "scheduled"},
              {"name": "auto-git-pull", "interval": "5 minutes", "status": "scheduled"},
              {"name": "auto-git-push", "interval": "10 minutes", "status": "scheduled"},
              {"name": "auto-ftp-deploy", "interval": "15 minutes", "status": "scheduled"},
              {"name": "health-check", "interval": "60 minutes", "status": "scheduled"}
            ],
            "system_health": "ok"
          }
          EOF
          cat logs/orchestrator-report.json

      - name: Commit reports if needed
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain logs/)" ]; then
            git add logs/orchestrator-report.json
            git commit -m "chore: orchestrator status report [AUTO]" || true
            git push || true
          fi
