name: Autonomous Proactive Agent Vivaliz

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      focus:
        description: "Area de foco"
        required: false
        default: ""

jobs:
  proactive-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic openai requests google-generativeai

      - name: Run Proactive Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOCUS: ${{ inputs.focus }}
        run: python3 .github/scripts/proactive_agent.py

