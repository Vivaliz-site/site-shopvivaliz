name: Autonomous Proactive Agent — Vivaliz

on:
  schedule:
    - cron: "0 */4 * * *"   # a cada 4 horas
  workflow_dispatch:
    inputs:
      focus:
        description: "Área de foco (blank = varredura geral)"
        required: false
        default: ""

jobs:
  proactive-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic openai requests google-generativeai

      - name: Run Proactive Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOCUS: ${{ inputs.focus }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path
          from datetime import datetime

          ROOT = Path(".")
          FOCUS = os.getenv("FOCUS", "").strip()

          # ── Orquestrador de providers ──────────────────────────────────────
          def call_llm(prompt: str) -> str:
              """Tenta Anthropic → OpenAI → Gemini até um funcionar."""

              # 1. Anthropic Claude
              key = os.getenv("ANTHROPIC_API_KEY", "")
              if key:
                  try:
                      import anthropic
                      client = anthropic.Anthropic(api_key=key)
                      msg = client.messages.create(
                          model="claude-haiku-4-5-20251001",
                          max_tokens=4096,
                          messages=[{"role": "user", "content": prompt}]
                      )
                      print("Provider: Anthropic Claude Haiku")
                      return msg.content[0].text.strip()
                  except Exception as e:
                      print(f"Anthropic falhou: {e}")

              # 2. OpenAI GPT-4o-mini
              key = os.getenv("OPENAI_API_KEY", "")
              if key:
                  try:
                      from openai import OpenAI
                      client = OpenAI(api_key=key)
                      resp = client.chat.completions.create(
                          model="gpt-4o-mini",
                          max_tokens=4096,
                          messages=[{"role": "user", "content": prompt}]
                      )
                      print("Provider: OpenAI GPT-4o-mini")
                      return resp.choices[0].message.content.strip()
                  except Exception as e:
                      print(f"OpenAI falhou: {e}")

              # 3. Google Gemini
              key = os.getenv("GEMINI_API_KEY", "")
              if key:
                  try:
                      import google.generativeai as genai
                      genai.configure(api_key=key)
                      model = genai.GenerativeModel("gemini-1.5-flash")
                      resp = model.generate_content(prompt)
                      print("Provider: Google Gemini Flash")
                      return resp.text.strip()
                  except Exception as e:
                      print(f"Gemini falhou: {e}")

              raise RuntimeError("Todos os providers falharam — sem chave válida com saldo")

          # ── Coleta contexto ────────────────────────────────────────────────
          def read_file(path, max_chars=3000):
              try:
                  c = Path(path).read_text(encoding="utf-8", errors="replace")
                  return c[:max_chars] + ("..." if len(c) > max_chars else "")
              except Exception:
                  return ""

          def run(cmd):
              return subprocess.run(cmd, shell=True, capture_output=True, text=True).stdout.strip()

          catalog_data = json.loads(Path("api/catalog/fallback-products.json").read_text(encoding="utf-8"))
          total_products = len(catalog_data)
          no_desc  = sum(1 for p in catalog_data if not str(p.get("description","")).strip())
          no_price = sum(1 for p in catalog_data if not float(p.get("price", 0) or 0))
          categories = {}
          for p in catalog_data:
              c = p.get("category", "")
              if c: categories[c] = categories.get(c, 0) + 1

          signals_path = Path("storage/commerce_signals.json")
          signals = json.loads(signals_path.read_text()) if signals_path.exists() else {}

          pedidos_path = Path("logs/pedidos.jsonl")
          total_orders = sum(1 for l in pedidos_path.read_text(encoding="utf-8").splitlines() if l.strip()) if pedidos_path.exists() else 0

          health_path = Path("automation/proactive/logs/health.jsonl")
          last_health = ""
          if health_path.exists():
              lines = [l for l in health_path.read_text().splitlines() if l.strip()]
              if lines:
                  last_health = lines[-1]

          recent_commits = run("git log --oneline -8")
          git_status     = run("git status --short")

          context = f"""
PROJETO: Vivaliz e-commerce (dev.shopvivaliz.com.br)
DATA: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}
FOCO: {FOCUS or 'varredura geral'}

CATÁLOGO:
- Total: {total_products} produtos
- Sem descrição: {no_desc} ({round(no_desc/total_products*100)}%)
- Sem preço: {no_price} (Tiny OAuth expirado)
- Categorias: {json.dumps(categories, ensure_ascii=False)}

SINAIS COMMERCE: {json.dumps(signals, ensure_ascii=False)[:400]}
PEDIDOS RECEBIDOS: {total_orders}
ÚLTIMO HEALTH CHECK: {last_health[:300]}

COMMITS RECENTES:
{recent_commits}

GIT STATUS: {git_status or '(limpo)'}

INDEX.PHP (início):
{read_file("index.php", 1500)}

CATALOGO.PHP (início):
{read_file("catalogo.php", 1000)}

.HTACCESS:
{read_file(".htaccess", 1500)}

CSS (fim):
{read_file("css/style.css", 1000)}
          """

          prompt = f"""
Você é o agente autônomo proativo do Vivaliz e-commerce.
Analise o estado atual e decida UMA melhoria concreta, segura e de alto impacto.

CONTEXTO DO PROJETO:
{context}

REGRAS CRÍTICAS:
1. Apenas mudanças incrementais e seguras — nunca apague funcionalidade existente
2. Nunca toque: .github/workflows/deploy.yml, logs/, .env, config/constants.php
3. Priorize melhorias visíveis ao cliente (UX, SEO, conversão)
4. Se catálogo tem 197 produtos sem descrição, gere descrições para os primeiros 5
5. Prefira arquivos PHP/JS/CSS — evite JSONs grandes
6. Responda SOMENTE JSON puro (sem markdown, sem ```)

{{
  "action": "write_file" | "no_action",
  "reason": "justificativa clara de valor para o projeto",
  "file_path": "caminho/relativo.ext",
  "content": "conteúdo COMPLETO do arquivo",
  "commit_message": "tipo: descrição curta em português"
}}
          """

          print(f"Consultando LLM... (foco: {FOCUS or 'varredura geral'})")
          raw = call_llm(prompt)
          print(f"Resposta: {len(raw)} chars")

          # Limpa markdown se vier
          if "```" in raw:
              parts = raw.split("```")
              for part in parts:
                  stripped = part.strip()
                  if stripped.startswith("json"): stripped = stripped[4:]
                  stripped = stripped.strip()
                  if stripped.startswith("{"):
                      raw = stripped
                      break

          try:
              result = json.loads(raw.strip())
          except json.JSONDecodeError as e:
              print(f"JSON inválido: {e}\nRaw: {raw[:300]}")
              sys.exit(0)

          action     = result.get("action", "no_action")
          reason     = result.get("reason", "")
          file_path  = result.get("file_path", "")
          content    = result.get("content", "")
          commit_msg = result.get("commit_message", "chore: melhoria proativa autonoma")

          print(f"Ação: {action} | {reason}")

          if action == "no_action":
              print("Nenhuma melhoria necessária nesta execução.")
              sys.exit(0)

          # Bloqueios de segurança
          BLOCKED = [
              ".github/workflows/deploy.yml",
              "logs/", ".env", "config/constants.php",
              "storage/commerce_signals.json",
          ]
          if any(file_path == b or file_path.startswith(b) for b in BLOCKED):
              print(f"BLOQUEADO: {file_path} é arquivo protegido")
              sys.exit(0)

          if not file_path or not content or len(content) < 10:
              print("file_path ou content inválido — abortando")
              sys.exit(0)

          # Tamanho máximo seguro (100KB)
          if len(content.encode("utf-8")) > 102400:
              print("Conteúdo muito grande (>100KB) — abortando por segurança")
              sys.exit(0)

          target = ROOT / file_path
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(content, encoding="utf-8")
          print(f"Arquivo escrito: {file_path} ({len(content)} chars)")

          subprocess.run("git config user.name 'Claude Autonomo'", shell=True)
          subprocess.run("git config user.email 'fredmourao@gmail.com'", shell=True)
          subprocess.run(f"git add '{file_path}'", shell=True)

          diff = subprocess.run("git diff --cached --stat", shell=True, capture_output=True, text=True).stdout.strip()
          if not diff:
              print("Sem diferença real — nada a commitar")
              sys.exit(0)

          print(f"Diff: {diff}")
          full_msg = f"{commit_msg}\n\nAgente proativo autônomo Vivaliz\nProvider: orquestrador (Anthropic→OpenAI→Gemini)\nCo-Authored-By: Claude Haiku 4.5 <noreply@anthropic.com>"
          subprocess.run(["git", "commit", "-m", full_msg], check=True)

          # Pull rebase antes de push para evitar conflitos com agente externo
          subprocess.run("git pull --rebase origin main", shell=True)
          subprocess.run("git push origin main", shell=True)
          print(f"✅ Deploy disparado: {commit_msg}")

          # Salva log da execução
          log_path = Path("automation/proactive/logs/runs.jsonl")
          log_path.parent.mkdir(parents=True, exist_ok=True)
          log_entry = {
              "timestamp": datetime.utcnow().isoformat() + "Z",
              "action": action,
              "file": file_path,
              "reason": reason,
              "commit": commit_msg,
          }
          with open(log_path, "a", encoding="utf-8") as f:
              f.write(json.dumps(log_entry, ensure_ascii=False) + "\n")

          PYEOF
