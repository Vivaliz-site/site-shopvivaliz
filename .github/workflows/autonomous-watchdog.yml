name: Autonomous Watchdog Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      cycles:
        description: 'Number of safe watchdog cycles to request'
        required: false
        default: '1'

permissions:
  contents: read

concurrency:
  group: autonomous-watchdog-monitor
  cancel-in-progress: false

env:
  SHOPVIVALIZ_BASE_URL: https://dev.shopvivaliz.com.br

jobs:
  watchdog:
    name: Ping autonomous watchdog
    if: ${{ vars.ENABLE_GITHUB_HOSTED_RUNNERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Build watchdog URL
        id: url
        shell: bash
        run: |
          CYCLES="${{ github.event.inputs.cycles || '1' }}"
          BASE="${SHOPVIVALIZ_BASE_URL%/}"
          URL="$BASE/api/agent/autonomous-watchdog.php?run_loop=1&cycles=$CYCLES"
          if [ -n "${{ secrets.SHOPVIVALIZ_AGENT_KEY }}" ]; then
            URL="$URL&agent_key=${{ secrets.SHOPVIVALIZ_AGENT_KEY }}"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Execute watchdog
        shell: bash
        run: |
          mkdir -p reports
          HTTP_CODE=$(curl -sS -L --max-time 60 --retry 2 --retry-delay 5 \
            -H "Accept: application/json" \
            -o reports/autonomous-watchdog.json \
            -w "%{http_code}" \
            "${{ steps.url.outputs.url }}")
          echo "HTTP_CODE=$HTTP_CODE"
          cat reports/autonomous-watchdog.json || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::warning::Watchdog HTTP error ($HTTP_CODE) - não bloqueando pipeline"
          fi

      - name: Validate watchdog response
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          try:
              with open('reports/autonomous-watchdog.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
          except Exception as e:
              print(f"::warning::Falha ao ler JSON do watchdog: {e}")
              data = {}

          if data.get('agent') and data.get('agent') != 'autonomous-watchdog':
              print('::warning::Resposta inesperada do watchdog')

          alerts = data.get('alerts', [])
          if data.get('all_ok') is False:
              print('::warning::Watchdog reported alerts (não bloqueante)')
              print('Watchdog alerts:', alerts)
          else:
              print('Watchdog OK ou indisponível (não bloqueante)')
          PY

      - name: Upload watchdog report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-watchdog-report
          path: reports/autonomous-watchdog.json
          retention-days: 7
