name: CI AUTONOMO CONTINUO

on:
  # Gatilhos automáticos pausados temporariamente para economizar quota do GitHub Actions.
  # Reativar após estabilização dos secrets e do fluxo de CI.
  workflow_dispatch:
    inputs:
      max_cycles:
        description: "Quantidade de ciclos autonomos seguros"
        required: false
        default: "1"

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: ci-eha-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      GH_TOKEN: ${{ secrets.GH_REPO_TOKEN || github.token }}
      BASE_URL: ${{ secrets.BASE_URL != '' && secrets.BASE_URL || 'https://shopvivaliz.com.br' }}
      AUTONOMOUS_MAX_CYCLES: ${{ github.event.inputs.max_cycles || '1' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: pdo, pdo_mysql, curl, json, mbstring

      - name: Validar arquivos de governanca autonoma
        run: |
          python -m json.tool tasks-queue.json >/dev/null
          python -m py_compile scripts/autonomous-executor.py
          if [ -f scripts/autonomous-policy-guard.py ]; then
            python -m py_compile scripts/autonomous-policy-guard.py
          fi

      - name: Instalar dependencias EHA
        run: |
          if [ -f automation/eha/package.json ]; then
            cd automation/eha && npm install
          elif [ -f package.json ]; then
            npm ci
          else
            npm install @playwright/test || true
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true' && hashFiles('automation/eha/package.json') != ''
        run: cd automation/eha && npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true' && hashFiles('automation/eha/package.json') != ''
        run: cd automation/eha && npx playwright install-deps chromium

      - name: Run E2E Checkout
        id: e2e
        if: hashFiles('automation/eha/playwright.config.js') != '' && hashFiles('automation/eha/checkout.spec.js') != ''
        run: cd automation/eha && npx playwright test checkout.spec.js --config=playwright.config.js --reporter=line
        continue-on-error: true

      - name: Run PHP EHA Loop
        id: eha
        if: hashFiles('automation/eha/run.php') != ''
        run: php automation/eha/run.php
        env:
          E2E_FAILED: ${{ steps.e2e.outcome == 'failure' && '1' || '0' }}

      - name: Executar agente autonomo seguro
        if: github.event_name != 'pull_request'
        run: python scripts/autonomous-executor.py --max-cycles "${AUTONOMOUS_MAX_CYCLES}"

      - name: Upload EHA e relatorios autonomos
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-reports-${{ github.run_number }}
          path: |
            automation/eha/reports/
            logs/autonomous/
          retention-days: 14

      - name: Rotacionar logs locais
        if: always()
        continue-on-error: true
        run: |
          REPORTS=automation/eha/reports
          if [ -f "$REPORTS/eha_events.txt" ]; then
            LINES=$(wc -l < "$REPORTS/eha_events.txt")
            if [ "$LINES" -gt 500 ]; then
              tail -n 500 "$REPORTS/eha_events.txt" > "$REPORTS/eha_events.txt.tmp"
              mv "$REPORTS/eha_events.txt.tmp" "$REPORTS/eha_events.txt"
            fi
          fi
          if [ -f "$REPORTS/run_history.jsonl" ]; then
            RUNS=$(wc -l < "$REPORTS/run_history.jsonl")
            if [ "$RUNS" -gt 200 ]; then
              tail -n 200 "$REPORTS/run_history.jsonl" > "$REPORTS/run_history.jsonl.tmp"
              mv "$REPORTS/run_history.jsonl.tmp" "$REPORTS/run_history.jsonl"
            fi
          fi

      - name: Salvar metadata do CI run
        if: always()
        continue-on-error: true
        run: |
          mkdir -p automation/eha/reports
          EHA_STATUS=$(cat automation/eha/reports/last_status.txt 2>/dev/null || echo "UNKNOWN")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > automation/eha/reports/last_ci_run.json <<JSONEOF
          {
            "run_number": ${RUN_NUMBER},
            "run_id": "${RUN_ID}",
            "eha_status": "${EHA_STATUS}",
            "event": "${EVENT}",
            "sha": "${SHA}",
            "timestamp": "${TS}",
            "url": "https://github.com/fredmourao-ai/site-shopvivaliz/actions/runs/${RUN_ID}"
          }
          JSONEOF
          echo "CI metadata salvo: run #${RUN_NUMBER} / ${EHA_STATUS} @ ${TS}"
        env:
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          EVENT: ${{ github.event_name }}
          SHA: ${{ github.sha }}

      - name: Commit relatorios de execucao na branch ativa
        if: always() && github.event_name != 'pull_request' && github.ref_name != 'main'
        continue-on-error: true
        run: |
          git config user.email "ci-autonomo@shopvivaliz.com.br"
          git config user.name "CI Autonomo"
          git add automation/eha/reports/ logs/autonomous/ logs/tasks-queue.json tasks-queue.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: atualiza relatorios autonomos run #${{ github.run_number }} [skip ci]"
            for i in 1 2 3 4; do
              if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
                break
              fi
              git rebase --abort 2>/dev/null || true
              sleep $((i * 2))
            done
          fi

      - name: Fail if BLOCKED
        run: |
          STATUS=$(cat automation/eha/reports/last_status.txt 2>/dev/null || echo "UNKNOWN")
          echo "EHA Status: $STATUS"
          if [ "$STATUS" = "BLOCKED" ] || [ "$STATUS" = "ROLLBACK" ]; then
            echo "::error::EHA retornou $STATUS - pipeline bloqueada"
            exit 1
          fi
