name: Trio IA Continuo - Sem Paradas

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  continuous:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Git
        run: |
          git config user.name "Trio IA Continuo"
          git config user.email "trio-continuous@shopvivaliz.com.br"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install google-generativeai anthropic openai

      - name: Iniciar Trio IA em Modo Continuo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/continuous-executor.py

      - name: Gerar Relatorio
        if: always()
        run: |
          echo "# Execucao Continua - Relatorio" > continuous-report.md
          echo "Timestamp: $(date)" >> continuous-report.md
          echo "Status: ciclo concluido" >> continuous-report.md

      - name: Commitar resultados
        continue-on-error: true
        run: |
          git add -A
          git commit -m "feat: agentes trio continuo ($(date +'%Y-%m-%d %H:%M:%S'))" || true
          git push || true
