name: Copy Secrets to Pipeline Repository

on:
  workflow_dispatch:

jobs:
  copy-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site-shopvivaliz
        uses: actions/checkout@v4
        with:
          repository: fredmourao-ai/site-shopvivaliz

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Copy secrets to pipeline repository
        env:
          GH_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLIENT_ID_API_OLIST: ${{ secrets.CLIENT_ID_API_OLIST || secrets.OLIST_CLIENT_ID }}
          CLIENT_SECRET_OLIST: ${{ secrets.CLIENT_SECRET_OLIST || secrets.OLIST_CLIENT_SECRET }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          EMAIL_AGENTES_SECRET: ${{ secrets.EMAIL_AGENTES_SECRET }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST || secrets.SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || secrets.SMTP_PORT }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || secrets.FTP_PASS }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
          FTP_SERVER: ${{ secrets.FTP_SERVER || secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_REPO_TOKEN_ALT: ${{ secrets.GH_REPO_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || secrets.EMAIL_SMTP_HOST }}
          SMTP_PASS: ${{ secrets.SMTP_PASS || secrets.EMAIL_PASSWORD }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || secrets.EMAIL_SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER || secrets.EMAIL_USER }}
          SQUAD_TOKEN: ${{ secrets.SQUAD_TOKEN }}
          TINY_CLIENT_ID: ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TOKEN_API_OLIST: ${{ secrets.TOKEN_API_OLIST || secrets.ERP_API_TOKEN }}
          URL_REDIRCT_OLIST: ${{ secrets.URL_REDIRCT_OLIST || secrets.URL_REDIRECT_OLIST }}
          URL_TINY_OLIST: ${{ secrets.URL_TINY_OLIST }}
        run: |
          python3 << 'EOF'
          import os
          import subprocess

          secrets_to_copy = {
              'ANTHROPIC_API_KEY': os.getenv('ANTHROPIC_API_KEY'),
              'CLIENT_ID_API_OLIST': os.getenv('CLIENT_ID_API_OLIST'),
              'CLIENT_SECRET_OLIST': os.getenv('CLIENT_SECRET_OLIST'),
              'DB_DATABASE': os.getenv('DB_DATABASE'),
              'DB_HOST': os.getenv('DB_HOST'),
              'DB_NAME': os.getenv('DB_NAME'),
              'EMAIL_AGENTES_SECRET': os.getenv('EMAIL_AGENTES_SECRET'),
              'EMAIL_FROM': os.getenv('EMAIL_FROM'),
              'EMAIL_PASSWORD': os.getenv('EMAIL_PASSWORD'),
              'EMAIL_SMTP_HOST': os.getenv('EMAIL_SMTP_HOST'),
              'EMAIL_SMTP_PORT': os.getenv('EMAIL_SMTP_PORT'),
              'EMAIL_TO': os.getenv('EMAIL_TO'),
              'EMAIL_USER': os.getenv('EMAIL_USER'),
              'FTP_PASSWORD': os.getenv('FTP_PASSWORD'),
              'FTP_PORT': os.getenv('FTP_PORT'),
              'FTP_REMOTE_DIR': os.getenv('FTP_REMOTE_DIR'),
              'FTP_SERVER': os.getenv('FTP_SERVER'),
              'FTP_USERNAME': os.getenv('FTP_USERNAME'),
              'GEMINI_API_KEY': os.getenv('GEMINI_API_KEY'),
              'GOOGLE_API_KEY': os.getenv('GOOGLE_API_KEY'),
              'OLIST_CLIENT_ID': os.getenv('OLIST_CLIENT_ID'),
              'OLIST_CLIENT_SECRET': os.getenv('OLIST_CLIENT_SECRET'),
              'OPENAI_API_KEY': os.getenv('OPENAI_API_KEY'),
              'SMTP_HOST': os.getenv('SMTP_HOST'),
              'SMTP_PASS': os.getenv('SMTP_PASS'),
              'SMTP_PORT': os.getenv('SMTP_PORT'),
              'SMTP_USER': os.getenv('SMTP_USER'),
              'SQUAD_TOKEN': os.getenv('SQUAD_TOKEN'),
              'TINY_CLIENT_ID': os.getenv('TINY_CLIENT_ID'),
              'TINY_CLIENT_SECRET': os.getenv('TINY_CLIENT_SECRET'),
              'TOKEN_API_OLIST': os.getenv('TOKEN_API_OLIST'),
              'URL_REDIRCT_OLIST': os.getenv('URL_REDIRCT_OLIST') or os.getenv('URL_REDIRECT_OLIST'),
              'URL_TINY_OLIST': os.getenv('URL_TINY_OLIST'),
          }

          created = 0
          failed = 0

          for key, value in secrets_to_copy.items():
              if value:
                  cmd = f'gh secret set {key} --body "{value}" --repo fredmourao-ai/shopvivaliz-pipeline'
                  result = subprocess.run(cmd, shell=True, capture_output=True, text=True)
                  if result.returncode == 0:
                      print(f"✓ {key}")
                      created += 1
                  else:
                      print(f"✗ {key} - {result.stderr}")
                      failed += 1
              else:
                  print(f"⊘ {key} - Vazio")

          print(f"\nResumo: {created} criados, {failed} falhados")
          EOF
