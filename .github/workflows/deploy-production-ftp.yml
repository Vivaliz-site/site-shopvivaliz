name: Deploy production FTP (MANUAL ONLY)

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PHP syntax
        run: |
          set -Eeuo pipefail
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 php -l
      - name: Validate critical files
        run: |
          set -Eeuo pipefail
          test -s index.php
          test -s home.php
          test -s .htaccess
          test -s css/shopvivaliz-core-consolidated.css
          test -s includes/header.php
          test -s includes/footer.php
          test -s includes/catalog-runtime.php
          test -s api/olist/webhook-receiver.php

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y lftp jq
      - name: Deploy safely
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -Eeuo pipefail
          : "${FTP_SERVER:?Missing FTP_SERVER}"
          : "${FTP_USERNAME:?Missing FTP_USERNAME}"
          : "${FTP_PASSWORD:?Missing FTP_PASSWORD}"
          PORT="$(printf '%s' "${FTP_PORT:-21}" | tr -cd '0-9')"
          PORT="${PORT:-21}"
          REMOTE="${FTP_REMOTE_DIR:-/}"
          deploy_script="$(mktemp)"
          {
            printf '%s\n' \
              'set ftp:ssl-force true' \
              'set ftp:ssl-protect-data true' \
              'set ssl:verify-certificate false' \
              'set net:max-retries 2' \
              'set net:timeout 20'
            find \
              index.php catalogo.php produto.php carrinho.php checkout.php home.php .htaccess \
              includes css js images public/assets assets/brand assets/css assets/images api/catalog/fallback-products.json \
              -type f \
              ! -path '*/storage/orders/*' \
              ! -path '*/storage/codex-bridge/state.json' \
              ! -path '*/storage/orchestrator/queue.json' \
              -print | sort | while IFS= read -r file; do
                dir="$(dirname "$file")"
                if [ "$dir" = "." ]; then
                  remote_dir="$REMOTE"
                else
                  remote_dir="${REMOTE%/}/$dir"
                fi
                printf 'mkdir -p "%s"\n' "$remote_dir"
                printf 'put -O "%s" "%s"\n' "$remote_dir" "$file"
              done
            printf '%s\n' 'bye'
          } > "$deploy_script"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$PORT" "$FTP_SERVER" <<EOF
          source "$deploy_script"
          EOF
      - name: Purge Cloudflare cache when configured
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -Eeuo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured; skipping purge"
            exit 0
          fi
          zone_response="$(curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H 'Content-Type: application/json' 'https://api.cloudflare.com/client/v4/zones?name=shopvivaliz.com.br&status=active')"
          zone_id="$(printf '%s' "$zone_response" | jq -r '.result[0].id // empty')"
          test -n "$zone_id"
          purge_response="$(curl -fsS -X POST -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H 'Content-Type: application/json' --data '{"purge_everything":true}' "https://api.cloudflare.com/client/v4/zones/${zone_id}/purge_cache")"
          test "$(printf '%s' "$purge_response" | jq -r '.success')" = "true"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for propagation
        run: sleep 25
      - name: Verify storefront and CSS
        run: |
          set -Eeuo pipefail
          curl -fLsS --retry 4 --retry-delay 5 https://shopvivaliz.com.br/ -o /tmp/home.html
          curl -fLsS --retry 4 --retry-delay 5 https://shopvivaliz.com.br/css/shopvivaliz-core-consolidated.css -o /tmp/core.css
          test "$(wc -c < /tmp/core.css)" -gt 1000
          grep -qi 'Vivaliz' /tmp/home.html
          ! grep -q 'InÃ­cio' /tmp/home.html
      - name: Verify canonical domain and health endpoints
        run: |
          set -Eeuo pipefail
          final_url="$(curl -LsS -o /dev/null -w '%{url_effective}' https://www.shopvivaliz.com.br/)"
          test "$final_url" = "https://shopvivaliz.com.br/"
          curl -fLsS --retry 4 --retry-delay 5 'https://shopvivaliz.com.br/api/olist/webhook-receiver.php?health=1'
