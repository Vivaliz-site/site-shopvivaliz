name: Deploy production FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Fila deploys em sequencia; NAO cancela deploy em andamento (cancelar FTP
# no meio deixa producao em estado parcial). Runs travados sao encerrados
# pelo timeout-minutes de cada job, liberando a fila com falha clara.
concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  LFTP_EXCLUDES: >-
    --exclude-glob .git*
    --exclude-glob node_modules/
    --exclude-glob vendor/
    --exclude-glob cache/
    --exclude-glob tmp/
    --exclude-glob *.log
    --exclude-glob *.bak
    --exclude-glob *backup*
    --exclude-glob *.tmp
    --exclude-glob *.swp

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate PHP syntax
        run: |
          set -Eeuo pipefail
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 php -l

      - name: Validate production snapshot
        run: |
          set -Eeuo pipefail
          required=(
            index.php
            home.php
            catalogo.php
            carrinho.php
            checkout.php
            .htaccess
            css/shopvivaliz-core-consolidated.css
            css/admin-zoom-responsive.css
            includes/header.php
            includes/footer.php
            includes/navbar.php
            includes/catalog-runtime.php
            includes/admin-guard.php
            api/agent/squad-chat.php
            admin/index.php
            admin/produtos.php
            admin/pedidos.php
            admin/clientes.php
            admin/integrations.php
            auth/logout.php
            olist/webhook-receiver.php
            ferramentas/index.php
            arte-papelaria-e-armarinho/index.php
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "::error::Missing critical file: $file"; exit 1; }
          done
          test -d assets
          test -d images
          test -d public/assets/liz-assistant

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends lftp jq

      - name: Prepare lftp config
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -Eeuo pipefail
          : "${FTP_SERVER:?Missing FTP_SERVER}"
          : "${FTP_USERNAME:?Missing FTP_USERNAME}"
          : "${FTP_PASSWORD:?Missing FTP_PASSWORD}"
          PORT="$(printf '%s' "${FTP_PORT:-21}" | tr -cd '0-9')"
          PORT="${PORT:-21}"
          # Configuracao anti-stall: passive-mode forcado, EPSV desativado
          # (causa classica de data-channel congelado em FTPS de host
          # compartilhado), retries curtos e timeouts agressivos para que
          # falhas de rede ESTOUREM ERRO em segundos em vez de pendurar.
          cat > ~/.lftprc <<CFG
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set ftp:passive-mode on
          set ftp:prefer-epsv false
          set net:timeout 20
          set net:max-retries 2
          set net:persist-retries 1
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 15
          set cmd:fail-exit true
          set mirror:parallel-transfer-count 2
          CFG

      - name: Deploy bloco 1 - backend (api, includes, admin, auth, olist)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -Eeuo pipefail
          REMOTE="${FTP_REMOTE_DIR:-/}"
          PORT="$(printf '%s' "${FTP_PORT:-21}" | tr -cd '0-9')"; PORT="${PORT:-21}"
          timeout --signal=TERM 360 lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$PORT" "$FTP_SERVER" <<EOF || { echo "::error::Bloco 1 (backend) excedeu 6min ou falhou - veja acima o ultimo diretorio logado"; exit 1; }
          mkdir -p "$REMOTE/api"
          mkdir -p "$REMOTE/includes"
          mkdir -p "$REMOTE/admin"
          mkdir -p "$REMOTE/auth"
          mkdir -p "$REMOTE/olist"
          echo "== [deploy] api =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES api "$REMOTE/api"
          echo "== [deploy] includes =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES includes "$REMOTE/includes"
          echo "== [deploy] admin =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES admin "$REMOTE/admin"
          echo "== [deploy] auth =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES auth "$REMOTE/auth"
          echo "== [deploy] olist =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES olist "$REMOTE/olist"
          bye
          EOF

      - name: Deploy bloco 2 - frontend (css, js, assets, images, liz)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -Eeuo pipefail
          REMOTE="${FTP_REMOTE_DIR:-/}"
          PORT="$(printf '%s' "${FTP_PORT:-21}" | tr -cd '0-9')"; PORT="${PORT:-21}"
          timeout --signal=TERM 360 lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$PORT" "$FTP_SERVER" <<EOF || { echo "::error::Bloco 2 (frontend) excedeu 6min ou falhou - veja acima o ultimo diretorio logado"; exit 1; }
          mkdir -p "$REMOTE/css"
          mkdir -p "$REMOTE/js"
          mkdir -p "$REMOTE/assets"
          mkdir -p "$REMOTE/images"
          mkdir -p "$REMOTE/public/assets/liz-assistant"
          echo "== [deploy] css =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES css "$REMOTE/css"
          echo "== [deploy] js =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES js "$REMOTE/js"
          echo "== [deploy] assets =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES assets "$REMOTE/assets"
          echo "== [deploy] images =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES images "$REMOTE/images"
          echo "== [deploy] liz-assistant =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES public/assets/liz-assistant "$REMOTE/public/assets/liz-assistant"
          bye
          EOF

      - name: Deploy bloco 3 - paginas institucionais e rotas legadas
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -Eeuo pipefail
          REMOTE="${FTP_REMOTE_DIR:-/}"
          PORT="$(printf '%s' "${FTP_PORT:-21}" | tr -cd '0-9')"; PORT="${PORT:-21}"
          timeout --signal=TERM 240 lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$PORT" "$FTP_SERVER" <<EOF || { echo "::error::Bloco 3 (institucional) excedeu 4min ou falhou - veja acima o ultimo diretorio logado"; exit 1; }
          mkdir -p "$REMOTE/sobre"
          mkdir -p "$REMOTE/contato"
          mkdir -p "$REMOTE/faq"
          mkdir -p "$REMOTE/blog"
          mkdir -p "$REMOTE/politica-privacidade"
          mkdir -p "$REMOTE/ferramentas"
          mkdir -p "$REMOTE/arte-papelaria-e-armarinho"
          echo "== [deploy] sobre =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES sobre "$REMOTE/sobre"
          echo "== [deploy] contato =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES contato "$REMOTE/contato"
          echo "== [deploy] faq =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES faq "$REMOTE/faq"
          echo "== [deploy] blog =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES blog "$REMOTE/blog"
          echo "== [deploy] politica-privacidade =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES politica-privacidade "$REMOTE/politica-privacidade"
          echo "== [deploy] ferramentas =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES ferramentas "$REMOTE/ferramentas"
          echo "== [deploy] arte-papelaria-e-armarinho =="
          mirror --reverse --verbose --ignore-time $LFTP_EXCLUDES arte-papelaria-e-armarinho "$REMOTE/arte-papelaria-e-armarinho"
          bye
          EOF

      - name: Deploy bloco 4 - raiz (.htaccess e PHPs)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -Eeuo pipefail
          REMOTE="${FTP_REMOTE_DIR:-/}"
          PORT="$(printf '%s' "${FTP_PORT:-21}" | tr -cd '0-9')"; PORT="${PORT:-21}"
          timeout --signal=TERM 240 lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$PORT" "$FTP_SERVER" <<EOF || { echo "::error::Bloco 4 (raiz) excedeu 4min ou falhou"; exit 1; }
          echo "== [deploy] raiz *.php =="
          mput -O "$REMOTE" *.php
          echo "== [deploy] .htaccess =="
          put -O "$REMOTE" .htaccess
          bye
          EOF
          echo "Deploy FTP concluido com sucesso."

      - name: Purge Cloudflare cache when configured
        timeout-minutes: 3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -Eeuo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured; skipping purge"
            exit 0
          fi
          zone_response="$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            'https://api.cloudflare.com/client/v4/zones?name=shopvivaliz.com.br&status=active')"
          zone_id="$(printf '%s' "$zone_response" | jq -r '.result[0].id // empty')"
          test -n "$zone_id"
          purge_response="$(curl -fsS -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/${zone_id}/purge_cache")"
          test "$(printf '%s' "$purge_response" | jq -r '.success')" = "true"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for propagation
        run: sleep 30

      - name: Verify storefront, commerce, admin, redirects and integrations
        run: |
          set -Eeuo pipefail

          curl -fLsS --retry 5 --retry-delay 6 https://shopvivaliz.com.br/ -o /tmp/home.html
          curl -fLsS --retry 5 --retry-delay 6 https://shopvivaliz.com.br/catalogo -o /tmp/catalogo.html
          curl -fLsS --retry 5 --retry-delay 6 https://shopvivaliz.com.br/carrinho -o /tmp/carrinho.html
          curl -fLsS --retry 5 --retry-delay 6 https://shopvivaliz.com.br/checkout -o /tmp/checkout.html
          curl -fLsS --retry 5 --retry-delay 6 https://shopvivaliz.com.br/css/shopvivaliz-core-consolidated.css -o /tmp/core.css
          curl -fLsS --retry 5 --retry-delay 6 'https://shopvivaliz.com.br/api/agent/squad-chat.php?health=1' -o /tmp/liz-health.json

          test "$(wc -c < /tmp/home.html)" -gt 1000
          test "$(wc -c < /tmp/catalogo.html)" -gt 1000
          test "$(wc -c < /tmp/carrinho.html)" -gt 500
          test "$(wc -c < /tmp/checkout.html)" -gt 500
          test "$(wc -c < /tmp/core.css)" -gt 1000
          grep -qi 'Vivaliz' /tmp/home.html
          grep -qi 'produto\|catálogo\|catalogo' /tmp/catalogo.html

          test "$(curl -sS -o /dev/null -w '%{http_code}' https://www.shopvivaliz.com.br/)" = "301"
          test "$(curl -sS -o /dev/null -w '%{http_code}' https://shopvivaliz.com.br/ferramentas/)" = "301"
          test "$(curl -sS -o /dev/null -w '%{http_code}' https://shopvivaliz.com.br/arte-papelaria-e-armarinho/)" = "301"

          admin_code="$(curl -sS -o /tmp/admin.html -w '%{http_code}' https://shopvivaliz.com.br/admin/)"
          case "$admin_code" in
            200|301|302|303|307|308|401|403) ;;
            *) echo "::error::Admin returned unexpected HTTP $admin_code"; exit 1 ;;
          esac

          olist_code="$(curl -sS -o /tmp/olist.txt -w '%{http_code}' https://shopvivaliz.com.br/olist/webhook-receiver.php)"
          case "$olist_code" in
            200|204|400|401|403|405) ;;
            *) echo "::error::Olist webhook returned unexpected HTTP $olist_code"; exit 1 ;;
          esac

          php -r '
            $data = json_decode(file_get_contents("/tmp/liz-health.json"), true);
            if (!is_array($data)) { fwrite(STDERR, "Invalid Liz health JSON\n"); exit(1); }
            if (($data["ok"] ?? null) !== true) { fwrite(STDERR, "Liz health ok is not true\n"); exit(1); }
            if (($data["endpoint"] ?? null) !== "squad-chat") { fwrite(STDERR, "Unexpected endpoint\n"); exit(1); }
            if (empty($data["providers"]) || !is_array($data["providers"])) { fwrite(STDERR, "Providers missing\n"); exit(1); }
          '
