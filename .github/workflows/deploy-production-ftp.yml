name: Deploy production FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PHP syntax
        run: |
          set -Eeuo pipefail
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 php -l
      - name: Validate critical files
        run: |
          set -Eeuo pipefail
          test -s index.php
          test -s home.php
          test -s .htaccess
          test -s css/shopvivaliz-core-consolidated.css
          test -s includes/header.php
          test -s includes/footer.php
          test -s includes/catalog-runtime.php
          test -s api/olist/webhook-receiver.php

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy safely
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -Eeuo pipefail
          : "${FTP_SERVER:?Missing FTP_SERVER}"
          : "${FTP_USERNAME:?Missing FTP_USERNAME}"
          : "${FTP_PASSWORD:?Missing FTP_PASSWORD}"
          PORT="${FTP_PORT:-21}"
          REMOTE="${FTP_REMOTE_DIR:-/}"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$PORT" "$FTP_SERVER" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set net:max-retries 2
          set net:timeout 20
          mirror --reverse --verbose --only-newer --parallel=4 \
            --exclude-glob .git/** \
            --exclude-glob .github/** \
            --exclude-glob node_modules/** \
            --exclude-glob vendor/** \
            --exclude-glob storage/logs/** \
            --exclude-glob logs/** \
            --exclude-glob .env \
            ./ "$REMOTE"
          put -O "$REMOTE" .htaccess
          put -O "$REMOTE/includes" includes/header.php
          put -O "$REMOTE/includes" includes/footer.php
          put -O "$REMOTE/css" css/shopvivaliz-core-consolidated.css
          bye
          EOF

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for propagation
        run: sleep 20
      - name: Verify storefront and CSS
        run: |
          set -Eeuo pipefail
          curl -fLsS --retry 3 --retry-delay 5 https://shopvivaliz.com.br/ -o /tmp/home.html
          curl -fLsS --retry 3 --retry-delay 5 https://shopvivaliz.com.br/css/shopvivaliz-core-consolidated.css -o /tmp/core.css
          test "$(wc -c < /tmp/core.css)" -gt 1000
          grep -qi 'Vivaliz' /tmp/home.html
      - name: Verify canonical domain and health endpoints
        run: |
          set -Eeuo pipefail
          final_url="$(curl -LsS -o /dev/null -w '%{url_effective}' https://www.shopvivaliz.com.br/)"
          test "$final_url" = "https://shopvivaliz.com.br/"
          curl -fLsS --retry 3 --retry-delay 5 'https://shopvivaliz.com.br/api/olist/webhook-receiver.php?health=1'
