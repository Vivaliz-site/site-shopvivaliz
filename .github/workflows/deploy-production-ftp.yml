name: Deploy production FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PHP syntax
        run: |
          set -Eeuo pipefail
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 php -l

      - name: Validate production snapshot
        run: |
          set -Eeuo pipefail
          required=(
            index.php
            home.php
            catalogo.php
            carrinho.php
            checkout.php
            .htaccess
            css/shopvivaliz-core-consolidated.css
            includes/header.php
            includes/footer.php
            includes/navbar.php
            includes/catalog-runtime.php
            api/agent/squad-chat.php
            ferramentas/index.php
            arte-papelaria-e-armarinho/index.php
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "Missing critical file: $file"; exit 1; }
          done
          test -d assets
          test -d images
          test -d public/assets/liz-assistant

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y lftp jq

      - name: Deploy production snapshot
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -Eeuo pipefail
          : "${FTP_SERVER:?Missing FTP_SERVER}"
          : "${FTP_USERNAME:?Missing FTP_USERNAME}"
          : "${FTP_PASSWORD:?Missing FTP_PASSWORD}"

          PORT="$(printf '%s' "${FTP_PORT:-21}" | tr -cd '0-9')"
          PORT="${PORT:-21}"
          REMOTE="${FTP_REMOTE_DIR:-/}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$PORT" "$FTP_SERVER" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set net:max-retries 3
          set net:timeout 30
          set cmd:fail-exit true

          mkdir -p "$REMOTE/api"
          mkdir -p "$REMOTE/includes"
          mkdir -p "$REMOTE/css"
          mkdir -p "$REMOTE/js"
          mkdir -p "$REMOTE/assets"
          mkdir -p "$REMOTE/images"
          mkdir -p "$REMOTE/public/assets/liz-assistant"
          mkdir -p "$REMOTE/sobre"
          mkdir -p "$REMOTE/contato"
          mkdir -p "$REMOTE/faq"
          mkdir -p "$REMOTE/blog"
          mkdir -p "$REMOTE/politica-privacidade"
          mkdir -p "$REMOTE/ferramentas"
          mkdir -p "$REMOTE/arte-papelaria-e-armarinho"

          mirror --reverse --verbose --ignore-time --parallel=3 api "$REMOTE/api"
          mirror --reverse --verbose --ignore-time --parallel=3 includes "$REMOTE/includes"
          mirror --reverse --verbose --ignore-time --parallel=4 css "$REMOTE/css"
          mirror --reverse --verbose --ignore-time --parallel=4 js "$REMOTE/js"
          mirror --reverse --verbose --ignore-time --parallel=3 assets "$REMOTE/assets"
          mirror --reverse --verbose --ignore-time --parallel=3 images "$REMOTE/images"
          mirror --reverse --verbose --ignore-time --parallel=2 public/assets/liz-assistant "$REMOTE/public/assets/liz-assistant"
          mirror --reverse --verbose --ignore-time sobre "$REMOTE/sobre"
          mirror --reverse --verbose --ignore-time contato "$REMOTE/contato"
          mirror --reverse --verbose --ignore-time faq "$REMOTE/faq"
          mirror --reverse --verbose --ignore-time blog "$REMOTE/blog"
          mirror --reverse --verbose --ignore-time politica-privacidade "$REMOTE/politica-privacidade"
          mirror --reverse --verbose --ignore-time ferramentas "$REMOTE/ferramentas"
          mirror --reverse --verbose --ignore-time arte-papelaria-e-armarinho "$REMOTE/arte-papelaria-e-armarinho"

          mput -O "$REMOTE" *.php
          put -O "$REMOTE" .htaccess
          bye
          EOF

      - name: Purge Cloudflare cache when configured
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -Eeuo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured; skipping purge"
            exit 0
          fi
          zone_response="$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            'https://api.cloudflare.com/client/v4/zones?name=shopvivaliz.com.br&status=active')"
          zone_id="$(printf '%s' "$zone_response" | jq -r '.result[0].id // empty')"
          test -n "$zone_id"
          purge_response="$(curl -fsS -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/${zone_id}/purge_cache")"
          test "$(printf '%s' "$purge_response" | jq -r '.success')" = "true"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for propagation
        run: sleep 30

      - name: Verify storefront, CSS, redirects and Liz health
        run: |
          set -Eeuo pipefail
          curl -fLsS --retry 5 --retry-delay 6 https://shopvivaliz.com.br/ -o /tmp/home.html
          curl -fLsS --retry 5 --retry-delay 6 https://shopvivaliz.com.br/css/shopvivaliz-core-consolidated.css -o /tmp/core.css
          curl -fLsS --retry 5 --retry-delay 6 'https://shopvivaliz.com.br/api/agent/squad-chat.php?health=1' -o /tmp/liz-health.json

          test "$(wc -c < /tmp/home.html)" -gt 1000
          test "$(wc -c < /tmp/core.css)" -gt 1000
          grep -qi 'Vivaliz' /tmp/home.html

          test "$(curl -sS -o /dev/null -w '%{http_code}' https://www.shopvivaliz.com.br/)" = "301"
          test "$(curl -sS -o /dev/null -w '%{http_code}' https://shopvivaliz.com.br/ferramentas/)" = "301"
          test "$(curl -sS -o /dev/null -w '%{http_code}' https://shopvivaliz.com.br/arte-papelaria-e-armarinho/)" = "301"

          php -r '
            $data = json_decode(file_get_contents("/tmp/liz-health.json"), true);
            if (!is_array($data)) { fwrite(STDERR, "Invalid Liz health JSON\n"); exit(1); }
            if (($data["ok"] ?? null) !== true) { fwrite(STDERR, "Liz health ok is not true\n"); exit(1); }
            if (($data["endpoint"] ?? null) !== "squad-chat") { fwrite(STDERR, "Unexpected endpoint\n"); exit(1); }
            if (empty($data["providers"]) || !is_array($data["providers"])) { fwrite(STDERR, "Providers missing\n"); exit(1); }
          '
