name: Deploy Squad Chat

on:
  push:
    branches:
      - main
    paths:
      - 'api/agent/squad-chat.php'
      - 'admin/squad-chat.html'
      - 'admin/squad-chat.php'
      - 'api/agent/squad-canary.txt'
      - '.github/workflows/deploy-squad-chat.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write
  deployments: write

jobs:
  deploy:
    name: Upload Squad Chat para /public_html/dev/
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deletar sync state (força re-upload)
        shell: bash
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT:     ${{ secrets.FTP_PORT }}
        run: |
          python3 - <<'PYEOF'
          import os, ftplib

          server   = os.environ['FTP_SERVER']
          user     = os.environ['FTP_USERNAME']
          password = os.environ['FTP_PASSWORD']
          port     = int(os.environ.get('FTP_PORT') or 21)
          dev_dir  = '/'

          print(f"Conectando {server}:{port} ...")
          try:
              ftp = ftplib.FTP()
              ftp.connect(server, port, timeout=20)
              ftp.login(user, password)
              print(f"Login OK. Home: {ftp.pwd()}")
              ftp.cwd(dev_dir)
              print(f"CWD OK: {ftp.pwd()}")
              files = ftp.nlst()
              print(f"Arquivos: {files[:15]}")
              if '.ftp-deploy-sync-state.json' in files:
                  ftp.delete('.ftp-deploy-sync-state.json')
                  print("Sync state deletado.")
              else:
                  print("Sync state nao encontrado (OK).")
              ftp.quit()
          except Exception as e:
              print(f"Aviso: {e}")
          PYEOF

      - name: Gerar .env com chaves de API
        shell: bash
        run: |
          cat > .env <<'EOF'
          SQUAD_TOKEN=${{ secrets.SQUAD_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GH_REPO_TOKEN=${{ secrets.GH_REPO_TOKEN }}
          GH_REPO=fredmourao-ai/site-shopvivaliz
          EOF
          sed -i 's/^          //' .env
          chmod 600 .env
          echo ".env gerado com $(wc -l < .env) linhas."

      - name: Deploy via FTP Deploy Action
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          port:       ${{ secrets.FTP_PORT }}
          protocol:   ftp
          local-dir:  ./
          server-dir: /
          dangerous-clean-slate: false
          log-level:  verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/*.sql
            **/*.zip
            **/.env.*
            **/login_config.json
            **/*.duck
            **/*secret*
            **/*token*
            **/*password*
            **/*senha*

      - name: Verificar deploy
        shell: bash
        run: |
          sleep 15
          BASE="https://dev.shopvivaliz.com.br"
          CANARY=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/agent/squad-canary.txt")
          HEALTH=$(curl -s "$BASE/api/agent/squad-chat.php?health=1")
          echo "Canário HTTP: $CANARY"
          echo "Health: $HEALTH"
          if [ "$CANARY" = "200" ]; then
            echo " Deploy confirmado!"
          else
            echo " Canário ausente — ver log da FTP Action acima."
          fi
