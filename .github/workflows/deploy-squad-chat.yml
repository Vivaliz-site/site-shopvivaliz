name: Deploy Squad Chat

on:
  push:
    branches:
      - main
    paths:
      - 'api/agent/squad-chat.php'
      - 'admin/squad-chat.html'
      - 'admin/squad-chat.php'
      - 'api/agent/squad-canary.txt'
      - '.github/workflows/deploy-squad-chat.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Squad Chat
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deletar sync state via FTP (força re-upload)
        shell: bash
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_PORT:       ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          python3 - <<'PYEOF'
          import os, ftplib

          server   = os.environ['FTP_SERVER']
          user     = os.environ['FTP_USERNAME']
          password = os.environ['FTP_PASSWORD']
          port     = int(os.environ.get('FTP_PORT', 21) or 21)
          rdir     = os.environ.get('FTP_REMOTE_DIR', '/')

          print(f"Conectando a {server}:{port} ...")
          try:
              ftp = ftplib.FTP()
              ftp.connect(server, port, timeout=20)
              ftp.login(user, password)
              print(f"Login OK. Navegando para: {rdir}")
              ftp.cwd(rdir)
              files = ftp.nlst()
              print(f"Arquivos na raiz: {files[:10]}")
              if '.ftp-deploy-sync-state.json' in files:
                  ftp.delete('.ftp-deploy-sync-state.json')
                  print("Sync state deletado — FTP action vai re-enviar tudo.")
              else:
                  print("Sync state nao encontrado (primeira vez ou ja deletado).")
              ftp.quit()
          except Exception as e:
              print(f"Aviso FTP: {e}")
          PYEOF

      - name: Deploy via FTP Deploy Action
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          port:       ${{ secrets.FTP_PORT }}
          protocol:   ftp
          local-dir:  ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          log-level:  verbose
          include: |
            api/agent/squad-chat.php
            admin/squad-chat.html
            admin/squad-chat.php
            api/agent/squad-canary.txt

      - name: Verificar deploy
        shell: bash
        run: |
          sleep 15
          BASE="https://dev.shopvivaliz.com.br"
          CANARY=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/agent/squad-canary.txt")
          HEALTH=$(curl -s "$BASE/api/agent/squad-chat.php?health=1")
          echo "Canário HTTP: $CANARY"
          echo "Health: $HEALTH"
          if [ "$CANARY" = "200" ]; then
            echo "✅ Deploy confirmado!"
          else
            echo "⚠️ Canário ainda ausente. Ver log da FTP Action acima."
          fi
