name: Deploy Squad Chat

on:
  push:
    branches:
      - main
    paths:
      - 'api/agent/squad-chat.php'
      - 'admin/squad-chat.html'
      - 'admin/squad-chat.php'
      - 'api/agent/squad-canary.txt'
      - '.github/workflows/deploy-squad-chat.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Squad Chat via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnostico FTP e upload
        shell: bash
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_PORT:       ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          PORT="${FTP_PORT:-21}"

          echo "=== Diagnóstico ==="
          echo "FTP_SERVER: ${FTP_SERVER}"
          echo "FTP_PORT: ${PORT}"
          echo "FTP_REMOTE_DIR: ${FTP_REMOTE_DIR}"
          echo "FTP_USERNAME: ${FTP_USERNAME}"
          echo "Formato URL que será usada: ftp://SERVER:PORT/REMOTE_DIR/arquivo"
          echo "==================="

          # Testa conexão FTP simples antes de subir arquivos
          echo "Testando conexão FTP..."
          if curl -sv --connect-timeout 10 \
              "ftp://${FTP_SERVER}:${PORT}/" \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
              2>&1 | grep -E "Connected|226|530|Login|failed|refused"; then
            echo "Conexão FTP OK"
          else
            echo "⚠️ Problema na conexão FTP"
          fi

          # Tentativa de upload com URL exatamente igual ao SamKirkland action
          # (sem barra extra, sem double-slash)
          RDIR="${FTP_REMOTE_DIR}"
          # Garante barra no final
          [[ "${RDIR}" != */ ]] && RDIR="${RDIR}/"
          # Remove barra inicial se existir (curl FTP usa path relativo ao home do usuário)
          RDIR="${RDIR#/}"

          echo "RDIR normalizado: '${RDIR}'"

          upload_file() {
            local src="$1"
            local dst="$2"
            local url="ftp://${FTP_SERVER}:${PORT}/${RDIR}${dst}"
            echo "⬆ $src → $url"
            curl -v -T "$src" "$url" \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
              --ftp-create-dirs \
              --connect-timeout 30 \
              --max-time 120 \
              2>&1 | tail -20
            echo "Exit code curl: $?"
          }

          upload_file "api/agent/squad-canary.txt" "api/agent/squad-canary.txt"
          upload_file "api/agent/squad-chat.php"   "api/agent/squad-chat.php"
          upload_file "admin/squad-chat.html"       "admin/squad-chat.html"
          upload_file "admin/squad-chat.php"        "admin/squad-chat.php"

      - name: Verificar no servidor
        shell: bash
        run: |
          sleep 15
          BASE="https://dev.shopvivaliz.com.br"
          echo "=== Verificação ==="
          CANARY=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/agent/squad-canary.txt")
          echo "Canário HTTP: $CANARY"
          HEALTH=$(curl -s "$BASE/api/agent/squad-chat.php?health=1")
          echo "Health: $HEALTH"
