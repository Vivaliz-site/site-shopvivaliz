name: Deploy Squad Chat

on:
  push:
    branches:
      - main
    paths:
      - 'api/agent/squad-chat.php'
      - 'admin/squad-chat.html'
      - 'admin/squad-chat.php'
      - 'api/agent/squad-canary.txt'
      - '.github/workflows/deploy-squad-chat.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Squad Chat via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload arquivos via curl FTP
        shell: bash
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_PORT:       ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          PORT="${FTP_PORT:-21}"
          # Garante barra no final do diretório remoto
          RDIR="${FTP_REMOTE_DIR%/}/"

          upload() {
            local local_path="$1"
            local remote_file="$2"
            echo "⬆ Enviando $local_path"

            # Tenta FTPS primeiro (HostGator requer TLS), depois FTP simples
            if curl -s -T "$local_path" \
                "ftp://${FTP_SERVER}:${PORT}/${RDIR}${remote_file}" \
                --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
                --ssl --ftp-create-dirs \
                --connect-timeout 30 --max-time 120 \
                -w "  → %{size_upload} bytes (FTPS)\n"; then
              return 0
            fi

            echo "  FTPS falhou, tentando FTP simples..."
            curl -s -T "$local_path" \
              "ftp://${FTP_SERVER}:${PORT}/${RDIR}${remote_file}" \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
              --ftp-create-dirs \
              --connect-timeout 30 --max-time 120 \
              -w "  → %{size_upload} bytes (FTP)\n"
          }

          upload "api/agent/squad-chat.php"  "api/agent/squad-chat.php"
          upload "admin/squad-chat.html"      "admin/squad-chat.html"
          upload "admin/squad-chat.php"       "admin/squad-chat.php"
          upload "api/agent/squad-canary.txt" "api/agent/squad-canary.txt"

          echo "✅ Upload concluído."

      - name: Verificar deploy no servidor
        shell: bash
        run: |
          sleep 15
          BASE="https://dev.shopvivaliz.com.br"

          echo "--- Canário ---"
          if curl -fsS "$BASE/api/agent/squad-canary.txt" | grep -q "squad-canary-ok"; then
            echo "✅ FTP no caminho correto."
          else
            echo "⚠️ Canário não encontrado em $BASE/api/agent/squad-canary.txt"
            echo "Resposta recebida:"
            curl -s "$BASE/api/agent/squad-canary.txt" | head -3
          fi

          echo "--- Health Squad Chat ---"
          HEALTH=$(curl -s "$BASE/api/agent/squad-chat.php?health=1")
          echo "$HEALTH"
