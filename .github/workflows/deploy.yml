name: Deploy Automático Cyberduck - Shop Vivaliz

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Sincronizar com a HostGator
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Sincronizar via Cyberduck CLI
      uses: iterate-ch/cyberduck-cli-action@v1
      env:
        USERNAME: ${{ secrets.FTP_USERNAME }}
        PASSWORD: ${{ secrets.FTP_PASSWORD }}
      with:
        mode: synchronize
        url: ftp://${{ secrets.FTP_SERVER }}/public_html/
        path: ./
        args: --assumeyes --quiet
