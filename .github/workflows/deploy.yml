name: Deploy Automtico Seguro - Shop Vivaliz

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write
  issues: write
  deployments: write

concurrency:
  group: shopvivaliz-deploy-dev
  cancel-in-progress: false

jobs:
  web-deploy:
    name: Sincronizar com a HostGator Dev
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar o cdigo do repositrio
        uses: actions/checkout@v4.2.2

      - name: Validar secrets obrigatrios
        shell: bash
        run: |
          missing=0

          check_required_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Secret obrigatrio ausente: $name"
              missing=1
            else
              echo "Secret obrigatrio configurado: $name"
            fi
          }

          check_optional_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::warning::Secret opcional ausente: $name. O deploy continuar, mas o provider correspondente ficar indisponvel."
            else
              echo "Secret opcional configurado: $name"
            fi
          }

          check_required_secret "FTP_SERVER" "${{ secrets.FTP_SERVER }}"
          check_required_secret "FTP_USERNAME" "${{ secrets.FTP_USERNAME }}"
          check_required_secret "FTP_PASSWORD" "${{ secrets.FTP_PASSWORD }}"
          check_required_secret "FTP_PORT" "${{ secrets.FTP_PORT }}"
          check_required_secret "FTP_REMOTE_DIR" "${{ secrets.FTP_REMOTE_DIR }}"
          check_required_secret "SQUAD_TOKEN" "${{ secrets.SQUAD_TOKEN }}"

          check_optional_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"
          check_optional_secret "OPENAI_API_KEY" "${{ secrets.OPENAI_API_KEY }}"
          check_optional_secret "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Gerar .env temporrio para o ambiente dev
        shell: bash
        run: |
          cat > .env <<'EOF'
          SQUAD_TOKEN=${{ secrets.SQUAD_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOF
          sed -i 's/^          //' .env
          chmod 600 .env
          echo "Arquivo .env temporrio gerado para deploy. Contedo omitido."

      - name: Enviar via FTP Deploy Action
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/*.sql
            **/*.zip
            **/.env.*
            **/login_config.json
            **/*.duck
            **/*secret*
            **/*token*
            **/*password*
            **/*senha*

      - name: Aguardar publicao no servidor
        run: sleep 20

      - name: Teste ps-deploy bsico e Squad real
        env:
          SQUAD_TOKEN: ${{ secrets.SQUAD_TOKEN }}
        shell: bash
        run: |
          BASE="https://dev.shopvivaliz.com.br"
          DEPLOY_FAILED=false

          echo "Testando home do ambiente dev..."
          if ! curl -fsS "$BASE/" >/dev/null; then
            echo " Falha ao acessar a home do ambiente dev."
            DEPLOY_FAILED=true
          else
            echo " Home dev acessvel."
          fi

          echo "Testando health pblico do Squad Chat..."
          if curl -fsS "$BASE/api/agent/squad-chat.php?health=1" -o /tmp/squad-health.json; then
            if grep -q '"endpoint":"squad-chat"' /tmp/squad-health.json; then
              echo " Squad Chat health respondeu."
              jq -r '.providers | to_entries[] | "Provider \(.key): configured=\(.value.configured) model=\(.value.model)"' /tmp/squad-health.json || echo " jq no disponvel para resumir health."
            else
              echo " Squad Chat health no contm endpoint esperado."
              cat /tmp/squad-health.json
            fi
          else
            echo " Squad Chat health falhou. No bloqueando deploy."
          fi

          echo "Pedindo teste real aos agentes do Squad Chat..."
          cat > /tmp/squad-payload.json <<'JSON'
          {
            "message": "Teste real dos agentes executado pelo GitHub Actions. Cada agente deve responder somente: nome, provider, model, ok=true ou erro. No simule.",
            "agents": ["director", "claude", "gpt", "gemini"],
            "history": []
          }
          JSON
          sed -i 's/^          //' /tmp/squad-payload.json

          if curl -fsS \
            -H "Content-Type: application/json" \
            -H "X-Squad-Token: ${SQUAD_TOKEN}" \
            --data-binary @/tmp/squad-payload.json \
            "$BASE/api/agent/squad-chat.php" \
            -o /tmp/squad-response.json; then
            echo " Squad Chat POST respondeu. Resumo sanitizado:"
            jq -r '"cycle_id= " + (.cycle_id // "n/a"), (.responses[]? | "\(.name) | provider=\(.provider) | model=\(.model) | ok=\(.ok) | text=\(.text // "" | .[0:180])")' /tmp/squad-response.json || echo " jq no disponvel para resumir resposta."
            if grep -q '"provider":"openai"' /tmp/squad-response.json && grep -q '"provider":"gemini"' /tmp/squad-response.json && grep -q '"provider":"anthropic"' /tmp/squad-response.json; then
              echo " Providers reais identificados na resposta do Squad."
            else
              echo " Nem todos os providers foram identificados na resposta. Verificar resumo acima."
            fi
          else
            echo " Squad Chat POST falhou. No bloqueando deploy para manter publicao segura."
          fi

          echo "Testando arquivo de validao do CNPJ, se existir..."
          if curl -fsS "$BASE/cnpj-rodape-teste.html" | grep -q "49.903.300/0001-70"; then
            echo " CNPJ validado no arquivo de teste."
          else
            echo " Arquivo de CNPJ no encontrado ou contedo diferente. No bloqueando deploy."
          fi

          echo "Testando agente Olist, se existir..."
          if curl -fsS "$BASE/api/agent/olist-zero-id-repair.php" | grep -q '"agent"'; then
            echo " Agente Olist respondeu."
          else
            echo " Agente Olist no disponvel. No bloqueando deploy."
          fi

          echo "Testando agente de manual do admin, se existir..."
          if curl -fsS "$BASE/api/agent/admin-manual-audit.php" | grep -q 'admin_manual_audit'; then
            echo " Agente de manual do admin respondeu."
          else
            echo " Agente de manual do admin no disponvel. No bloqueando deploy."
          fi

          if [ "$DEPLOY_FAILED" = true ]; then
            echo " Deploy publicado, mas teste bsico falhou."
            exit 1
          fi

          echo " Deploy concludo com sucesso."

      - name: Diagnstico de IA em caso de falha
        if: failure()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          echo " Workflow falhou. Iniciando diagnstico se o arquivo existir."

          if [ -f "ai_collaboration.py" ]; then
            python -m pip install --upgrade pip
            pip install google-genai openai anthropic
            python ai_collaboration.py --modo diagnostico
          else
            echo " ai_collaboration.py no encontrado. Diagnstico de IA ignorado."
          fi
