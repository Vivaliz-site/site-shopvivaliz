name: Deploy Automático Cyberduck - Shop Vivaliz

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Sincronizar com a HostGator
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Instalar Cyberduck CLI (duck)
      run: |
        echo "deb https://amazonaws.com bionic main" | sudo tee /etc/apt/sources.list.d/cyberduck.list
        sudo apt-key adv --keyserver ://ubuntu.com --recv-keys FE7097963EFC5B16 || true
        sudo apt-get update
        sudo apt-get install duck -y

    - name: Executar Sincronizacao via FTP
      run: |
        duck --synchronize ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/public_html/ ./ --assumeyes --quiet
