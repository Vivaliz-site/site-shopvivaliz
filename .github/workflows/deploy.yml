name: Deploy Automático Seguro - Shop Vivaliz

on:
  # Gatilhos automáticos pausados temporariamente para economizar quota do GitHub Actions.
  # Reativar após estabilização dos secrets e do fluxo de deploy.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write
  issues: write
  deployments: write

concurrency:
  group: shopvivaliz-deploy-dev
  cancel-in-progress: true

jobs:
  web-deploy:
    name: Sincronizar com a HostGator Dev
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4.2.2

      - name: Validar secrets obrigatórios
        shell: bash
        run: |
          missing=0

          check_required_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Secret obrigatório ausente: $name"
              missing=1
            else
              echo "Secret obrigatório configurado: $name"
            fi
          }

          check_optional_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::warning::Secret opcional ausente: $name. O deploy continuará, mas o provider correspondente ficará indisponível."
            else
              echo "Secret opcional configurado: $name"
            fi
          }

          check_required_secret "FTP_SERVER" "${{ secrets.FTP_SERVER }}"
          check_required_secret "FTP_USERNAME" "${{ secrets.FTP_USERNAME }}"
          check_required_secret "FTP_PASSWORD" "${{ secrets.FTP_PASSWORD }}"
          check_required_secret "FTP_PORT" "${{ secrets.FTP_PORT }}"
          check_required_secret "FTP_REMOTE_DIR" "${{ secrets.FTP_REMOTE_DIR }}"
          check_optional_secret "SQUAD_TOKEN" "${{ secrets.SQUAD_TOKEN }}"
          check_optional_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"
          check_optional_secret "OPENAI_API_KEY" "${{ secrets.OPENAI_API_KEY }}"
          check_optional_secret "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
          check_optional_secret "DB_HOST" "${{ secrets.DB_HOST }}"
          check_optional_secret "DB_NAME" "${{ secrets.DB_NAME }}"
          check_optional_secret "DB_USER" "${{ secrets.DB_USER }}"
          check_optional_secret "DB_PASS" "${{ secrets.DB_PASS }}"
          check_optional_secret "DB_PORT" "${{ secrets.DB_PORT }}"
          check_optional_secret "MELHORENVIO_ACCESS_TOKEN" "${{ secrets.MELHORENVIO_ACCESS_TOKEN }}"
          check_optional_secret "MELHORENVIO_API_KEY" "${{ secrets.MELHORENVIO_API_KEY }}"
          check_optional_secret "MELHORENVIO_FROM_POSTAL_CODE" "${{ secrets.MELHORENVIO_FROM_POSTAL_CODE }}"
          check_optional_secret "PAGARME_SECRET_KEY" "${{ secrets.PAGARME_SECRET_KEY }}"
          check_optional_secret "PAGARME_API_KEY" "${{ secrets.PAGARME_API_KEY }}"
          check_optional_secret "PAGARME_PUBLIC_KEY" "${{ secrets.PAGARME_PUBLIC_KEY }}"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Gerar .env temporário para o ambiente dev
        shell: bash
        run: |
          cat > .env <<'EOF'
          SQUAD_TOKEN=${{ secrets.SQUAD_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          MELHORENVIO_ACCESS_TOKEN=${{ secrets.MELHORENVIO_ACCESS_TOKEN }}
          MELHORENVIO_API_KEY=${{ secrets.MELHORENVIO_API_KEY }}
          MELHORENVIO_FROM_POSTAL_CODE=${{ secrets.MELHORENVIO_FROM_POSTAL_CODE }}
          PAGARME_SECRET_KEY=${{ secrets.PAGARME_SECRET_KEY }}
          PAGARME_API_KEY=${{ secrets.PAGARME_API_KEY }}
          PAGARME_PUBLIC_KEY=${{ secrets.PAGARME_PUBLIC_KEY }}
          APP_ENV=development
          BASE_URL=https://dev.shopvivaliz.com.br
          LOJA_PIX_KEY=${{ secrets.LOJA_PIX_KEY }}
          LOJA_PIX_NAME=${{ secrets.LOJA_PIX_NAME }}
          LOJA_WHATSAPP=${{ secrets.LOJA_WHATSAPP }}
          TOKEN_API_OLIST=${{ secrets.TOKEN_API_OLIST }}
          OLIST_CLIENT_ID=${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET=${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN=${{ secrets.OLIST_REFRESH_TOKEN }}
          EOF
          sed -i 's/^          //' .env
          chmod 600 .env
          echo "Arquivo .env temporário gerado para deploy. Conteúdo omitido."

      - name: Enviar via FTP Deploy Action
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/.codex/**
            **/.vscode/**
            **/node_modules/**
            **/vendor/**
            **/__pycache__/**
            **/storage/olist-images/**
            **/storage/reports/**
            **/storage/runtime/**
            **/uploads/olist/**
            **/reports/**
            **/logs/**
            **/*.sql
            **/*.zip
            **/*.log
            **/tmp_*.json
            **/.env.*
            **/login_config.json
            **/*.duck
            **/*secret*
            **/*token*
            **/*password*
            **/*senha*
            medusa/**
            claude/medusa/**
            imports/**
            automation/**
            scripts/**
            requirements.txt
            ai_collaboration.py
            ai_collaboration_report*.md

      - name: Aguardar publicação no servidor
        run: sleep 20

      - name: Teste pós-deploy básico e Squad real
        env:
          SQUAD_TOKEN: ${{ secrets.SQUAD_TOKEN }}
        shell: bash
        run: |
          BASE="https://dev.shopvivaliz.com.br"
          DEPLOY_FAILED=false

          echo "Testando home do ambiente dev..."
          if ! curl -fsS "$BASE/" >/dev/null; then
            echo " Falha ao acessar a home do ambiente dev."
            DEPLOY_FAILED=true
          else
            echo " Home dev acessível."
          fi

          echo "Testando health público básico..."
          if curl -fsS "$BASE/api/health.php" -o /tmp/app-health.json; then
            if grep -q '"ok":true' /tmp/app-health.json; then
              echo " App health respondeu."
            else
              echo " App health respondeu sem payload esperado."
              cat /tmp/app-health.json
            fi
          else
            echo " App health não disponível. Seguindo com smoke do Squad."
          fi

          echo "Testando health público do Squad Chat..."
          if curl -fsS "$BASE/api/agent/squad-chat.php?health=1" -o /tmp/squad-health.json; then
            if grep -q '"endpoint":"squad-chat"' /tmp/squad-health.json; then
              echo " Squad Chat health respondeu."
              jq -r '.providers | to_entries[] | "Provider \(.key): configured=\(.value.configured) model=\(.value.model)"' /tmp/squad-health.json || echo " jq não disponível para resumir health."
            else
              echo " Squad Chat health não contém endpoint esperado."
              cat /tmp/squad-health.json
            fi
          else
            echo " Squad Chat health falhou. Não bloqueando deploy."
          fi

          echo "Pedindo teste real aos agentes do Squad Chat..."
          cat > /tmp/squad-payload.json <<'JSON'
          {
            "message": "Teste real dos agentes executado pelo GitHub Actions. Cada agente deve responder somente: nome, provider, model, ok=true ou erro. Não simule.",
            "agents": ["director", "claude", "gpt", "gemini"],
            "history": []
          }
          JSON
          sed -i 's/^          //' /tmp/squad-payload.json

          if curl -fsS \
            -H "Content-Type: application/json" \
            -H "X-Squad-Token: ${SQUAD_TOKEN}" \
            --data-binary @/tmp/squad-payload.json \
            "$BASE/api/agent/squad-chat.php" \
            -o /tmp/squad-response.json; then
            echo " Squad Chat POST respondeu. Resumo sanitizado:"
            jq -r '"cycle_id= " + (.cycle_id // "n/a"), (.responses[]? | "\(.name) | provider=\(.provider) | model=\(.model) | ok=\(.ok) | text=\(.text // "" | .[0:180])")' /tmp/squad-response.json || echo " jq não disponível para resumir resposta."
            if grep -q '"provider":"openai"' /tmp/squad-response.json && grep -q '"provider":"gemini"' /tmp/squad-response.json && grep -q '"provider":"anthropic"' /tmp/squad-response.json; then
              echo " Providers reais identificados na resposta do Squad."
            else
              echo " Nem todos os providers foram identificados na resposta. Verificar resumo acima."
            fi
          else
            echo " Squad Chat POST falhou. Não bloqueando deploy para manter publicação segura."
          fi

          echo "Testando arquivo de validação do CNPJ, se existir..."
          if curl -fsS "$BASE/cnpj-rodape-teste.html" | grep -q "49.903.300/0001-70"; then
            echo " CNPJ validado no arquivo de teste."
          else
            echo " Arquivo de CNPJ não encontrado ou conteúdo diferente. Não bloqueando deploy."
          fi

          echo "Testando agente Olist, se existir..."
          if curl -fsS "$BASE/api/agent/olist-zero-id-repair.php" | grep -q '"agent"'; then
            echo " Agente Olist respondeu."
          else
            echo " Agente Olist não disponível. Não bloqueando deploy."
          fi

          echo "Testando agente de manual do admin, se existir..."
          if curl -fsS "$BASE/api/agent/admin-manual-audit.php" | grep -q 'admin_manual_audit'; then
            echo " Agente de manual do admin respondeu."
          else
            echo " Agente de manual do admin não disponível. Não bloqueando deploy."
          fi

          if [ "$DEPLOY_FAILED" = true ]; then
            echo " Deploy publicado, mas teste básico falhou."
            exit 1
          fi

          echo " Deploy concluído com sucesso."

      - name: Diagnóstico de IA em caso de falha
        if: failure()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          echo " Workflow falhou. Iniciando diagnóstico se o arquivo existir."

          if [ -f "ai_collaboration.py" ]; then
            python -m pip install --upgrade pip
            pip install google-genai openai anthropic
            python ai_collaboration.py --modo diagnostico
          else
            echo " ai_collaboration.py não encontrado. Diagnóstico de IA ignorado."
          fi
