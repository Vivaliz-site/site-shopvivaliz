name: Deploy Automático Seguro - Shop Vivaliz

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Sincronizar com a HostGator Dev
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4.2.2

      - name: Enviar via FTP Deploy Action
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/*.sql
            **/*.zip

      - name: Aguardar publicação no servidor
        run: sleep 20

      - name: Instalar Dependências das IAs
        run: |
          pip install google-genai openai

      - name: Agente de testes pós-deploy com Diagnóstico de IA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          BASE="https://shopvivaliz.com.br"
          DEPLOY_FAILED=false
          
          echo "Testando página de publicação..."
          if ! curl -fsS "$BASE/cnpj-rodape-teste.html" | grep -q "49.903.300/0001-70"; then
            echo "❌ Falha ao validar o CNPJ no rodapé!"
            DEPLOY_FAILED=true
          fi
          
          echo "Testando agente Olist zero id..."
          if ! curl -fsS "$BASE/api/agent/olist-zero-id-repair.php" | tee olist-zero-id-repair.json | grep -q '"agent"'; then
            echo "❌ Falha no teste do agente Olist!"
            DEPLOY_FAILED=true
          fi
          
          echo "Testando agente de manual do admin..."
          if ! curl -fsS "$BASE/api/agent/admin-manual-audit.php" | grep -q 'admin_manual_audit'; then
            echo "❌ Falha no agente de manual do admin!"
            DEPLOY_FAILED=true
          fi

          if [ "$DEPLOY_FAILED" = true ]; then
            echo "🚨 Iniciando diagnóstico conjunto: Gemini + ChatGPT..."
            python ai_collaboration.py
            echo "❌ Deploy finalizado com erros. O relatório da IA foi gerado nos logs."
            exit 1
          else
            echo "✅ Todos os testes pós-deploy passaram com sucesso!"
          fi
