name: Deploy Automático Seguro - Shop Vivaliz

# Desativado o gatilho automatico em push: a producao real e a VM Oracle
# (shopvivaliz.com.br -> 137.131.156.17, sincronizada via cron
# git-auto-sync.py), nao o HostGator. Mantido workflow_dispatch para
# rodar manualmente se o HostGator voltar a ser usado no futuro.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shopvivaliz-deploy-dev
  cancel-in-progress: true

jobs:
  validate-secrets:
    name: Validar Secrets Obrigatórios
    if: ${{ vars.ENABLE_GITHUB_HOSTED_RUNNERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      secrets_valid: ${{ steps.validate.outputs.valid }}
    
    steps:
      - name: Validar Secrets com Fallback
        id: validate
        shell: bash
        run: |
          validate_secret() {
            local value="$1"
            local display_name="$2"
            if [ -n "$value" ]; then
              echo "Secret obrigatório ENCONTRADO: $display_name"
              return 0
            fi
            echo "::error::Secret OBRIGATÓRIO NÃO ENCONTRADO: $display_name"
            return 1
          }
          
          MISSING=0
          
          # Validar secrets canônicos
          validate_secret \
            "${{ secrets.FTP_SERVER }}" \
            "FTP_SERVER" || MISSING=$((MISSING+1))
          
          validate_secret \
            "${{ secrets.FTP_USERNAME }}" \
            "FTP_USERNAME" || MISSING=$((MISSING+1))
          
          validate_secret \
            "${{ secrets.FTP_PASSWORD }}" \
            "FTP_PASSWORD" || MISSING=$((MISSING+1))
          
          # Validar FTP_PORT (tem padrão)
          if [ -n "${{ secrets.FTP_PORT }}" ]; then
            echo "Secret obrigatório ENCONTRADO: FTP_PORT"
          else
            echo "ℹ FTP_PORT não configurado, usando padrão: 21"
          fi
          
          # Validar FTP_REMOTE_DIR
          validate_secret \
            "${{ secrets.FTP_REMOTE_DIR }}" \
            "FTP_REMOTE_DIR" || MISSING=$((MISSING+1))

          if [ -n "${{ secrets.DB_HOST }}" ]; then
            echo "Secret opcional ENCONTRADO: DB_HOST"
          else
            echo "::warning::DB_HOST não configurado no repositório"
          fi

          if [ -n "${{ secrets.DB_NAME }}" ] || [ -n "${{ secrets.DB_DATABASE }}" ]; then
            echo "Secret opcional ENCONTRADO: DB_NAME/DB_DATABASE"
          else
            echo "::warning::DB_NAME/DB_DATABASE não configurado no repositório"
          fi

          if [ -n "${{ secrets.DB_USER }}" ] || [ -n "${{ secrets.DB_USERNAME }}" ]; then
            echo "Secret opcional ENCONTRADO: DB_USER/DB_USERNAME"
          else
            echo "::warning::DB_USER/DB_USERNAME não configurado no repositório"
          fi

          if [ -n "${{ secrets.DB_PASS }}" ] || [ -n "${{ secrets.DB_PASSWORD }}" ]; then
            echo "Secret opcional ENCONTRADO: DB_PASS/DB_PASSWORD"
          else
            echo "::warning::DB_PASS/DB_PASSWORD não configurado no repositório"
          fi
          
          if [ "$MISSING" -eq 0 ]; then
            # Validar GH_REPO_TOKEN (para operações que exigem mais permissões que o GITHUB_TOKEN padrão)
            if [ -n "${{ secrets.GH_REPO_TOKEN }}" ]; then
              echo "Secret obrigatório ENCONTRADO: GH_REPO_TOKEN"
            else
              echo "::warning::Secret GH_REPO_TOKEN não configurado. Operações que exigem permissões elevadas (ex: criar webhooks) podem falhar."
            fi

            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo ""
            echo "✓ Todos os secrets obrigatórios foram encontrados!"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "::error::$MISSING secrets obrigatórios estão faltando!"
            echo ""
            echo "Configure os secrets no GitHub:"
            echo "  Settings → Secrets and variables → Actions"
            echo ""
            echo "Secrets esperados:"
            echo "  • FTP_SERVER"
            echo "  • FTP_USERNAME"
            echo "  • FTP_PASSWORD"
            echo "  • FTP_PORT (padrão: 21)"
            echo "  • FTP_REMOTE_DIR"
            echo "  • GH_REPO_TOKEN (para operações de repositório com permissões elevadas)"
            exit 1
          fi

  web-deploy:
    name: Sincronizar com a HostGator Dev
    needs: validate-secrets
    if: ${{ vars.ENABLE_GITHUB_HOSTED_RUNNERS == 'true' && needs.validate-secrets.outputs.secrets_valid == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FTP_SERVER_VALUE: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME_VALUE: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD_VALUE: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT_VALUE: ${{ secrets.FTP_PORT }}
      FTP_REMOTE_DIR_VALUE: ${{ secrets.FTP_REMOTE_DIR }}
      DB_HOST_VALUE: ${{ secrets.DB_HOST }}
      DB_PORT_VALUE: ${{ secrets.DB_PORT }}
      DB_NAME_VALUE: ${{ secrets.DB_NAME != '' && secrets.DB_NAME || secrets.DB_DATABASE }}
      DB_USER_VALUE: ${{ secrets.DB_USER != '' && secrets.DB_USER || secrets.DB_USERNAME }}
      DB_PASS_VALUE: ${{ secrets.DB_PASS != '' && secrets.DB_PASS || secrets.DB_PASSWORD }}
      OLIST_ACCESS_TOKEN_VALUE: ${{ secrets.OLIST_ACCESS_TOKEN != '' && secrets.OLIST_ACCESS_TOKEN || secrets.TINY_ACCESS_TOKEN }}
      OLIST_REFRESH_TOKEN_VALUE: ${{ secrets.OLIST_REFRESH_TOKEN != '' && secrets.OLIST_REFRESH_TOKEN || secrets.TINY_REFRESH_TOKEN }}
      OLIST_CLIENT_ID_VALUE: ${{ secrets.OLIST_CLIENT_ID != '' && secrets.OLIST_CLIENT_ID || secrets.TINY_CLIENT_ID }}
      OLIST_CLIENT_SECRET_VALUE: ${{ secrets.OLIST_CLIENT_SECRET != '' && secrets.OLIST_CLIENT_SECRET || secrets.TINY_CLIENT_SECRET }}
      LOJA_WHATSAPP_VALUE: ${{ secrets.LOJA_WHATSAPP }}
      LOJA_PIX_KEY_VALUE: ${{ secrets.LOJA_PIX_KEY }}
      LOJA_PIX_NAME_VALUE: ${{ secrets.LOJA_PIX_NAME }}
      RUNTIME_AGENT_KEY_VALUE: ${{ secrets.SHOPVIVALIZ_AGENT_KEY != '' && secrets.SHOPVIVALIZ_AGENT_KEY || secrets.AGENT_KEY != '' && secrets.AGENT_KEY || secrets.WATCHDOG_AGENT_KEY != '' && secrets.WATCHDOG_AGENT_KEY || secrets.AUTONOMOUS_AGENT_KEY }}
      MELHORENVIO_ACCESS_TOKEN_VALUE: ${{ secrets.MELHORENVIO_ACCESS_TOKEN != '' && secrets.MELHORENVIO_ACCESS_TOKEN || secrets.SHOPVIVALIZ_MELHORENVIO_ACCESS_TOKEN }}
      MELHORENVIO_FROM_POSTAL_CODE_VALUE: ${{ secrets.MELHORENVIO_FROM_POSTAL_CODE }}
      ML_CLIENT_ID_VALUE: ${{ secrets.ML_CLIENT_ID }}
      ML_CLIENT_SECRET_VALUE: ${{ secrets.ML_CLIENT_SECRET }}
      ML_REDIRECT_URI_VALUE: ${{ secrets.ML_REDIRECT_URI }}

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v7

      - name: Gerar arquivo de runtime com secrets do servidor
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          path = Path("config/runtime-secrets.php")
          values = {"APP_ENV": "production"}
          optional = {
              "DB_HOST": os.environ.get("DB_HOST_VALUE", ""),
              "DB_PORT": os.environ.get("DB_PORT_VALUE", ""),
              "DB_NAME": os.environ.get("DB_NAME_VALUE", ""),
              "DB_USER": os.environ.get("DB_USER_VALUE", ""),
              "DB_PASS": os.environ.get("DB_PASS_VALUE", ""),
              "OLIST_ACCESS_TOKEN": os.environ.get("OLIST_ACCESS_TOKEN_VALUE", ""),
              "OLIST_REFRESH_TOKEN": os.environ.get("OLIST_REFRESH_TOKEN_VALUE", ""),
              "OLIST_CLIENT_ID": os.environ.get("OLIST_CLIENT_ID_VALUE", ""),
              "OLIST_CLIENT_SECRET": os.environ.get("OLIST_CLIENT_SECRET_VALUE", ""),
              "LOJA_WHATSAPP": os.environ.get("LOJA_WHATSAPP_VALUE", ""),
              "LOJA_PIX_KEY": os.environ.get("LOJA_PIX_KEY_VALUE", ""),
              "LOJA_PIX_NAME": os.environ.get("LOJA_PIX_NAME_VALUE", ""),
              "SHOPVIVALIZ_AGENT_KEY": os.environ.get("RUNTIME_AGENT_KEY_VALUE", ""),
              "MELHORENVIO_ACCESS_TOKEN": os.environ.get("MELHORENVIO_ACCESS_TOKEN_VALUE", ""),
              "MELHORENVIO_FROM_POSTAL_CODE": os.environ.get("MELHORENVIO_FROM_POSTAL_CODE_VALUE", ""),
              "ML_CLIENT_ID": os.environ.get("ML_CLIENT_ID_VALUE", ""),
              "ML_CLIENT_SECRET": os.environ.get("ML_CLIENT_SECRET_VALUE", ""),
              "ML_REDIRECT_URI": os.environ.get("ML_REDIRECT_URI_VALUE", ""),
          }
          for key, value in optional.items():
              if value:
                  values[key] = value

          def export(value: str) -> str:
              return value.replace("\\", "\\\\").replace("'", "\\'")

          lines = ["<?php", "return ["]
          for key, value in values.items():
              lines.append(f"    '{key}' => '{export(value)}',")
          lines.append("];")
          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Testar Conexão FTP
        shell: bash
        run: |
          # Testar conectividade básica (sem enviar arquivos)
          # Usa curl para FTP (mais seguro que ftplib)
          
          echo "Testando conexão FTP..."
          echo "Host: ***"
          RAW_SERVER="$(printf '%s' "${FTP_SERVER_VALUE}" | tr -d '\r\n\t ' )"
          RAW_PORT="$(printf '%s' "${FTP_PORT_VALUE:-21}" | tr -cd '0-9')"
          PORT="${RAW_PORT:-21}"
          echo "Port: ${PORT}"
          echo "User: ***"
          echo ""

          FTP_HOST="${RAW_SERVER#ftp://}"
          FTP_HOST="${FTP_HOST#ftps://}"
          FTP_HOST="${FTP_HOST%%/*}"
          FTP_HOST="${FTP_HOST%%:*}"

          if [ -z "$FTP_HOST" ] || [[ "$FTP_HOST" == *"://"* ]]; then
            echo "::error::FTP_SERVER invalido. Use apenas o host, exemplo: ftp.shopvivaliz.com.br"
            exit 1
          fi

          if ! [[ "$PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::FTP_PORT invalido. Use apenas numeros, exemplo: 21"
            exit 1
          fi
          
          # Timeout: 10 segundos
          if ! timeout 10 curl -sS \
            --user "${FTP_USERNAME_VALUE}:${FTP_PASSWORD_VALUE}" \
            --connect-timeout 10 \
            "ftp://${FTP_HOST}:${PORT}/" \
            --list-only \
            -o /dev/null 2>&1; then
            
            echo "::error::Falha ao conectar ao servidor FTP"
            echo "Verifique:"
            echo "  • FTP_SERVER está correto?"
            echo "  • FTP_USERNAME e FTP_PASSWORD estão válidos?"
            echo "  • FTP_PORT está aberto?"
            echo "  • Firewall permite conexão?"
            exit 1
          fi
          
          echo "✓ Conexão FTP bem-sucedida"

      - name: Normalizar Parâmetros FTP
        id: ftp-normalize
        shell: bash
        run: |
          RAW_SERVER="$(printf '%s' "${FTP_SERVER_VALUE}" | tr -d '\r\n\t ' )"
          RAW_PORT="$(printf '%s' "${FTP_PORT_VALUE:-21}" | tr -cd '0-9')"
          RAW_DIR="$(printf '%s' "${FTP_REMOTE_DIR_VALUE}" | tr -d '\r' )"

          FTP_HOST="${RAW_SERVER#ftp://}"
          FTP_HOST="${FTP_HOST#ftps://}"
          FTP_HOST="${FTP_HOST%%/*}"
          FTP_HOST="${FTP_HOST%%:*}"

          if [ -z "$RAW_DIR" ]; then
            RAW_DIR="/"
          fi

          echo "server=${FTP_HOST}" >> "$GITHUB_OUTPUT"
          echo "port=${RAW_PORT:-21}" >> "$GITHUB_OUTPUT"
          echo "remote_dir=${RAW_DIR}" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp-normalize.outputs.server }}
          username: ${{ env.FTP_USERNAME_VALUE }}
          password: ${{ env.FTP_PASSWORD_VALUE }}
          port: ${{ steps.ftp-normalize.outputs.port }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.ftp-normalize.outputs.remote_dir }}
          dangerous-clean-slate: false
          exclude: |
            .git/**
            .github/**
            .claude/**
            .codex/**
            .vscode/**
            .venv/**
            claude/**
            medusa/**
            node_modules/**
            vendor/**
            reports/**
            docs/**
            logs/**
            tests/**
            **/__pycache__/**
            **/*.pyc
            **/.env
            **/.env.*
            **/*.log

      - name: Resetar OPCache do PHP publicado
        shell: bash
        run: |
          if [ -z "${RUNTIME_AGENT_KEY_VALUE}" ]; then
            echo "::warning::Agent key ausente para reset de OPCache"
            exit 0
          fi

          mkdir -p reports
          RESET_URL="https://shopvivaliz.com.br/api/maintenance/opcache-reset.php?agent_key=${RUNTIME_AGENT_KEY_VALUE}"
          HTTP_CODE=$(curl -sS -L \
            --max-time 20 \
            --retry 2 \
            --retry-delay 3 \
            --retry-all-errors \
            -H "Accept: application/json" \
            -o reports/opcache-reset.json \
            -w "%{http_code}" \
            "$RESET_URL")

          cat reports/opcache-reset.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::warning::Reset de OPCache retornou HTTP $HTTP_CODE"
          fi

      - name: Smoke test
        shell: bash
        run: |
          echo "Executando smoke test..."
          
          # Retry logic: tenta 3 vezes com delay de 5 segundos
          MAX_RETRIES=3 # Número máximo de tentativas
          RETRY_DELAY=5 # Delay em segundos entre tentativas
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Tentativa $i de $MAX_RETRIES..."
            
            # Usa curl com timeout e retry para verificar se o site está no ar
            if curl -f -s -L \
              --max-time 10 \
              --retry 1 \
              --retry-delay 2 \
              "https://shopvivaliz.com.br/" > /dev/null; then
              echo "✓ Site respondendo corretamente"
              exit 0
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Aguardando $RETRY_DELAY segundos antes de tentar novamente..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "::error::Site não respondeu após $MAX_RETRIES tentativas"
          echo "Possíveis causas:"
          echo "  • Servidor ainda processando deploy"
          echo "  • Problema de conectividade"
          echo "  • Erro na aplicação"
          echo ""
          echo "Verifique manualmente: https://shopvivaliz.com.br/"
          exit 1

      - name: Validar Deploy Publicado
        shell: bash
        run: |
          python3 scripts/deploy-validator.py \
            --url "https://shopvivaliz.com.br/" \
            --report "reports/deploy-validation.json" \
            --expect "/public/assets/liz-assistant/liz-assistant.css" \
            --expect "/public/assets/liz-assistant/liz-assistant.js" \
            --expect "hero-slide-product-card" \
            --expect "Categorias em destaque" \
            --expect "Catálogo em destaque" \
            --reject "Erro interno" \
            --reject "Exception"

      - name: Exibir Relatorio do Validador
        if: always()
        shell: bash
        run: |
          if [ -f reports/deploy-validation.json ]; then
            cat reports/deploy-validation.json
          else
            echo "::warning::Relatorio do validador de deploy nao foi gerado"
          fi

      - name: Registrar Status do Deploy
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ Deploy concluído com sucesso"
            echo "  Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "  Branch: ${{ github.ref_name }}"
            echo "  Commit: ${{ github.sha }}"
          else
            echo "✗ Deploy falhou"
            echo "  Verificar logs acima para detalhes"
          fi
