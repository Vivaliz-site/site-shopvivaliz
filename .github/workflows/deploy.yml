name: Deploy Automático Seguro - Shop Vivaliz

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'claude/medusa/**'
      - 'medusa/**'
      - 'docs/**'
      - 'reports/**'
      - '**/*.md'
      - '**/*.log'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write
  issues: write
  deployments: write

concurrency:
  group: shopvivaliz-deploy-dev
  cancel-in-progress: false

jobs:
  validate-secrets:
    name: Validar Secrets Obrigatórios
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      secrets_valid: ${{ steps.validate.outputs.valid }}
    
    steps:
      - name: Validar Secrets com Fallback
        id: validate
        shell: bash
        run: |
          # Função auxiliar para validar secret com fallbacks
          validate_secret() {
            local primary="$1"
            local fallback1="$2"
            local fallback2="$3"
            local display_name="$4"
            
            # Tentar primary
            if [ -n "$primary" ]; then
              echo "Secret obrigatório ENCONTRADO: $display_name (primário)"
              return 0
            fi
            
            # Tentar fallback1
            if [ -n "$fallback1" ]; then
              echo "⚠ Secret obrigatório ENCONTRADO: $display_name (fallback1)"
              return 0
            fi
            
            # Tentar fallback2
            if [ -n "$fallback2" ]; then
              echo "⚠ Secret obrigatório ENCONTRADO: $display_name (fallback2)"
              return 0
            fi
            
            # Nenhum encontrado
            echo "::error::Secret OBRIGATÓRIO NÃO ENCONTRADO: $display_name"
            echo "Esperados: $display_name (primário)"
            if [ -n "$fallback1" ] || [ -n "$fallback2" ]; then
              echo "Ou aliases: $fallback1 / $fallback2"
            fi
            return 1
          }
          
          MISSING=0
          
          # Validar FTP_SERVER (aliases: FTP_HOST)
          validate_secret \
            "${{ secrets.FTP_SERVER }}" \
            "${{ secrets.FTP_HOST }}" \
            "" \
            "FTP_SERVER" || MISSING=$((MISSING+1))
          
          # Validar FTP_USERNAME (aliases: FTP_USER)
          validate_secret \
            "${{ secrets.FTP_USERNAME }}" \
            "${{ secrets.FTP_USER }}" \
            "" \
            "FTP_USERNAME" || MISSING=$((MISSING+1))
          
          # Validar FTP_PASSWORD (aliases: FTP_PASS)
          validate_secret \
            "${{ secrets.FTP_PASSWORD }}" \
            "${{ secrets.FTP_PASS }}" \
            "" \
            "FTP_PASSWORD" || MISSING=$((MISSING+1))
          
          # Validar FTP_PORT (tem padrão)
          if [ -n "${{ secrets.FTP_PORT }}" ]; then
            echo "Secret obrigatório ENCONTRADO: FTP_PORT"
          else
            echo "ℹ FTP_PORT não configurado, usando padrão: 21"
          fi
          
          # Validar FTP_REMOTE_DIR (aliases: FTP_TARGET_DIR, FTP_PATH)
          validate_secret \
            "${{ secrets.FTP_REMOTE_DIR }}" \
            "${{ secrets.FTP_TARGET_DIR }}" \
            "${{ secrets.FTP_PATH }}" \
            "FTP_REMOTE_DIR" || MISSING=$((MISSING+1))
          
          if [ "$MISSING" -eq 0 ]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo ""
            echo "✓ Todos os secrets obrigatórios foram encontrados!"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "::error::$MISSING secrets obrigatórios estão faltando!"
            echo ""
            echo "Configure os secrets no GitHub:"
            echo "  Settings → Secrets and variables → Actions"
            echo ""
            echo "Secrets esperados:"
            echo "  • FTP_SERVER (ou FTP_HOST)"
            echo "  • FTP_USERNAME (ou FTP_USER)"
            echo "  • FTP_PASSWORD (ou FTP_PASS)"
            echo "  • FTP_PORT (padrão: 21)"
            echo "  • FTP_REMOTE_DIR (ou FTP_TARGET_DIR / FTP_PATH)"
            exit 1
          fi

  web-deploy:
    name: Sincronizar com a HostGator Dev
    needs: validate-secrets
    if: needs.validate-secrets.outputs.secrets_valid == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4.2.2

      - name: Preparar variáveis de deploy
        id: deploy-vars
        shell: bash
        run: |
          # Usar valor primário ou fallback
          FTP_SERVER="${{ secrets.FTP_SERVER }}"
          [ -z "$FTP_SERVER" ] && FTP_SERVER="${{ secrets.FTP_HOST }}"
          
          FTP_USERNAME="${{ secrets.FTP_USERNAME }}"
          [ -z "$FTP_USERNAME" ] && FTP_USERNAME="${{ secrets.FTP_USER }}"
          
          FTP_PASSWORD="${{ secrets.FTP_PASSWORD }}"
          [ -z "$FTP_PASSWORD" ] && FTP_PASSWORD="${{ secrets.FTP_PASS }}"
          
          FTP_PORT="${{ secrets.FTP_PORT }}"
          [ -z "$FTP_PORT" ] && FTP_PORT="21"
          
          FTP_REMOTE_DIR="${{ secrets.FTP_REMOTE_DIR }}"
          [ -z "$FTP_REMOTE_DIR" ] && FTP_REMOTE_DIR="${{ secrets.FTP_TARGET_DIR }}"
          [ -z "$FTP_REMOTE_DIR" ] && FTP_REMOTE_DIR="${{ secrets.FTP_PATH }}"
          
          # Output sem mostrar valores
          echo "FTP_SERVER=***" >> "$GITHUB_OUTPUT"
          echo "FTP_USERNAME=***" >> "$GITHUB_OUTPUT"
          echo "FTP_PASSWORD=***" >> "$GITHUB_OUTPUT"
          echo "FTP_PORT=$FTP_PORT" >> "$GITHUB_OUTPUT"
          echo "FTP_REMOTE_DIR=***" >> "$GITHUB_OUTPUT"
          
          # Salvar em variáveis de env para uso nos próximos steps
          # (GitHub Actions esconde automaticamente valores de secrets)
          echo "FTP_SERVER_VALUE=$FTP_SERVER" >> "$GITHUB_ENV"
          echo "FTP_USERNAME_VALUE=$FTP_USERNAME" >> "$GITHUB_ENV"
          echo "FTP_PASSWORD_VALUE=$FTP_PASSWORD" >> "$GITHUB_ENV"
          echo "FTP_PORT_VALUE=$FTP_PORT" >> "$GITHUB_ENV"
          echo "FTP_REMOTE_DIR_VALUE=$FTP_REMOTE_DIR" >> "$GITHUB_ENV"

      - name: Testar Conexão FTP
        shell: bash
        run: |
          # Testar conectividade básica (sem enviar arquivos)
          # Usa curl para FTP (mais seguro que ftplib)
          
          echo "Testando conexão FTP..."
          echo "Host: ${{ steps.deploy-vars.outputs.FTP_SERVER }}"
          echo "Port: ${{ steps.deploy-vars.outputs.FTP_PORT }}"
          echo "User: ***"
          echo ""
          
          # Timeout: 10 segundos
          if ! timeout 10 curl -s \
            --user "${FTP_USERNAME_VALUE}:${FTP_PASSWORD_VALUE}" \
            --ftp-port "${{ steps.deploy-vars.outputs.FTP_PORT }}" \
            "ftp://${{ steps.deploy-vars.outputs.FTP_SERVER }}/" \
            --list-only \
            -o /dev/null 2>&1; then
            
            echo "::error::Falha ao conectar ao servidor FTP"
            echo "Verifique:"
            echo "  • FTP_SERVER está correto?"
            echo "  • FTP_USERNAME e FTP_PASSWORD estão válidos?"
            echo "  • FTP_PORT está aberto?"
            echo "  • Firewall permite conexão?"
            exit 1
          fi
          
          echo "✓ Conexão FTP bem-sucedida"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER_VALUE }}
          username: ${{ env.FTP_USERNAME_VALUE }}
          password: ${{ env.FTP_PASSWORD_VALUE }}
          port: ${{ steps.deploy-vars.outputs.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ env.FTP_REMOTE_DIR_VALUE }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/node_modules
            **/vendor
            **/medusa
            **/claude
            **/.env
            **/*.log
            **/reports
            **/docs

      - name: Smoke test
        shell: bash
        run: |
          echo "Executando smoke test..."
          
          # Retry logic: tenta 3 vezes com delay de 5 segundos
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Tentativa $i de $MAX_RETRIES..."
            
            if curl -f \
              --max-time 10 \
              --retry 1 \
              --retry-delay 2 \
              https://dev.shopvivaliz.com.br/ > /dev/null 2>&1; then
              echo "✓ Site respondendo corretamente"
              exit 0
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Aguardando $RETRY_DELAY segundos antes de tentar novamente..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "::warning::Site não respondeu após $MAX_RETRIES tentativas"
          echo "Possíveis causas:"
          echo "  • Servidor ainda processando deploy"
          echo "  • Problema de conectividade"
          echo "  • Erro na aplicação"
          echo ""
          echo "Verifique manualmente: https://dev.shopvivaliz.com.br/"

      - name: Registrar Status do Deploy
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ Deploy concluído com sucesso"
            echo "  Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "  Branch: ${{ github.ref_name }}"
            echo "  Commit: ${{ github.sha }}"
          else
            echo "✗ Deploy falhou"
            echo "  Verificar logs acima para detalhes"
          fi
