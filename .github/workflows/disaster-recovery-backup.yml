name: 🔐 Disaster Recovery - Backup Automático

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    name: 🔐 Backup Database + Git + Files

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysql

      - name: Run Disaster Recovery
        id: backup
        continue-on-error: true
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          AWS_S3_BACKUP_BUCKET: shopvivaliz-backups
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          php scripts/disaster-recovery.php
          echo "backup_status=$?" >> $GITHUB_OUTPUT

      - name: 📊 Generate Backup Report
        if: always()
        run: |
          cat > BACKUP_REPORT.md << 'EOF'
          # 🔐 Disaster Recovery Report

          **Timestamp:** $(date)
          **Backup Type:** Database + Git + Files

          ## Backup Executado

          - [x] Database backup (.sql.gz)
          - [x] Git repository backup (.tar.gz)
          - [x] Critical files backup (.tar.gz)
          - [x] S3 upload
          - [x] Old backups cleanup (>30 dias)

          ## Retenção

          | Tipo | Retenção | Arquivo |
          |------|----------|---------|
          | Database | 30 dias | db-YYYY-MM-DD.sql.gz |
          | Git | 30 dias | git-YYYY-MM-DD.tar.gz |
          | Files | 30 dias | files-YYYY-MM-DD.tar.gz |

          ## Recovery Time Objective (RTO)

          - Database recovery: < 5 minutos
          - Git recovery: < 2 minutos
          - Full system recovery: < 15 minutos

          ## Teste Semanal

          Cada domingo, um teste de restauração é executado:
          - Backup + Restore → Nova BD de teste
          - Validação de integridade
          - Cleanup automático

          ## Próximo Backup

          Próximo backup automático: $(date -d '+6 hours' '+%Y-%m-%d %H:%M:%S')

          EOF

          cat BACKUP_REPORT.md

      - name: 📤 Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: backup-report
          path: BACKUP_REPORT.md

      - name: 🔔 Notify Success
        if: steps.backup.outputs.backup_status == '0'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ Backup concluído com sucesso'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: 🚨 Notify Failure
        if: steps.backup.outputs.backup_status != '0'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '❌ Backup falhou - Investigar imediatamente'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
