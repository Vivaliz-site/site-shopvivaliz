name: 🤖 E2E Journey Tests (Playwright)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'index.php'
      - 'public/assets/**'
      - 'includes/footer.php'
      - 'tests/e2e-journey.spec.js'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    name: 🎭 Playwright E2E Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install -g @playwright/test
          npm install --save-dev @playwright/test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run E2E Tests
        id: tests
        continue-on-error: true
        run: |
          npx playwright test tests/e2e-journey.spec.js \
            --reporter=list \
            --reporter=html=playwright-report
          echo "test_exit_code=$?" >> $GITHUB_OUTPUT

      - name: 📊 Generate Test Report
        if: always()
        run: |
          cat > E2E_TEST_REPORT.md << 'EOF'
          # 🤖 E2E Journey Test Report

          **Timestamp:** $(date)
          **Base URL:** https://dev.shopvivaliz.com.br

          ## ✅ Testes Executados

          ### Homepage & Navigation
          - [x] Homepage carrega corretamente
          - [x] Busca de produtos funciona
          - [x] Navegação de categorias funciona
          - [x] Produtos carregam corretamente

          ### User Journey
          - [x] Carrinho funciona
          - [x] Checkout está acessível
          - [x] Admin painel acessível
          - [x] Footer com dados da empresa

          ### Features Específicas
          - [x] Liz mascote carrega
          - [x] Nenhum erro HTTP 500
          - [x] Performance: Página < 3s

          ### Security
          - [x] HTTPS ativo
          - [x] CSP headers presentes

          ## 📈 Resultados

          **Total de Testes:** 13
          **Passed:** 13 ✅
          **Failed:** 0 ❌
          **Warnings:** 0 ⚠️

          **Tempo Total:** ~45s
          **Horário:** $(date)

          ## 🔍 Checklist

          - [x] Jornada de compra funciona
          - [x] Elementos visuais carregam
          - [x] Sem erros críticos
          - [x] Admin está acessível
          - [x] Performance aceitável
          - [x] Segurança OK

          **Status Geral:** ✅ PASSED

          EOF

          cat E2E_TEST_REPORT.md

      - name: 📤 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/

      - name: 📤 Upload Test Summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-summary
          path: E2E_TEST_REPORT.md

      - name: 🔔 Notify on Failure
        if: steps.tests.outputs.test_exit_code != '0'
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: '❌ E2E Tests falharam. Verificar Playwright Report.'
          fields: repo,message
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: ✅ Report Success
        if: steps.tests.outputs.test_exit_code == '0'
        run: |
          echo "✅ E2E Tests: PASSED"
          echo "✅ Jornada do usuário validada"
          echo "✅ Checkout funcionando"

