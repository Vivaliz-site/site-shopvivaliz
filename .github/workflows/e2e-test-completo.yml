name: E2E seguro de producao

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-safe-e2e
  cancel-in-progress: false

jobs:
  e2e-test:
    name: Jornada sem cobranca
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_BASE_URL: https://dev.shopvivaliz.com.br
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Executar jornada segura
        run: npx playwright test tests/e2e-journey.spec.js --project=chromium --reporter=list,html

      - name: Publicar relatorio
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-seguro-producao
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn
