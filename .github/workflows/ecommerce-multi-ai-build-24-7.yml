name:  E-commerce Multi-AI Builder 24/7

on:
  schedule:
    - cron: '0 */6 * * *'  # A cada 6 horas
  workflow_dispatch:
    inputs:
      pages:
        description: 'Pginas a construir (all | catalogo | produto | carrinho)'
        default: 'all'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-ecommerce:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name:  Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name:  Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name:  Install dependencies
        run: |
          python -m pip install --quiet anthropic openai google-genai

      - name:  Gemini + Claude + GPT - Multi-AI Builder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/ecommerce-multi-ai-builder.py --pages=${{ github.event.inputs.pages || 'all' }}

      - name:  Git config
        run: |
          git config user.name " Multi-AI Agents"
          git config user.email "agents@shopvivaliz.com.br"

      - name:  Commit gerado
        continue-on-error: true
        run: |
          if [[ $(git status --porcelain) ]]; then
            git add -A
            git commit -m "feat: pginas e-commerce geradas por Gemini+Claude+GPT

- Gemini (Arquiteto): especificao UX/dados
- Claude (Desenvolvedor): implementao PHP
- GPT (QA): reviso e aprovao

$(date +'%Y-%m-%d %H:%M:%S')

Co-Authored-By:  ShopVivaliz Agents <agents@shopvivaliz.com.br>"
            git push || true
          fi

      - name:  Deploy automtico
        if: success()
        run: |
          echo " Pginas prontas para deploy"
          echo "Prximo passo: git push para main  Deploy FTP automtico"

      - name:  Log do build
        if: always()
        run: |
          if [ -f logs/ecommerce-build-log.json ]; then
            echo "=== BUILD LOG ==="
            cat logs/ecommerce-build-log.json | jq '.[-5:]' || true
          fi
