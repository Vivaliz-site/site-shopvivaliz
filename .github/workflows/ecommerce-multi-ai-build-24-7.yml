name: E-commerce Multi-AI Builder 24/7

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: 'Pages to build (all | catalogo | produto | carrinho)'
        default: 'all'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-ecommerce:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --quiet anthropic openai google-genai

      - name: Multi-AI Builder (Gemini + Claude + GPT)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/ecommerce-multi-ai-builder.py --pages=${{ github.event.inputs.pages || 'all' }}

      - name: Git config
        run: |
          git config user.name "Multi-AI Agents"
          git config user.email "agents@shopvivaliz.com.br"

      - name: Commit changes
        continue-on-error: true
        run: |
          if [[ $(git status --porcelain) ]]; then
            git add -A
            git commit -m "feat: e-commerce pages generated by Multi-AI ($(date +'%Y-%m-%d %H:%M:%S'))" || true
            git push || true
          fi

      - name: Deploy ready
        if: success()
        run: |
          echo "Pages ready for deployment"
