name: "Relatorio de Atividade 4h (Email)"

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  send-report:
    name: Enviar Relatorio de Atividade 4h
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validar configuracao do sender
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          MAIL_HOST: ${{ secrets.EMAIL_SMTP_HOST || secrets.SMTP_HOST }}
          MAIL_PORT: ${{ secrets.EMAIL_SMTP_PORT || secrets.SMTP_PORT }}
          MAIL_USER: ${{ secrets.EMAIL_USER || secrets.SMTP_USER }}
          MAIL_PASS: ${{ secrets.EMAIL_PASSWORD || secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'fredmourao@gmail.com,atendimento@shopvivaliz.com.br' }}
          EMAIL_AGENTES_SECRET: ${{ secrets.EMAIL_AGENTES_SECRET }}
        run: python scripts/automation/validate_email_config.py

      - name: Diagnosticar backends de email
        env:
          REPORT_EMAIL_DEBUG_ONLY: "1"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          MAIL_HOST: ${{ secrets.EMAIL_SMTP_HOST || secrets.SMTP_HOST }}
          MAIL_PORT: ${{ secrets.EMAIL_SMTP_PORT || secrets.SMTP_PORT }}
          MAIL_USER: ${{ secrets.EMAIL_USER || secrets.SMTP_USER }}
          MAIL_PASS: ${{ secrets.EMAIL_PASSWORD || secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'fredmourao@gmail.com,atendimento@shopvivaliz.com.br' }}
          EMAIL_AGENTES_SECRET: ${{ secrets.EMAIL_AGENTES_SECRET }}
        run: python scripts/automation/eight_hour_status_email.py

      - name: Gerar e enviar relatorio pelo sender central
        env:
          REPORT_WINDOW_HOURS: "4"
          REPORT_BASE_URL: "https://shopvivaliz.com.br"
          REPORT_LOG_PATH: "logs/email-activity-report.txt"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          MAIL_HOST: ${{ secrets.EMAIL_SMTP_HOST || secrets.SMTP_HOST }}
          MAIL_PORT: ${{ secrets.EMAIL_SMTP_PORT || secrets.SMTP_PORT }}
          MAIL_USER: ${{ secrets.EMAIL_USER || secrets.SMTP_USER }}
          MAIL_PASS: ${{ secrets.EMAIL_PASSWORD || secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'fredmourao@gmail.com,atendimento@shopvivaliz.com.br' }}
          EMAIL_AGENTES_SECRET: ${{ secrets.EMAIL_AGENTES_SECRET }}
        run: python scripts/automation/eight_hour_status_email.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: activity-email-report-${{ github.run_id }}
          path: |
            logs/email-activity-report.txt
            logs/email-config-check.json
          if-no-files-found: ignore
