name: "Relatório de Atividade 8h (Email)"

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-report:
    runs-on: ubuntu-latest
    name: Enviar Relatório de Atividade 8h

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-node@v3 # Utilizando node ou python? setup-python é melhor.
        # Na verdade, python já vem pré-instalado em runners do ubuntu-latest! Mas configurar explicitamente é bom.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Enviar email
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: "fredmourao@gmail.com"
        run: |
          python scripts/automation/eight_hour_status_email.py
