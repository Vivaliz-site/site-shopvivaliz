name: "Relatório de Atividade 8h (Email)"

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-report:
    runs-on: ubuntu-latest
    name: Enviar Relatório de Atividade 8h

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate SMTP secrets
        run: |
          # Verificar secrets obrigatórios sem revelar valores
          if [ -z "${{ secrets.EMAIL_SMTP_HOST }}" ]; then
            echo "❌ EMAIL_SMTP_HOST não configurado" >&2
            exit 1
          fi
          if [ -z "${{ secrets.EMAIL_SMTP_PORT }}" ]; then
            echo "❌ EMAIL_SMTP_PORT não configurado" >&2
            exit 1
          fi
          if [ -z "${{ secrets.EMAIL_USER }}" ]; then
            echo "❌ EMAIL_USER não configurado" >&2
            exit 1
          fi
          if [ -z "${{ secrets.EMAIL_PASSWORD }}" ]; then
            echo "❌ EMAIL_PASSWORD não configurado" >&2
            exit 1
          fi
          if [ -z "${{ secrets.EMAIL_FROM }}" ]; then
            echo "❌ EMAIL_FROM não configurado" >&2
            exit 1
          fi
          if [ -z "${{ secrets.EMAIL_TO }}" ]; then
            echo "❌ EMAIL_TO não configurado" >&2
            exit 1
          fi
          echo "✅ Todos os secrets obrigatórios estão configurados"

      - name: Enviar relatório por email
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/automation/eight_hour_status_email.py
