name: "Relatório de Atividade 8h (Email)"

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-report:
    runs-on: ubuntu-latest
    name: Enviar Relatório de Atividade 8h

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validar secrets obrigatórios
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          missing=()
          [ -z "$EMAIL_SMTP_HOST" ] && missing+=(EMAIL_SMTP_HOST)
          [ -z "$EMAIL_SMTP_PORT" ] && missing+=(EMAIL_SMTP_PORT)
          [ -z "$EMAIL_USER" ] && missing+=(EMAIL_USER)
          [ -z "$EMAIL_PASSWORD" ] && missing+=(EMAIL_PASSWORD)
          [ -z "$EMAIL_FROM" ] && missing+=(EMAIL_FROM)
          [ -z "$EMAIL_TO" ] && missing+=(EMAIL_TO)
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Secrets obrigatórios ausentes: ${missing[*]}"
            exit 1
          fi
          echo "Todos os secrets obrigatórios estão presentes."

      - name: Enviar email
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/automation/eight_hour_status_email.py
