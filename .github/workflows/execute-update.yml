name: ShopVivaliz Execute Update

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Caminho do ZIP no repositorio ou artefato baixado'
        required: true
        default: 'dist/shopvivaliz-v9270.zip'
      expected_version:
        description: 'Versao esperada apos aplicar'
        required: true
        default: '9.2.70-update-executor-agent'

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write

jobs:
  execute-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, mbstring
      - name: Validate ZIP exists
        run: test -f "${{ github.event.inputs.zip_path }}"
      - name: Execute ShopVivaliz update
        env:
          SHOPVIVALIZ_UPDATE_URL: ${{ secrets.SHOPVIVALIZ_UPDATE_URL }}
          SHOPVIVALIZ_UPDATE_TOKEN: ${{ secrets.SHOPVIVALIZ_UPDATE_TOKEN || secrets.SQUAD_TOKEN }}
          SHOPVIVALIZ_EXPECTED_VERSION: ${{ github.event.inputs.expected_version }}
        run: |
          php tools/execute-update.php "${{ github.event.inputs.zip_path }}" "${{ github.event.inputs.expected_version }}" | tee update-executor-report.json
      - name: Upload update executor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-executor-report
          path: update-executor-report.json
