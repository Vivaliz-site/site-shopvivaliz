name: Executor Watchdog - Garantir Execução

on:
  schedule:
    - cron: '*/15 * * * *'  # A cada 15 min
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Verificar se executor rodou recentemente
        run: |
          echo " Verificando status do executor..."

          # Se última execução foi há mais de 45 min, acionar novamente
          LAST_RUN=$(gh run list --workflow ai-autonomous-executor.yml --limit 1 --json createdAt --jq '.[0].createdAt' 2>/dev/null || echo "never")

          echo "Última execução: $LAST_RUN"

          if [ "$LAST_RUN" = "never" ]; then
            echo " Executor nunca rodou! Acionando..."
            exit 1
          fi

      - name: Acionar executor se necessário
        if: failure()
        run: |
          echo " Acionando executor como fallback..."
          gh workflow run ai-autonomous-executor.yml --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log do watchdog
        run: |
          echo " Watchdog executado em $(date)" >> /tmp/watchdog.log
          cat /tmp/watchdog.log || true
