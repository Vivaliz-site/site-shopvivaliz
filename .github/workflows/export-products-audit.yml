name: Export Products for Text Audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-products-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-products:
    name: Export product catalog read-only
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download production catalog
        run: |
          set -euo pipefail
          mkdir -p audit-output
          curl --fail --show-error --silent --location \
            --retry 3 --retry-delay 2 --max-time 120 \
            'https://www.shopvivaliz.com