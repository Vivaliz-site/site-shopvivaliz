name: Fetch Shopee Listings via Tiny API

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json
          tools: none

      - name: Verificar secrets disponveis (somente nomes)
        run: |
          echo "=== Secrets disponveis ==="
          env | grep -E '^(TINY|OLIST|ERP|SHOPEE)' | sed 's/=.*/=***MASKED***/' || echo "(nenhum secret configurado)"
        env:
          TINY_ACCESS_TOKEN:  ${{ secrets.TINY_ACCESS_TOKEN }}
          TINY_API_TOKEN:     ${{ secrets.TINY_API_TOKEN || secrets.TINY_ACCESS_TOKEN }}
          TINY_CLIENT_ID:     ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TINY_REFRESH_TOKEN: ${{ secrets.TINY_REFRESH_TOKEN }}
          OLIST_ACCESS_TOKEN:  ${{ secrets.OLIST_ACCESS_TOKEN }}
          OLIST_CLIENT_ID:     ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          ERP_API_TOKEN:       ${{ secrets.ERP_API_TOKEN || secrets.TOKEN_API_OLIST }}

      - name: Verificar sintaxe PHP
        run: php -l agents/v9.2.85/app/ShopeeListingsExtractorAgent.php

      - name: Definir nome do arquivo de sada
        id: output
        run: echo "filename=listings/shopee-listings-$(date +%Y%m%d-%H%M%S).json" >> "$GITHUB_OUTPUT"

      - name: Executar extrao de anncios
        run: php agents/v9.2.85/scripts/fetch-shopee-listings.php
        env:
          OUTPUT_FILE:        ${{ steps.output.outputs.filename }}
          TINY_ACCESS_TOKEN:  ${{ secrets.TINY_ACCESS_TOKEN }}
          TINY_API_TOKEN:     ${{ secrets.TINY_API_TOKEN || secrets.TINY_ACCESS_TOKEN }}
          TINY_CLIENT_ID:     ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TINY_REFRESH_TOKEN: ${{ secrets.TINY_REFRESH_TOKEN }}
          OLIST_ACCESS_TOKEN:  ${{ secrets.OLIST_ACCESS_TOKEN }}
          OLIST_CLIENT_ID:     ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          ERP_API_TOKEN:       ${{ secrets.ERP_API_TOKEN || secrets.TOKEN_API_OLIST }}

      - name: Commit do resultado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings/
          git diff --cached --quiet && echo "Sem alteraes." || \
            git commit -m "chore: shopee listings $(date +%Y-%m-%d)" && git push
