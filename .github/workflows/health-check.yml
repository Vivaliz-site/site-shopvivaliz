name: Health Check

# System health check every 60 minutes
on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  health-check:
    name: Validate system health
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --quiet pyyaml requests

      - name: Run health check script
        continue-on-error: true
        run: |
          python3 scripts/health-check.py

      - name: Display health report
        if: always()
        run: |
          if [ -f logs/health-check.json ]; then
            echo "=== HEALTH CHECK REPORT ==="
            cat logs/health-check.json | head -50
          fi

      - name: Parse and check status
        if: always()
        run: |
          python3 << 'PYEOF'
          import json
          import sys

          try:
              with open('logs/health-check.json', 'r') as f:
                  report = json.load(f)

              status = report.get('overall_status', 'unknown')
              print(f"\n{'='*70}")
              print(f"OVERALL SYSTEM STATUS: {status.upper()}")
              print(f"{'='*70}")

              # Print check results
              for check_name, result in report.get('checks', {}).items():
                  check_status = result.get('status', 'unknown').upper()
                  print(f"\n{check_name}: {check_status}")
                  if result.get('issues'):
                      for issue in result.get('issues', [])[:3]:
                          print(f"  ⚠ {issue}")

              # Exit with error if status is error
              if status == 'error':
                  sys.exit(1)
          except Exception as e:
              print(f"Error reading health report: {e}")
              sys.exit(1)
          PYEOF

      - name: Commit health report
        if: always()
        continue-on-error: true
        run: |
          git config --local user.email "healthcheck@shopvivaliz.com.br"
          git config --local user.name "Health Check Bot"

          if [ -f logs/health-check.json ]; then
            git add logs/health-check.json
            git commit -m "chore: health check report [AUTO]" || true
            git push || true
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: health-check-reports
          path: logs/health-check.*
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠ Health check detected issues"
          echo "Review logs/health-check.json for details"
