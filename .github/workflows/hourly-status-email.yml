name: Hourly Status Email

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-status:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.3.0

      - name: Setup Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.11'

      - name: Run hourly status email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || secrets.EMAIL_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || secrets.EMAIL_SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER || secrets.EMAIL_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS || secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/automation/hourly_status_email.py
