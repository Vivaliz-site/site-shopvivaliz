name: Hourly Summary Report

# Roda a cada hora e gera resumo do que foi feito
on:
  schedule:
    - cron: '0 * * * *'  # A cada hora (XX:00)
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  summarize:
    name: Generate Hourly Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate Summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYTHON_EOF'
          import json
          import subprocess
          from datetime import datetime, timedelta
          import os

          # Timestamp
          now = datetime.utcnow()
          hour_ago = now - timedelta(hours=1)
          current_hour = now.strftime("%Y-%m-%d %H:00 UTC")

          # 1. Commits da última hora
          commits_cmd = f'''git log --since="{hour_ago.isoformat()}" --until="{now.isoformat()}" --oneline'''
          commits = subprocess.getoutput(commits_cmd).strip().split('\n') if subprocess.getoutput(commits_cmd).strip() else []

          # 2. Workflow runs da última hora
          runs_cmd = f'''gh run list --branch main --limit 50 --json name,status,conclusion,updatedAt,url --jq '.[] | select(.updatedAt | fromdateiso8601 > {int(hour_ago.timestamp())})' 2>/dev/null'''
          try:
              runs_json = subprocess.getoutput(runs_cmd)
              runs = json.loads(f'[{runs_json.replace(chr(10), ",")}]') if runs_json.strip() else []
          except:
              runs = []

          # 3. Tasks da última hora
          tasks_file = 'tasks-queue.json'
          tasks = []
          if os.path.exists(tasks_file):
              try:
                  with open(tasks_file) as f:
                      tasks_data = json.load(f)
                      # Simples: pega tasks completadas
                      if isinstance(tasks_data, list):
                          tasks = [t for t in tasks_data if t.get('status') == 'completed' and t.get('updated_at', '').startswith(now.strftime("%Y-%m-%d %H"))]
                      elif isinstance(tasks_data, dict):
                          tasks = tasks_data.get('completed_last_hour', [])
              except:
                  tasks = []

          # 4. Montar resumo
          # (Construido linha a linha com \n explicito, em vez de uma string
          # multi-linha crua, porque linhas sem indentacao dentro de um bloco
          # "run: |" do YAML quebram o parser - foi exatamente isso que
          # deixava este workflow falhando em toda execucao.)
          summary = "# ShopVivaliz Hourly Summary\n\n"
          summary += f"**{current_hour}**\n\n"
          summary += "## 📊 Activity\n\n"
          summary += f"### Commits ({len(commits)} made)\n"
          if commits:
              for commit in commits[:10]:  # Top 10
                  if commit:
                      summary += f"- {commit}\n"
              if len(commits) > 10:
                  summary += f"- ... and {len(commits) - 10} more\n"
          else:
              summary += "- No commits this hour\n"

          summary += f"\n### Workflows ({len(runs)} runs)\n"
          if runs:
              success = sum(1 for r in runs if r.get('conclusion') == 'SUCCESS')
              failure = sum(1 for r in runs if r.get('conclusion') == 'FAILURE')
              in_progress = sum(1 for r in runs if r.get('status') == 'IN_PROGRESS')
              summary += f"- ✓ Success: {success}\n"
              summary += f"- ❌ Failed: {failure}\n"
              summary += f"- ⏳ In Progress: {in_progress}\n"
          else:
              summary += "- No workflow runs this hour\n"

          summary += f"\n### Tasks ({len(tasks)} completed)\n"
          if tasks:
              for task in tasks[:5]:
                  task_id = task.get('task_id', 'unknown')
                  action = task.get('action', '?')
                  summary += f"- {task_id}: {action}\n"
              if len(tasks) > 5:
                  summary += f"- ... and {len(tasks) - 5} more\n"
          else:
              summary += "- No tasks completed this hour\n"

          summary += f"\n### Deploy Status\n"
          # Verifica se há artifacts de deploy
          summary += "- Oracle VM: Cron sync scheduled (next in ~30min)\n"
          summary += "- Last sync: Check /logs on VM\n"

          summary += f"\n---\n_Generated at {now.strftime('%Y-%m-%d %H:%M:%S UTC')}_\n"

          # Salvar resumo
          report_dir = 'reports/hourly'
          os.makedirs(report_dir, exist_ok=True)

          report_file = f"{report_dir}/{now.strftime('%Y-%m-%d-%H')}-summary.md"
          with open(report_file, 'w') as f:
              f.write(summary)

          print(summary)
          print(f"\n✓ Summary saved to {report_file}")

          PYTHON_EOF

      - name: Update Latest Summary
        run: |
          # Copia para latest.md para acesso rápido
          mkdir -p reports/hourly
          cp reports/hourly/$(date -u +%Y-%m-%d-%H)-summary.md reports/hourly/latest.md || true

      - name: Commit Summary
        run: |
          git config user.email "ci@shopvivaliz.local"
          git config user.name "CI Summary Bot"

          git add reports/hourly/

          if ! git diff --cached --quiet; then
            git commit -m "auto: hourly summary $(date -u +%Y-%m-%d\ %H:%M:%S)"
            git push origin main || echo "⚠️  Commit falhou (proteção de branch?) — resumo ainda foi gerado"
          else
            echo "No changes to commit"
          fi

      - name: Display Summary
        if: always()
        run: |
          if [ -f reports/hourly/latest.md ]; then
            echo "=== LATEST SUMMARY ==="
            cat reports/hourly/latest.md
          fi
