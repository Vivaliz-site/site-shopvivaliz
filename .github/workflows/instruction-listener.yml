name: Trio IA - Listener de Instruções

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  listen:
    if: contains(github.event.issue.labels.*.name, 'trio-instruction') || contains(github.event.issue.title, '[TRIO]')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Processar instrução
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "Instrução recebida"
          echo "Título: $ISSUE_TITLE"
          echo "Corpo: $ISSUE_BODY"

      - name: Responder no issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Instrução recebida pelo Trio IA! Os agentes processarão esta solicitação.'
            })
