name: Trio IA - Listener de Instruções

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  listen:
    if: contains(github.event.issue.labels.*.name, 'trio-instruction') || contains(github.event.issue.title, '[TRIO]')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Processar instrução
        run: |
          echo "📝 Instrução recebida do usuário"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"

          echo "Título: $ISSUE_TITLE"
          echo "Corpo:"
          echo "$ISSUE_BODY"

      - name: Adicionar tarefa à fila (se indicado)
        if: contains(github.event.issue.body, '#add-task')
        run: |
          python -c "
import json
import sys
from pathlib import Path

issue_body = '''${{ github.event.issue.body }}'''

# Parse do issue body
lines = issue_body.split('\n')
title = lines[1] if len(lines) > 1 else ''
description = '\n'.join(lines[3:]) if len(lines) > 3 else ''
priority = 'medium'

if '#priority-high' in issue_body:
    priority = 'high'
elif '#priority-low' in issue_body:
    priority = 'low'

if not title or not description:
    print('❌ Formato inválido. Use:')
    print('#add-task')
    print('Título da tarefa')
    print('')
    print('Descrição completa')
    print('#priority-high')
    sys.exit(1)

# Ler fila
with open('tasks-queue.json', 'r') as f:
    data = json.load(f)

# Gerar novo ID
task_ids = [int(t['id'].split('-')[1]) for t in data['queue']]
new_id = f'task-{max(task_ids or [0]) + 1:03d}'

from datetime import datetime
new_task = {
    'id': new_id,
    'title': title.strip(),
    'description': description.strip(),
    'priority': priority,
    'status': 'pending',
    'created_at': datetime.utcnow().isoformat() + 'Z'
}

data['queue'].append(new_task)

with open('tasks-queue.json', 'w') as f:
    json.dump(data, f, indent=2, ensure_ascii=False)

print(f'✅ Tarefa {new_id} adicionada à fila!')
          "

      - name: Pausar executor (se indicado)
        if: contains(github.event.issue.body, '#pause-executor')
        run: |
          echo "⏸️ Executor pausado"
          echo "Para reativar, feche a issue ou comente: #resume-executor"

      - name: Responder no issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Instrução processada pelo Trio IA!\n\nOpções disponíveis:\n- `#add-task` - Adicionar nova tarefa\n- `#priority-high/medium/low` - Definir prioridade\n- `#pause-executor` - Pausar execuções\n- `#resume-executor` - Retomar execuções'
            })
