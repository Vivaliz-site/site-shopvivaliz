name: PAUSADO - Maestro 24/7 Real substituido

# Pausado em 2026-07-11.
# Motivo: este workflow continha uma etapa de simulacao de agentes e gerava
# relatorio de atividade sem executar correcao real no codigo. Para manter a
# validacao honesta, ele fica disponivel apenas para auditoria manual.
#
# Fluxos reais que continuam responsaveis pela operacao automatizada:
# - .github/workflows/autonomous-code-agent-24-7.yml
# - .github/workflows/autonomous-watchdog.yml
# - .github/workflows/monitor-actions-and-prs.yml
# - .github/workflows/shopvivaliz-qa.yml
# - .github/workflows/storefront-quality.yml

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paused:
    name: Workflow pausado por simulacao
    runs-on: ubuntu-latest
    steps:
      - name: Explicar substituicao
        shell: bash
        run: |
          cat <<'EOF'
          Este workflow foi pausado porque continha simulacao de agentes.

          Nada aqui executa melhoria, correcao ou relatorio 24/7.
          Use os workflows reais do projeto:
          - Autonomous Code Agent 24/7
          - Autonomous Watchdog Monitor
          - Monitor & Fix Actions & PRs
          - ShopVivaliz QA
          - Storefront Quality
          EOF
