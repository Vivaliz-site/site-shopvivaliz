name: "🌉 MCP Servers - Manager & Health Check"

on:
  push:
    paths:
      - "scripts/mcp-*.py"
      - "mcp-servers.json"
      - ".github/workflows/mcp-servers.yml"
  schedule:
    # Validação diária; endpoints locais não são acessíveis pelo runner hospedado.
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mcp-health-check:
    runs-on: ubuntu-latest
    name: "🏥 MCP Health Check"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Validate MCP configuration
        run: |
          python scripts/mcp-client.py --validate-config

      - name: Verify VS Code/Codex stdio bridge protocol
        run: |
          python -m pytest tests/test_codex_mesh_bridge.py -q

      - name: Log health status
        run: |
          echo "✅ Configuração MCP e bridge stdio validados"
          echo "ℹ️ Endpoints privados não são sondados pelo runner do GitHub"

  mcp-documentation:
    runs-on: ubuntu-latest
    name: "📚 MCP Configuration"
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Validate committed configuration
        run: |
          python scripts/mcp-client.py --validate-config

  mcp-startup-guide:
    runs-on: ubuntu-latest
    name: "📖 Startup Guide"
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Display startup commands
        run: |
          echo "# MCP Servers - Startup Commands"
          echo ""
          echo "## Windows Local"
          echo "\`\`\`powershell"
          echo "python scripts/codex-mesh-bridge.py"
          echo "\`\`\`"
          echo ""
          echo "## Validar configuração e protocolo"
          echo "\`\`\`bash"
          echo "python scripts/mcp-client.py --validate-config"
          echo "python -m pytest tests/test_codex_mesh_bridge.py -q"
          echo "\`\`\`"
