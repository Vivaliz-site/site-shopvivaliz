name: Monitor - Chat Responder

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  responder:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Processar mensagens do monitor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYTHON_EOF'
          import json
          import subprocess
          import os
          from datetime import datetime

          # Ler issues abertas com [MONITOR] ou [TRIO]
          result = subprocess.run([
              "gh", "issue", "list",
              "--state", "open",
              "--search", "[MONITOR] OR [TRIO]",
              "--json", "number,title,body,createdAt"
          ], capture_output=True, text=True)

          issues = json.loads(result.stdout)

          if not issues:
              print("✅ Nenhuma mensagem do monitor para responder")
          else:
              for issue in issues[:3]:  # Processar até 3 issues
                  num = issue['number']
                  title = issue['title']
                  body = issue['body']

                  print(f"\n📝 Processando issue #{num}: {title}")

                  # Construir resposta baseada no tipo de comando
                  if "[MONITOR]" in title or "status" in body.lower():
                      response = "✅ Sistema operacional. Próxima execução em ~5 minutos. Veja o monitor para detalhes completos em: https://dev.shopvivaliz.com.br/admin/monitor/"
                  elif "o que foi feito" in body.lower() or "hoje" in body.lower():
                      response = "📊 Confira o dashboard do monitor para histórico completo. As tarefas executadas são listadas em 'Tarefas Completas'."
                  else:
                      response = "✅ Mensagem recebida. Os agentes estão processando. Verifique o status no monitor."

                  # Postar resposta
                  subprocess.run([
                      "gh", "issue", "comment", str(num),
                      "--body", f"🤖 **Agentes IA respondendo:**\n\n{response}\n\n---\n*Resposta automática - {datetime.now().strftime('%H:%M:%S')}*"
                  ])

          PYTHON_EOF
