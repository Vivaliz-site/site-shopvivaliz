name: Monitor Chat - Respostas Automáticas

on:
  workflow_dispatch:
  schedule:
    - cron: '*/2 * * * *'

permissions:
  contents: write

jobs:
  respond-to-chat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: python -m pip install --quiet google-genai anthropic openai

      - name: Executar chat responder v2
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/chat-responder-v2.py

      - name: Configurar Git
        run: |
          git config user.name "Agentes ShopVivaliz"
          git config user.email "agentes@shopvivaliz.com.br"

      - name: Commit respostas
        continue-on-error: true
        run: |
          git add -A logs/monitor-responses.jsonl
          git commit -m "chat: agentes responderam mensagens do monitor [$(date +'%H:%M:%S')]" || true
          git push || true
