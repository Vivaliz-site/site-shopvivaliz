name: Monitor Chat - Respostas Automticas

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  respond-to-chat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: python -m pip install --quiet google-genai anthropic openai requests

      - name: Verificar chaves de API
        run: |
          echo "Chaves configuradas:"
          test -n "$GEMINI_API_KEY" && echo "  [OK] GEMINI_API_KEY" || echo "  [ERRO] GEMINI_API_KEY faltando"
          test -n "$ANTHROPIC_API_KEY" && echo "  [OK] ANTHROPIC_API_KEY" || echo "  [ERRO] ANTHROPIC_API_KEY faltando"
          test -n "$OPENAI_API_KEY" && echo "  [OK] OPENAI_API_KEY" || echo "  [ERRO] OPENAI_API_KEY faltando"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Executar chat responder (APIs reais)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "[INICIO] Chat responder"
          python3 scripts/chat-responder-real.py
          echo "[FIM] Chat responder"
          echo ""
          echo "Respostas geradas:"
          test -f logs/monitor-responses.jsonl && wc -l logs/monitor-responses.jsonl || echo "Nenhuma resposta salva"

      - name: Configurar Git
        run: |
          git config user.name "Agentes ShopVivaliz"
          git config user.email "agentes@shopvivaliz.com.br"

      - name: Commit respostas
        continue-on-error: true
        run: |
          git add -A logs/monitor-responses.jsonl
          git commit -m "chat: agentes responderam mensagens do monitor [$(date +'%H:%M:%S')]" || true
          git push || true
