name: Parallel Trio Executor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      cycles:
        description: 'Quantidade de ciclos seguros do watchdog'
        required: false
        default: '3'

permissions:
  contents: read

concurrency:
  group: parallel-trio-executor
  cancel-in-progress: true

env:
  SHOPVIVALIZ_BASE_URL: https://shopvivaliz.com.br

jobs:
  execute-trio:
    name: Executar watchdog em modo trio
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Preparar URL do watchdog
        shell: bash
        run: |
          CYCLES="${{ github.event.inputs.cycles || '3' }}"
          AGENT_KEY="${{ secrets.SHOPVIVALIZ_AGENT_KEY }}"
          [ -z "$AGENT_KEY" ] && AGENT_KEY="${{ secrets.AGENT_KEY }}"
          [ -z "$AGENT_KEY" ] && AGENT_KEY="${{ secrets.WATCHDOG_AGENT_KEY }}"
          [ -z "$AGENT_KEY" ] && AGENT_KEY="${{ secrets.AUTONOMOUS_AGENT_KEY }}"

          URL="${SHOPVIVALIZ_BASE_URL%/}/api/agent/autonomous-watchdog.php?run_loop=1&cycles=$CYCLES"
          if [ -n "$AGENT_KEY" ]; then
            URL="$URL&agent_key=$AGENT_KEY"
          fi

          echo "WATCHDOG_URL=$URL" >> "$GITHUB_ENV"
          echo "WATCHDOG_URL_DISPLAY=${SHOPVIVALIZ_BASE_URL%/}/api/agent/autonomous-watchdog.php?run_loop=1&cycles=$CYCLES&agent_key=***" >> "$GITHUB_ENV"

      - name: Executar trio em lote
        shell: bash
        run: |
          mkdir -p reports
          echo "Chamando: $WATCHDOG_URL_DISPLAY"

          HTTP_CODE=$(curl -sS -L \
            --max-time 90 \
            --retry 2 \
            --retry-delay 5 \
            --retry-all-errors \
            -H "Accept: application/json" \
            -o reports/parallel-trio.json \
            -w "%{http_code}" \
            "$WATCHDOG_URL")

          echo "HTTP_CODE=$HTTP_CODE"
          cat reports/parallel-trio.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Parallel Trio retornou HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Validar resposta JSON
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("reports/parallel-trio.json").read_text(encoding="utf-8"))
          if "probes" not in payload:
              raise SystemExit("Resposta do watchdog sem campo probes")
          print("Parallel Trio OK:", payload.get("generated_at", "sem-data"))
          PY
