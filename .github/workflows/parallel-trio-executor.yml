# completo: valida agent key, checa o endpoint antes de chamar, sobe
# relatorio como artifact).
#
# Para reativar, troque o bloco "on:" abaixo por:
#   on:
#     schedule:
#       - cron: '0 * * * *'
#     workflow_dispatch:
#       inputs:
#         cycles:
#           description: 'Quantidade de ciclos seguros do watchdog'
#           required: false
#           default: '3'
on:
  workflow_dispatch:
jobs:
  pausado:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Consolidado em autonomous-watchdog.yml. Rode manualmente via workflow_dispatch se precisar."
