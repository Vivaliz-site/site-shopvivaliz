name: PAUSADO - Parallel Trio Executor
# Desabilitado 2026-07-10: consolidado em autonomous-watchdog.yml.
# Este workflow rodava a cada hora chamando o MESMO endpoint que
# 24-7-continuous-agent.yml, ai-autonomous-executor.yml e
# autonomous-watchdog.yml (api/agent/autonomous-watchdog.php?run_loop=1) -
# eram 4 workflows fazendo a mesma chamada em cadencias diferentes.
