name: Real E2E Gate (Playwright)

# Portao de testes FUNCIONAIS reais antes de qualquer promocao de codigo -
# nao e so lint/sintaxe. Roda a suite Playwright completa (tests/*.spec.ts):
# paginas de autenticacao, precos de catalogo, fluxo de compra, pedidos e
# webhooks. Todo teste importa de tests/fixtures.ts, que bloqueia qualquer
# chamada de rede real para o Pagar.me durante os testes (guardrail
# financeiro - ver tests/fixtures.ts para detalhes).
#
# Este workflow so reporta resultado (pass/fail). Ele NUNCA faz git revert,
# git reset ou push - depois do incidente de 2026-07-10 (rollback automatico
# apagou o repositorio duas vezes), nenhum workflow autonomo deste projeto
# deve executar comandos destrutivos de git sozinho.

on:
  push:
    branches: [staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: real-e2e-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (funcional, nao apenas lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli, mbstring, curl

      - name: Install dependencies
        run: |
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium

      - name: Start application under test
        run: |
          nohup php -S 127.0.0.1:8080 scripts/dev-router.php > /tmp/shopvivaliz-php.log 2>&1 &
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8080/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/shopvivaliz-php.log
          exit 1

      - name: Rodar suite E2E completa
        id: run_tests
        env:
          E2E_BASE_URL: http://127.0.0.1:8080
        run: timeout --signal=TERM --kill-after=30s 12m npx playwright test --reporter=list,html
        continue-on-error: true

      - name: Upload relatorio HTML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Falhar o job se algum teste falhou
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "::error::Suite Playwright falhou - promocao de codigo bloqueada. Veja o artifact playwright-report para detalhes."
          exit 1
