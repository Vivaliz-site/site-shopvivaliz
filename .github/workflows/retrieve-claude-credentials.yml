name: 🔑 Retrieve Claude Credentials

on:
  workflow_dispatch:

jobs:
  retrieve-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_VM_SSH_KEY }}" > ~/.ssh/oracle_vm_key
          chmod 600 ~/.ssh/oracle_vm_key
          ssh-keyscan -H ${{ secrets.ORACLE_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Get SSH Public Key
        run: |
          echo "## 🔑 Claude Code SSH Public Key" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ssh -i ~/.ssh/oracle_vm_key -o StrictHostKeyChecking=no \
            ${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }} \
            "cat /home/shopvivaliz/.ssh/claude_code_rsa.pub" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Get MCP Server Status
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🌐 MCP Server Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ssh -i ~/.ssh/oracle_vm_key -o StrictHostKeyChecking=no \
            ${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }} \
            "curl -s http://localhost:5556/status | jq ." >> $GITHUB_STEP_SUMMARY 2>/dev/null || \
          ssh -i ~/.ssh/oracle_vm_key -o StrictHostKeyChecking=no \
            ${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }} \
            "systemctl status shopvivaliz-mcp" >> $GITHUB_STEP_SUMMARY

      - name: Test SSH Access
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SSH Access:** " >> $GITHUB_STEP_SUMMARY
          ssh -i ~/.ssh/oracle_vm_key -o StrictHostKeyChecking=no \
            ${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }} \
            "ssh shopvivaliz@localhost whoami" >> $GITHUB_STEP_SUMMARY 2>&1 && echo "✅ Working" || echo "⚠️ Check logs"

      - name: Show Configuration
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Configuration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SSH Host:** ${{ secrets.ORACLE_VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**SSH User:** shopvivaliz" >> $GITHUB_STEP_SUMMARY
          echo "**SSH Port:** 22" >> $GITHUB_STEP_SUMMARY
          echo "**MCP URL:** http://${{ secrets.ORACLE_VM_HOST }}:5556" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Copy the SSH public key above" >> $GITHUB_STEP_SUMMARY
          echo "2. Configure Claude Code with SSH access to shopvivaliz@${{ secrets.ORACLE_VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Configure Claude Chat with MCP URL: http://${{ secrets.ORACLE_VM_HOST }}:5556" >> $GITHUB_STEP_SUMMARY
