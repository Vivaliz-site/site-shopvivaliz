name: Setup - Configurar Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  configure:
    name: Configurar main branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar branch protection via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(git config --get remote.origin.url | sed -E 's/.*github\.com[:/]([^/]+).*/\1/')
          REPO=$(git config --get remote.origin.url | sed -E 's/.*github\.com[:/][^/]+\/(.+)(\.git)?$/\1/' | sed 's/\.git$//')

          echo "Configurando $OWNER/$REPO..."

          gh api \
            --method PUT \
            "repos/$OWNER/$REPO/branches/main/protection" \
            -F required_status_checks[strict]=true \
            -f required_status_checks[contexts][]=php-lint \
            -F enforce_admins=true \
            -F required_pull_request_reviews[dismiss_stale_reviews]=true \
            -F required_pull_request_reviews[require_code_owner_reviews]=false \
            -F required_pull_request_reviews[required_approving_review_count]=1 \
            -F required_conversation_resolution=true \
            -F restrictions="" \
            -F required_linear_history=true \
            -F allow_force_pushes=false \
            -F allow_deletions=false \
            -F block_creations=false \
            -F lock_branch=false \
            -F allow_fork_syncing=true || echo "  Branch protection ja existe ou houve erro na configuracao"

          echo " Protecao da main configurada:"
          echo " - PR obrigatorio com 1 aprovacao"
          echo " - Push direto bloqueado pela branch protection"
          echo " - Force push bloqueado"
          echo " - Check obrigatorio: php-lint"
          echo " - Historico linear obrigatorio"
