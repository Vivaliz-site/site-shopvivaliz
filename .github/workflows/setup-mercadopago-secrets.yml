name: Setup Mercado Pago Secrets

on:
  workflow_dispatch

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log existing secrets
        run: |
          echo "✅ Mercado Pago secrets podem ser configurados via GitHub Settings"
          echo ""
          echo "Para configurar automaticamente:"
          echo "1. Ir para: Settings > Secrets and variables > Actions"
          echo "2. Adicionar:"
          echo "   - MERCADOPAGO_ACCESS_TOKEN"
          echo "   - MERCADOPAGO_PUBLIC_KEY"  
          echo "   - MERCADOPAGO_WEBHOOK_SECRET"
          echo ""
          echo "Ou use: gh secret set"
