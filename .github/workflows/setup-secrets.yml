name: Setup GitHub Secrets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Semanal

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run setup secrets script
        env:
          # Estas variáveis devem ser definidas no repositório
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          CLIENT_ID_API_OLIST: ${{ secrets.CLIENT_ID_API_OLIST }}
          CLIENT_SECRET_OLIST: ${{ secrets.CLIENT_SECRET_OLIST }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_TEST_PARTNER_ID: ${{ secrets.SHOPEE_TEST_PARTNER_ID }}
          SHOPEE_TEST_PARTNER_KEY: ${{ secrets.SHOPEE_TEST_PARTNER_KEY }}
          TIKTOK_CLIENT_ID: ${{ secrets.TIKTOK_CLIENT_ID }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_APP_KEY: ${{ secrets.TIKTOK_APP_KEY }}
          TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
        run: |
          python scripts/setup_secrets.py

      - name: Verify secrets
        run: |
          echo "📋 Verificando secrets configurados..."
          python scripts/verify_secrets.py
