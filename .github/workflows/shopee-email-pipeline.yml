name: Shopee Email Pipeline

on:
  workflow_dispatch:
    # Manual trigger only - secrets not configured yet
    # To enable push-triggered: set SMTP_HOST, SMTP_USER, SHOPEE_PARTNER_ID in GitHub Secrets

jobs:
  shopeedelivery:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl Pillow

      - name: Run Shopee full pipeline
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST || secrets.SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST || secrets.FTP_SERVER }}
          FTP_SERVER: ${{ secrets.FTP_SERVER || secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER || secrets.FTP_USERNAME }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python scripts/main.py

      - name: Upload final artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: shopee-pipeline-results
          path: |
            logs/
            storage/
          if-no-files-found: ignore
          retention-days: 3
