name: Shopee Media Space Repair

on:
  workflow_dispatch:
    inputs:
      result_xlsx:
        description: "Caminho no repo da planilha Result_*.xlsx"
        required: true
        default: "imports/shopee-media-space/Result_shopee_mass_update_media_info_604371761_20260702124508.xlsx"
      mapping_xlsx:
        description: "Caminho no repo da planilha mapeamento_shopee_geradas.xlsx"
        required: true
        default: "imports/shopee-media-space/mapeamento_shopee_geradas.xlsx"
      image_root:
        description: "Pasta no repo com imagens jpg"
        required: true
        default: "imports/shopee-media-space/images"
      base_url:
        description: "Base Shopee API (prod ou sandbox)"
        required: false
        default: "https://partner.shopeemobile.com/api/v2"
      only_failed:
        description: "Processar somente linhas com erro na planilha de resultado (true/false)"
        required: false
        default: "true"
      limit:
        description: "Maximo de linhas (0 = todas)"
        required: false
        default: "0"
      dry_run:
        description: "Apenas montar o plano, sem chamar a Shopee API (true/false)"
        required: false
        default: "true"

permissions:
  contents: read
  actions: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
      SHOPEE_TEST_PARTNER_ID: ${{ secrets.SHOPEE_TEST_PARTNER_ID }}
      SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
      SHOPEE_TEST_PARTNER_KEY: ${{ secrets.SHOPEE_TEST_PARTNER_KEY }}
      SHOPEE_TEST_API_KEY: ${{ secrets.SHOPEE_TEST_API_KEY }}
      SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
      SHOPEE_REFRESH_TOKEN: ${{ secrets.SHOPEE_REFRESH_TOKEN }}
      SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
      SHOPEE_BASE_URL: ${{ github.event.inputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate inputs and secrets
        run: |
          export SHOPEE_PARTNER_ID="${SHOPEE_PARTNER_ID:-$SHOPEE_TEST_PARTNER_ID}"
          export SHOPEE_PARTNER_KEY="${SHOPEE_PARTNER_KEY:-${SHOPEE_TEST_PARTNER_KEY:-$SHOPEE_TEST_API_KEY}}"
          test -f "${{ github.event.inputs.result_xlsx }}" || { echo "Missing result_xlsx"; exit 1; }
          test -f "${{ github.event.inputs.mapping_xlsx }}" || { echo "Missing mapping_xlsx"; exit 1; }
          test -d "${{ github.event.inputs.image_root }}" || { echo "Missing image_root"; exit 1; }
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            for var in SHOPEE_PARTNER_ID SHOPEE_PARTNER_KEY SHOPEE_ACCESS_TOKEN SHOPEE_SHOP_ID; do
              if [ -z "${!var}" ]; then
                echo "Missing secret: $var"
                exit 1
              fi
            done
          fi

      - name: Run Shopee media repair
        run: |
          export SHOPEE_PARTNER_ID="${SHOPEE_PARTNER_ID:-$SHOPEE_TEST_PARTNER_ID}"
          export SHOPEE_PARTNER_KEY="${SHOPEE_PARTNER_KEY:-${SHOPEE_TEST_PARTNER_KEY:-$SHOPEE_TEST_API_KEY}}"
          ARGS="--result-xlsx '${{ github.event.inputs.result_xlsx }}' --mapping-xlsx '${{ github.event.inputs.mapping_xlsx }}' --image-root '${{ github.event.inputs.image_root }}'"
          [ "${{ github.event.inputs.only_failed }}" = "true" ] && ARGS="$ARGS --only-failed"
          [ "${{ github.event.inputs.limit }}" != "0" ] && ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          eval python scripts/shopee-media-space-repair.py $ARGS

      - name: Upload repair reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: shopee-media-space-repair-${{ github.run_id }}
          path: reports/shopee-media-space-repair-*.json
          retention-days: 30
