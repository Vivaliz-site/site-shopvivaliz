name: Shopee image automation preflight

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shopee-image-preflight
  cancel-in-progress: true

jobs:
  preflight:
    name: Validar insumos sem publicar
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID || secrets.SHOPEE_TEST_PARTNER_ID }}
      SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY || secrets.SHOPEE_TEST_PARTNER_KEY }}
      SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
      SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validar implementação, credenciais e mapeamento
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          ready=true
          if [[ ! -f scripts/shopee-media-space-repair.py ]]; then
            echo "::error::Implementação real de Media Space ausente."
            exit 1
          fi
          for key in SHOPEE_PARTNER_ID SHOPEE_PARTNER_KEY SHOPEE_SHOP_ID SHOPEE_ACCESS_TOKEN; do
            if [[ -z "${!key:-}" ]]; then
              echo "::warning::Secret ausente: ${key}"
              ready=false
            fi
          done
          if [[ ! -f mapeamento_olist_ambientadas.xlsx ]]; then
            echo "::warning::Planilha mapeamento_olist_ambientadas.xlsx ausente."
            ready=false
          fi
          if [[ ! -d imagens_ambientadas ]]; then
            echo "::warning::Diretório imagens_ambientadas ausente."
            ready=false
          fi
          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Registrar decisão segura
        shell: bash
        run: |
          echo "### Shopee Media Space" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.preflight.outputs.ready }}" == "true" ]]; then
            echo "Preflight completo. Upload continua exigindo execução manual e validação da amostra." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Preflight incompleto; nenhuma imagem ou anúncio foi alterado." >> "$GITHUB_STEP_SUMMARY"
          fi
