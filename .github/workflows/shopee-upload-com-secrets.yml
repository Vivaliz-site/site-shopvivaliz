name: Shopee - Upload Imagens (Com Secrets)

on:
  schedule:
    # Executar a cada 6 horas
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  shopee-upload:
    runs-on: ubuntu-latest

    env:
      SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
      SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
      SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
      SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, json

      - name: Verificar Secrets Configurados
        id: check_secrets
        run: |
          echo "Verificando secrets do GitHub..."
          if [ -z "$SHOPEE_PARTNER_ID" ] || [ -z "$SHOPEE_PARTNER_KEY" ] || [ -z "$SHOPEE_SHOP_ID" ] || [ -z "$SHOPEE_ACCESS_TOKEN" ]; then
            echo "Secrets Shopee nao configurados no repositorio."
            echo "Configure: SHOPEE_PARTNER_ID, SHOPEE_PARTNER_KEY, SHOPEE_SHOP_ID, SHOPEE_ACCESS_TOKEN"
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            php core/config/ShopeeSecretsLoader.php
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "Secrets validados com sucesso!"
          fi

      - name: Executar Upload Imagens
        if: steps.check_secrets.outputs.configured == 'true'
        run: |
          echo "=== INICIANDO UPLOAD DE IMAGENS SHOPEE ==="
          echo "Timestamp: $(date -Iseconds)"
          echo ""
          php api/shopee/atualizar-completo.php
          echo ""
          echo "=== UPLOAD CONCLUIDO ==="

      - name: Validar Imagens
        if: steps.check_secrets.outputs.configured == 'true'
        run: |
          echo "Validando imagens na Shopee..."
          php api/shopee/validar-imagens.php
          echo ""
          echo "Validacao concluida!"

      - name: Registrar Logs
        if: always()
        run: |
          echo "Logs de execucao:"
          if [ -f logs/shopee-upload.log ]; then
            echo "--- Upload Log ---"
            tail -20 logs/shopee-upload.log
          fi
          if [ -f logs/validacao-imagens.log ]; then
            echo "--- Validacao Log ---"
            tail -20 logs/validacao-imagens.log
          fi
          if [ -f logs/atualizacao-shopee-final.log ]; then
            echo "--- Atualizacao Log ---"
            tail -20 logs/atualizacao-shopee-final.log
          fi

      - name: Commit Logs
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/shopee-*.log logs/validacao-*.log logs/atualizacao-*.log || true
          git commit -m "chore: shopee upload logs [$(date +'%Y-%m-%d %H:%M')]" || true
          git push || true

      - name: Notificar Sucesso
        if: steps.check_secrets.outputs.configured == 'true' && success()
        run: |
          echo "SUCESSO: Upload de imagens concluido!"
          echo "Proxima execucao: em 6 horas"

      - name: Secrets nao configurados
        if: steps.check_secrets.outputs.configured != 'true'
        run: |
          echo "INFO: Secrets Shopee nao configurados. Upload pulado."
          echo "Para ativar, configure os secrets no repositorio GitHub."
