name: Shopee - Upload Imagens (Com Secrets)

on:
  schedule:
    # Executar a cada 6 horas
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  shopee-upload:
    runs-on: ubuntu-latest

    env:
      SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID || secrets.SHOPEE_TEST_PARTNER_ID }}
      SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY || secrets.SHOPEE_TEST_PARTNER_KEY }}
      SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
      SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, json

      - name: Validar Secrets
        run: |
          echo "Validando secrets do GitHub..."
          php core/config/ShopeeSecretsLoader.php
          echo ""
          echo "Secrets validados com sucesso!"

      - name: Executar Upload Imagens
        run: |
          echo "=== INICIANDO UPLOAD DE IMAGENS SHOPEE ==="
          echo "Timestamp: $(date -Iseconds)"
          echo ""

          # Carregar secrets e executar
          php api/shopee/atualizar-completo.php

          echo ""
          echo "=== UPLOAD CONCLUIDO ==="

      - name: Validar Imagens
        run: |
          echo "Validando imagens na Shopee..."
          php api/shopee/validar-imagens.php
          echo ""
          echo "Validacao concluida!"

      - name: Registrar Logs
        if: always()
        run: |
          echo "Logs de execucao:"
          if [ -f logs/shopee-upload.log ]; then
            echo "--- Upload Log ---"
            tail -20 logs/shopee-upload.log
          fi

          if [ -f logs/validacao-imagens.log ]; then
            echo "--- Validacao Log ---"
            tail -20 logs/validacao-imagens.log
          fi

          if [ -f logs/atualizacao-shopee-final.log ]; then
            echo "--- Atualizacao Log ---"
            tail -20 logs/atualizacao-shopee-final.log
          fi

      - name: Commit Logs
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/shopee-*.log logs/validacao-*.log logs/atualizacao-*.log || true
          git commit -m "chore: shopee upload logs [$(date +'%Y-%m-%d %H:%M')]" || true
          git push || true

      - name: Notificar Sucesso
        if: success()
        run: |
          echo "SUCESSO: Upload de imagens concluido!"
          echo "Proxima execucao: em 6 horas"

      - name: Notificar Erro
        if: failure()
        run: |
          echo "ERRO: Falha no upload de imagens"
          echo "Verifique os logs acima"
          exit 1
