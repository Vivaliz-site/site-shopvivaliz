name: ShopVivaliz QA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write

jobs:
  memory-nudge:
    name: Lembrete de memoria compartilhada
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verificar se arquivo de integracao de risco mudou sem atualizar docs/MEMORIA-AGENTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" || true)

          # Arquivos onde bugs de integracao ja causaram retrabalho entre
          # agentes (ver docs/MEMORIA-AGENTES.md). Nao e uma lista exaustiva,
          # so os pontos de maior risco ja conhecidos.
          RISK_PATTERN='includes/tiny-order-push.php|daemon-sync-products.py|api/olist/|api/webhook-mercadopago.php|api/melhorenvio/|includes/mercadopago-gateway.php'

          if echo "$CHANGED" | grep -qE "$RISK_PATTERN"; then
            if ! echo "$CHANGED" | grep -q "^docs/MEMORIA-AGENTES.md$"; then
              MATCHED=$(echo "$CHANGED" | grep -E "$RISK_PATTERN" | sed 's/^/- `/;s/$/`/')
              {
                echo "🧠 **Lembrete de memória compartilhada**"
                echo ""
                echo "Este PR mexe em arquivo(s) de integração externa que já causaram retrabalho entre agentes antes:"
                echo ""
                echo "$MATCHED"
                echo ""
                echo "Se você descobriu algo não-óbvio sobre a API/comportamento externo (não só corrigiu um bug já mapeado), considere adicionar uma entrada em \`docs/MEMORIA-AGENTES.md\` — assim a próxima sessão (de qualquer agente) não precisa redescobrir do zero."
                echo ""
                echo "Isso é só um lembrete, não bloqueia o merge."
              } > /tmp/memory-nudge-body.md
              gh pr comment "$PR_NUMBER" --body-file /tmp/memory-nudge-body.md 2>/dev/null || echo "::notice::Nao foi possivel comentar no PR (permissao/contexto), seguindo sem bloquear."
            fi
          fi
          exit 0

  workflow-lint:
    name: GitHub Actions syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          # Shell scripts are exercised by their own jobs. This gate targets
          # workflow YAML, triggers, expressions and action contracts.
          args: -color -shellcheck=

  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: PHP lint
        run: |
          set -e
          found=0
          while IFS= read -r -d '' file; do
            found=1
            echo "::group::php -l $file"
            if ! php -l "$file"; then
              echo "::error file=$file::PHP lint failed"
              exit 1
            fi
            echo "::endgroup::"
          done < <(find . -path './vendor' -prune -o -name '*.php' -print0)
          if [ "$found" -eq 0 ]; then
            echo "No PHP files yet."
          fi
      - name: "Bloquear CSS wildcard de layout (ex: [class*=hero])"
        run: |
          # Lista de prefixos "estruturais" (secoes/layout inteiros) que ja causaram
          # bug real em producao quando usados com [class*=...] (ver CHANGELOG.md).
          # Wildcards em classes de componente pequeno (card, badge, grid...) ja
          # existem no projeto e sao debito tecnico conhecido, nao bloqueado aqui.
          PADRAO='\[class\s*\*=\s*"(hero|banner|section|page|layout|container)'
          if grep -rEn "$PADRAO" --include='*.css' .; then
            echo ""
            echo "ERRO: selector CSS coringa estrutural encontrado acima (ex: [class*=hero])."
            echo "Esse padrao ja quebrou a home em producao (ver CHANGELOG.md) - casa com"
            echo "qualquer classe que contenha a substring, inclusive secoes aninhadas nao"
            echo "relacionadas. Use selectores exatos para classes de layout/secao."
            exit 1
          fi
          echo "OK: nenhum selector CSS coringa estrutural encontrado."
      - name: Repository safety reminder
        run: |
          echo "Security review remains required before merge. Do not commit credentials or production dumps."

  live-smoke-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Verificar footer e ausencia de bug visual conhecido na home
        run: |
          html=$(curl -sL https://dev.shopvivaliz.com.br/)
          if ! echo "$html" | grep -q 'footer-cols'; then
            echo "ERRO: footer nao encontrado na home ao vivo."
            exit 1
          fi
          if echo "$html" | grep -q 'class="hero-slide is-active"[^>]*style="[^"]*linear-gradient'; then
            echo "ERRO: possivel regressao do bug de gradiente duplicado no hero."
            exit 1
          fi
          echo "OK: home ao vivo passou no smoke test."
