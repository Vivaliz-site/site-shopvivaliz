name: ShopVivaliz QA

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  statuses: write

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: PHP lint
        run: |
          if find . -path './vendor' -prune -o -name '*.php' -print | grep -q .; then
            find . -path './vendor' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
          else
            echo "No PHP files yet."
          fi
      - name: Repository safety reminder
        run: |
          echo "Security review remains required before merge. Do not commit credentials or production dumps."
