name: Storefront Quality

on:
  pull_request:
    paths:
      - '**/*.php'
      - '**/*.js'
      - '**/*.css'
      - '**/*.md'
      - '.htaccess'
      - 'tests/**'
      - 'scripts/quality/**'
      - '.github/workflows/storefront-quality.yml'
  push:
    branches: [main]
    paths:
      - '**/*.php'
      - '**/*.js'
      - '**/*.css'
      - '**/*.md'
      - '.htaccess'
      - 'tests/**'
      - 'scripts/quality/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Validate PHP syntax
        run: |
          set -e
          found=0
          while IFS= read -r -d '' file; do
            found=1
            echo "::group::php -l $file"
            if ! php -l "$file"; then
              echo "::error file=$file::PHP lint failed"
              exit 1
            fi
            echo "::endgroup::"
          done < <(find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0)
          if [ "$found" -eq 0 ]; then
            echo "No PHP files found."
          fi

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Run ShopVivaliz quality gates
        run: php scripts/quality/run-all.php

  javascript-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Validate storefront JavaScript syntax
        run: |
          set -e
          find js -type f -name '*.js' -print0 | xargs -0 -n1 node --check

  storefront-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Run storefront smoke tests
        run: bash tests/storefront-smoke.sh
