name: Sincronizacao Cirurgica de Arquivos (uso unico)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe-docroot-fixed:
    name: Sondar docroot sem barra dupla
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Diagnostico e upload sem barra dupla
        shell: bash
        run: |
          PORT="${FTP_PORT:-21}"
          echo "<?php echo 'claude-probe-fix-1783473227'; ?>" > probe.php

          # normaliza removendo barra final de FTP_REMOTE_DIR
          REMOTE="${FTP_REMOTE_DIR%/}"
          echo "REMOTE normalizado (tamanho): ${#REMOTE}"

          PATH1="${REMOTE}/public_html/dev/probe.php"
          echo "Caminho exato: [$PATH1]"
          curl -sS -T probe.php "ftp://${FTP_SERVER}:${PORT}${PATH1}" --user "${FTP_USERNAME}:${FTP_PASSWORD}" --connect-timeout 15 --max-time 30
          echo "upload feito"

          echo "=== confirmando via FTP que o arquivo esta la ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}"             "ftp://${FTP_SERVER}:${PORT}${REMOTE}/public_html/dev/probe.php" -w "\nftp_size=%{size_download} ftp_code=%{http_code}\n" --connect-timeout 15 --max-time 30
