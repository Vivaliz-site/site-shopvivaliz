name: Sincronizacao Cirurgica de Arquivos (uso unico)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe-docroot:
    name: Sondar qual pasta e o docroot real
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Subir arquivo-marcador em 3 candidatos a docroot
        shell: bash
        run: |
          PORT="${FTP_PORT:-21}"
          echo "claude-probe-1783472626" > probe.txt

          echo "Subindo em FTP_REMOTE_DIR/ ..."
          curl -sS -T probe.txt "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/probe.txt" --user "${FTP_USERNAME}:${FTP_PASSWORD}" --connect-timeout 15 --max-time 30

          echo "Subindo em FTP_REMOTE_DIR/public_html/ ..."
          curl -sS -T probe.txt "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/public_html/probe.txt" --user "${FTP_USERNAME}:${FTP_PASSWORD}" --connect-timeout 15 --max-time 30

          echo "Subindo em FTP_REMOTE_DIR/public_html/dev/ ..."
          curl -sS -T probe.txt "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/public_html/dev/probe.txt" --user "${FTP_USERNAME}:${FTP_PASSWORD}" --connect-timeout 15 --max-time 30

          echo "feito"
