name: Sincronizacao Cirurgica de Arquivos (uso unico)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe-docroot-php:
    name: Sondar docroot com marcador PHP
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Subir marcador PHP em 3 candidatos
        shell: bash
        run: |
          PORT="${FTP_PORT:-21}"
          echo "<?php echo 'claude-probe-1783472695'; ?>" > probe.php

          for DEST in "" "/public_html" "/public_html/dev"; do
            echo "Subindo em ${FTP_REMOTE_DIR}${DEST}/probe.php ..."
            curl -sS -T probe.php "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}${DEST}/probe.php" --user "${FTP_USERNAME}:${FTP_PASSWORD}" --connect-timeout 15 --max-time 30
          done
          echo "feito"
