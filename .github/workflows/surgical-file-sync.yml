name: Sincronizacao Cirurgica de Arquivos (uso unico)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-dev-folder:
    name: Investigar public_html/dev
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Investigar public_html/dev
        shell: bash
        run: |
          PORT="${FTP_PORT:-21}"
          BASE="${FTP_REMOTE_DIR}/public_html/dev"

          echo "=== listagem de public_html/dev/ ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${BASE}/" --list-only --connect-timeout 15 --max-time 30 || echo "FALHOU"

          echo "=== catalogo.php dentro de public_html/dev ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${BASE}/catalogo.php" -o /dev/null -w "size=%{size_download} http_code=%{http_code}\n" --connect-timeout 15 --max-time 30 || echo "nao existe"

          echo "=== api/gamification dentro de public_html/dev ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${BASE}/api/gamification/" --list-only --connect-timeout 15 --max-time 30 || echo "nao existe"

          echo "=== .htaccess dentro de public_html/dev ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${BASE}/.htaccess" -o /dev/null -w "size=%{size_download} http_code=%{http_code}\n" --connect-timeout 15 --max-time 30 || echo "nao existe"
