name: Sincronizacao Cirurgica de Arquivos (uso unico)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-public-html:
    name: Investigar public_html
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Investigar public_html e conteudo real servido
        shell: bash
        run: |
          PORT="${FTP_PORT:-21}"

          echo "=== listagem de FTP_REMOTE_DIR/public_html/ ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/public_html/" --list-only --connect-timeout 15 --max-time 30 || echo "FALHOU listagem public_html"

          echo "=== catalogo.php dentro de public_html (tamanho) ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/public_html/catalogo.php" -o /dev/null -w "size=%{size_download} http_code=%{http_code}\n" --connect-timeout 15 --max-time 30 || echo "nao existe ou falhou"

          echo "=== api/gamification dentro de public_html ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/public_html/api/gamification/" --list-only --connect-timeout 15 --max-time 30 || echo "nao existe ou falhou"
