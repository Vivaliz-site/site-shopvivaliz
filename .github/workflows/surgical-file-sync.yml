name: Sincronizacao Cirurgica de Arquivos (uso unico)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-real-docroot:
    name: Buscar todas as pastas candidatas a docroot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
    steps:
      - name: Listar TODAS as pastas na raiz e em public_html
        shell: bash
        run: |
          PORT="${FTP_PORT:-21}"

          echo "=== raiz completa (com tipo, ls -la style) ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}/" --connect-timeout 15 --max-time 30

          echo "=== dentro de public_html (ls -la style) ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}/public_html/" --connect-timeout 15 --max-time 30
