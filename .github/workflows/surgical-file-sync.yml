name: Sincronizacao Cirurgica de Arquivos (uso unico)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-ftp:
    name: Diagnosticar caminho FTP real
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Listar raiz FTP e diretorio configurado
        shell: bash
        run: |
          PORT="${FTP_PORT:-21}"
          echo "=== FTP_REMOTE_DIR (tamanho e repr) ==="
          echo -n "$FTP_REMOTE_DIR" | wc -c
          echo -n "$FTP_REMOTE_DIR" | od -c | head -3

          echo "=== listagem da raiz FTP (login home) ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}/" --list-only --connect-timeout 15 --max-time 30 || echo "FALHOU listagem raiz"

          echo "=== listagem de FTP_REMOTE_DIR ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/" --list-only --connect-timeout 15 --max-time 30 || echo "FALHOU listagem FTP_REMOTE_DIR"

          echo "=== verificando se index.php/catalogo.php estao onde esperado ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/catalogo.php" -o /dev/null -w "catalogo.php remoto: %{size_download} bytes, http_code=%{http_code}\n" --connect-timeout 15 --max-time 30 || echo "FALHOU check catalogo.php"

          echo "=== checando api/gamification/ que subi ==="
          curl -sS --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "ftp://${FTP_SERVER}:${PORT}${FTP_REMOTE_DIR}/api/gamification/" --list-only --connect-timeout 15 --max-time 30 || echo "FALHOU listagem api/gamification"
