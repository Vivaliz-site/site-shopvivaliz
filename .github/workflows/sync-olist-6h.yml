name: Sincronizar Olist/Tiny - Auto-Renew Token (10min)
# 2026-07-18: nome/comentario antigos diziam "6h"/"2h"/"5min" mas o cron real
# sempre foi */10 (10 em 10 minutos). Corrigido para bater com a realidade --
# nao houve mudanca de comportamento, so de documentacao.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-olist-catalog-mirror
  cancel-in-progress: false

jobs:
  sync-olist:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Sincronizar catalogo como espelho da Olist/Tiny
        env:
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          OLIST_ACCESS_TOKEN: ${{ secrets.OLIST_ACCESS_TOKEN }}
          OLIST_API_TOKEN: ${{ secrets.OLIST_API_TOKEN }}
          TOKEN_API_OLIST: ${{ secrets.TOKEN_API_OLIST }}
          TINY_CLIENT_ID: ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TINY_REFRESH_TOKEN: ${{ secrets.TINY_REFRESH_TOKEN }}
          TINY_ACCESS_TOKEN: ${{ secrets.TINY_ACCESS_TOKEN }}
          TINY_API_TOKEN: ${{ secrets.TINY_API_TOKEN }}
        run: |
          mkdir -p logs
          php olist/sync-products.php > logs/olist-live-sync-response.json
          cat logs/olist-live-sync-response.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("logs/olist-live-sync-response.json").read_text(encoding="utf-8"))
          if payload.get("ok") is not True:
              raise SystemExit(f"sync failed: {payload}")
          fetched = int(payload.get("fetched") or 0)
          after = int(payload.get("after_count") or 0)
          if fetched <= 0 or after <= 0:
              raise SystemExit(f"sync returned empty catalog: {payload}")
          print(f"Catalogo espelhado: fetched={fetched} after={after} removed={payload.get('removed_count')}")
          PY

      - name: Validar catalogo sincronizado
        run: |
          set +e
          php scripts/quality/validate-product-prices.php
          php scripts/quality/validate-product-stock.php || echo "⚠️  Stock validation warning (allowed)"
          php scripts/quality/validate-product-images.php || echo "⚠️  Image validation warning (allowed)"
          exit 0

      - name: Renovar tokens no .env (se foram atualizados)
        run: |
          if [[ -f storage/private/tokens.json ]]; then
            python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          # Ler tokens renovados
          tokens = json.loads(Path("storage/private/tokens.json").read_text())
          access = tokens.get("OLIST_ACCESS_TOKEN", "")
          refresh = tokens.get("OLIST_REFRESH_TOKEN", "")

          if not access or not refresh:
              print("WARN: tokens.json vazio ou incompleto")
              exit(0)

          # Atualizar .env
          env_path = Path(".env")
          content = env_path.read_text() if env_path.exists() else ""

          # Substituir linhas existentes ou adicionar
          def update_or_add(content, key, value):
              pattern = f"^{re.escape(key)}=.*$"
              if re.search(pattern, content, re.MULTILINE):
                  return re.sub(pattern, f"{key}={value}", content, flags=re.MULTILINE)
              else:
                  return content + (f"\n{key}={value}" if content.strip() else f"{key}={value}")

          content = update_or_add(content, "OLIST_ACCESS_TOKEN", access)
          content = update_or_add(content, "OLIST_REFRESH_TOKEN", refresh)
          env_path.write_text(content)
          print(f"✅ Tokens atualizados em .env")
          print(f"   ACCESS_TOKEN: {access[:20]}...")
          print(f"   REFRESH_TOKEN: {refresh[:20]}...")
          PY
          else
            echo "WARN: tokens.json não encontrado em storage/private/"
          fi

      - name: Fazer commit do catalogo espelhado + tokens renovados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          changes_catalog=$(git status --short api/catalog/fallback-products.json)
          changes_env=$(git status --short .env)

          if [[ -n "$changes_catalog" || -n "$changes_env" ]]; then
            [[ -n "$changes_catalog" ]] && git add api/catalog/fallback-products.json
            [[ -n "$changes_env" ]] && git add .env

            if [[ -n "$changes_env" ]]; then
              git commit -m "chore: atualizar tokens Olist/Tiny + sincronizar catalogo"
            else
              git commit -m "chore: espelhar catalogo Olist/Tiny"
            fi
            git push
          else
            echo "Sem alteracoes no catalogo ou tokens."
          fi

