name: Sincronizar Olist/Tiny - Catalogo (10min)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-olist-catalog-mirror
  cancel-in-progress: false

jobs:
  sync-olist:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Sincronizar catalogo como espelho da Olist/Tiny
        env:
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          OLIST_ACCESS_TOKEN: ${{ secrets.OLIST_ACCESS_TOKEN }}
          OLIST_API_TOKEN: ${{ secrets.OLIST_API_TOKEN }}
          TOKEN_API_OLIST: ${{ secrets.TOKEN_API_OLIST }}
          TINY_CLIENT_ID: ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TINY_REFRESH_TOKEN: ${{ secrets.TINY_REFRESH_TOKEN }}
          TINY_ACCESS_TOKEN: ${{ secrets.TINY_ACCESS_TOKEN }}
          TINY_API_TOKEN: ${{ secrets.TINY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p logs
          php olist/sync-products.php > logs/olist-live-sync-response.json
          cat logs/olist-live-sync-response.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("logs/olist-live-sync-response.json").read_text(encoding="utf-8"))
          if payload.get("ok") is not True:
              raise SystemExit(f"sync failed: {payload}")

          fetched = int(payload.get("fetched") or 0)
          after = int(payload.get("after_count") or 0)
          if fetched <= 0 or after <= 0:
              raise SystemExit(f"sync returned empty catalog: {payload}")

          print(
              f"Catalogo espelhado: fetched={fetched} "
              f"after={after} removed={payload.get('removed_count')}"
          )
          PY

      - name: Validar catalogo sincronizado
        run: |
          set -euo pipefail
          php scripts/quality/validate-product-prices.php
          php scripts/quality/validate-product-stock.php || echo "WARNING: stock validation warning"
          php scripts/quality/validate-product-images.php || echo "WARNING: image validation warning"

      - name: Verificar renovacao de token sem expor credenciais
        run: |
          set -euo pipefail
          if [[ -f storage/private/tokens.json ]]; then
            python3 - <<'PY'
          import json
          from pathlib import Path

          tokens = json.loads(Path("storage/private/tokens.json").read_text(encoding="utf-8"))
          access = tokens.get("OLIST_ACCESS_TOKEN", "")
          refresh = tokens.get("OLIST_REFRESH_TOKEN", "")
          if not access or not refresh:
              raise SystemExit("tokens.json vazio ou incompleto")
          print("Tokens renovados durante esta execucao; valores mantidos fora do Git.")
          PY
          else
            echo "Nenhum arquivo local de tokens foi gerado nesta execucao."
          fi

      - name: Garantir que credenciais nao serao versionadas
        run: |
          set -euo pipefail
          if ! git diff --quiet -- .env storage/private/tokens.json; then
            echo "ERRO: tentativa de alterar arquivo de credenciais detectada."
            git diff --name-only -- .env storage/private/tokens.json
            exit 1
          fi

      - name: Fazer commit somente do catalogo espelhado
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          changes_catalog=$(git status --short api/catalog/fallback-products.json)

          if [[ -n "$changes_catalog" ]]; then
            git add api/catalog/fallback-products.json
            git commit -m "chore: espelhar catalogo Olist/Tiny"
            git push
          else
            echo "Sem alteracoes no catalogo."
          fi
