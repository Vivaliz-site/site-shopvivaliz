name: Sincronizar Olist/Tiny - Catalogo (10min)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-olist-catalog-mirror
  cancel-in-progress: false

jobs:
  sync-olist:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Sincronizar catalogo como espelho da Olist/Tiny
        env:
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          OLIST_ACCESS_TOKEN: ${{ secrets.OLIST_ACCESS_TOKEN }}
          OLIST_API_TOKEN: ${{ secrets.OLIST_API_TOKEN }}
          TOKEN_API_OLIST: ${{ secrets.TOKEN_API_OLIST }}
          TINY_CLIENT_ID: ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TINY_REFRESH_TOKEN: ${{ secrets.TINY_REFRESH_TOKEN }}
          TINY_ACCESS_TOKEN: ${{ secrets.TINY_ACCESS_TOKEN }}
          TINY_API_TOKEN: ${{ secrets.TINY_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p logs
          php olist/sync-products.php > logs/olist-live-sync-response.json
          cat logs/olist-live-sync-response.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("logs/olist-live-sync-response.json").read_text(encoding="utf-8"))
          if payload.get("ok") is not True:
              raise SystemExit(f"sync failed: {payload}")

          fetched = int(payload.get("fetched") or 0)
          after = int(payload.get("after_count") or 0)
          if fetched <= 0 or after <= 0:
              raise SystemExit(f"sync returned empty catalog: {payload}")

          print(
              f"Catalogo espelhado: fetched={fetched} "
              f"after={after} removed={payload.get('removed_count')}"
          )
          PY

      - name: Reparar imagens precos e estoque automaticamente
        run: |
          set -euo pipefail
          php -l scripts/quality/repair-olist-catalog.php
          php scripts/quality/repair-olist-catalog.php > logs/olist-catalog-repair-response.json
          cat logs/olist-catalog-repair-response.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path("logs/olist-catalog-repair-response.json").read_text(encoding="utf-8")
          )
          if payload.get("ok") is not True:
              raise SystemExit(f"catalog repair failed: {payload}")

          products = int(payload.get("products") or 0)
          if products <= 0:
              raise SystemExit(f"catalog repair returned no products: {payload}")

          print(
              "Reparo concluido: "
              f"products={products} "
              f"images={payload.get('images_repaired')} "
              f"prices={payload.get('prices_repaired')} "
              f"stock={payload.get('stock_repaired')}"
          )
          PY

      - name: Bloquear reducao anomala do catalogo
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          path = "api/catalog/fallback-products.json"
          current = json.loads(Path(path).read_text(encoding="utf-8"))
          if not isinstance(current, list):
              raise SystemExit("catalogo atual invalido: raiz JSON nao e uma lista")

          try:
              previous_raw = subprocess.check_output(
                  ["git", "show", f"HEAD:{path}"],
                  text=True,
              )
              previous = json.loads(previous_raw)
          except Exception as exc:
              print(f"Sem base anterior valida para comparar: {exc}")
              raise SystemExit(0)

          if not isinstance(previous, list) or not previous:
              print("Catalogo anterior vazio ou invalido; comparacao ignorada.")
              raise SystemExit(0)

          before = len(previous)
          after = len(current)
          minimum_allowed = max(1, int(before * 0.80))
          removed_ratio = (before - after) / before if after < before else 0

          print(
              f"Protecao de volume: before={before} after={after} "
              f"minimum_allowed={minimum_allowed} removed_ratio={removed_ratio:.1%}"
          )

          if after < minimum_allowed:
              raise SystemExit(
                  "reducao anomala detectada: o novo catalogo possui menos de 80% "
                  "dos produtos anteriores; commit bloqueado para evitar perda por "
                  "paginacao incompleta ou falha temporaria da API"
              )
          PY

      - name: Validar catalogo sincronizado e reparado
        run: |
          set -euo pipefail
          php scripts/quality/validate-product-prices.php
          php scripts/quality/validate-product-stock.php || echo "WARNING: stock validation warning"
          php scripts/quality/validate-product-images.php || echo "WARNING: image validation warning"

      - name: Verificar renovacao de token sem expor credenciais
        run: |
          set -euo pipefail
          if [[ -f storage/private/tokens.json ]]; then
            python3 - <<'PY'
          import json
          from pathlib import Path

          tokens = json.loads(Path("storage/private/tokens.json").read_text(encoding="utf-8"))
          access = tokens.get("OLIST_ACCESS_TOKEN", "")
          refresh = tokens.get("OLIST_REFRESH_TOKEN", "")
          if not access or not refresh:
              raise SystemExit("tokens.json vazio ou incompleto")
          print("Tokens renovados durante esta execucao; valores mantidos fora do Git.")
          PY
          else
            echo "Nenhum arquivo local de tokens foi gerado nesta execucao."
          fi

      - name: Garantir que credenciais nao serao versionadas
        run: |
          set -euo pipefail
          if ! git diff --quiet -- .env storage/private/tokens.json; then
            echo "ERRO: tentativa de alterar arquivo de credenciais detectada."
            git diff --name-only -- .env storage/private/tokens.json
            exit 1
          fi

      - name: Fazer commit somente do catalogo espelhado
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          changes_catalog=$(git status --short api/catalog/fallback-products.json)

          if [[ -n "$changes_catalog" ]]; then
            git add api/catalog/fallback-products.json
            git commit -m "chore: espelhar e reparar catalogo Olist/Tiny"
            git push
          else
            echo "Sem alteracoes no catalogo."
          fi
