name: Sincronizar imagens Olist no site via Tiny V2 ao vivo

on:
  workflow_dispatch:
    inputs:
      mapping_csv_gzip_base64:
        description: CSV compactado com gzip+base64 contendo ao menos ID e SKU dos produtos para consulta ao vivo na Tiny V2
        required: true
        type: string
      dry_run:
        description: Executar sem vincular banco no servidor
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: olist-images-site-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Buscar na Tiny V2, subir e vincular imagens
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preparar CSV de entrada para Tiny V2 ao vivo
        env:
          MAPPING_CSV_GZIP_BASE64: ${{ inputs.mapping_csv_gzip_base64 }}
        shell: python
        run: |
          import base64, gzip, os
          from pathlib import Path
          Path("storage/reports").mkdir(parents=True, exist_ok=True)
          raw = base64.b64decode(os.environ["MAPPING_CSV_GZIP_BASE64"])
          csv_bytes = gzip.decompress(raw)
          Path("storage/reports/olist_imagens_urls_min.csv").write_bytes(csv_bytes)
          print("CSV de entrada preparado para consulta ao vivo na Tiny V2. Bytes:", len(csv_bytes))

      - name: Publicar endpoint de vinculo protegido
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        shell: python
        run: |
          import ftplib, os
          from pathlib import Path

          required = ["FTP_SERVER", "FTP_USERNAME", "FTP_PASSWORD"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit("Secrets FTP ausentes: " + ", ".join(missing))

          server = os.environ["FTP_SERVER"]
          user = os.environ["FTP_USERNAME"]
          password = os.environ["FTP_PASSWORD"]
          port = int(os.environ.get("FTP_PORT") or "21")
          base = (os.environ.get("FTP_REMOTE_DIR") or "/").strip() or "/"
          local = Path("api/agent/olist-image-linker.php")

          def cwd_mkdir(ftp, path):
              if path.startswith("/"):
                  ftp.cwd("/")
              for part in [p for p in path.replace("\\", "/").split("/") if p]:
                  try:
                      ftp.mkd(part)
                  except ftplib.error_perm:
                      pass
                  ftp.cwd(part)

          ftp = ftplib.FTP()
          ftp.connect(server, port, timeout=45)
          ftp.login(user, password)
          cwd_mkdir(ftp, base.rstrip("/") + "/api/agent")
          with local.open("rb") as fh:
              ftp.storbinary("STOR olist-image-linker.php", fh)
          ftp.quit()
          print("Endpoint publicado.")

      - name: Buscar imagens na Tiny V2 ao vivo e subir por FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
          TOKEN_API_OLIST: ${{ secrets.TOKEN_API_OLIST }}
          SITE_BASE_URL: https://dev.shopvivaliz.com.br
          OLIST_UPLOAD_MODE: ftp
          OLIST_DB_MODE: none
        run: |
          python3 scripts/sync-olist-images.py \
            --input storage/reports/olist_imagens_urls_min.csv \
            --api-version v2 \
            --quiet \
            --upload-mode ftp \
            --db-mode none

      - name: Vincular no banco pelo servidor
        env:
          SQUAD_TOKEN: ${{ secrets.SQUAD_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: python
        run: |
          import base64, gzip, json, os, urllib.request
          from pathlib import Path

          csv_bytes = Path("storage/reports/olist_imagens_site_mapeamento.csv").read_bytes()
          payload = {
              "csv_gzip_base64": base64.b64encode(gzip.compress(csv_bytes, compresslevel=9)).decode(),
              "dry_run": os.environ.get("DRY_RUN") == "true",
          }
          body = json.dumps(payload).encode()
          req = urllib.request.Request(
              "https://dev.shopvivaliz.com.br/api/agent/olist-image-linker.php",
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "X-Squad-Token": os.environ["SQUAD_TOKEN"],
                  "User-Agent": "ShopVivalizOlistImageSyncActionTinyV2/1.0",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=300) as response:
                  result = response.read()
          except urllib.error.HTTPError as exc:
              result = exc.read()
              Path("storage/reports/olist_image_link_result.json").write_bytes(result)
              raise
          Path("storage/reports/olist_image_link_result.json").write_bytes(result)
          print(result.decode("utf-8", errors="replace")[:2000])

      - name: Publicar artefatos de relatorio
        uses: actions/upload-artifact@v7
        with:
          name: olist-images-site-sync
          path: |
            storage/reports/olist_imagens_baixadas.csv
            storage/reports/olist_imagens_site_mapeamento.csv
            storage/reports/olist_imagens_site_mapeamento.json
            storage/reports/olist_image_link_result.json
