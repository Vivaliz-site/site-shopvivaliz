name: Auditar cobertura de imagens Olist

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: olist-image-coverage-audit
  cancel-in-progress: true

jobs:
  image-coverage:
    name: Validar cache detalhado canônico
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Consultar saúde de imagens
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/olist-image-health.json"
          curl --fail --silent --show-error --max-time 20 \
            https://shopvivaliz.com.br/api/catalog/image-health.php \
            --output "$report"
          python3 - "$report" <<'PY'
          import json
          import sys

          data = json.load(open(sys.argv[1], encoding="utf-8"))
          health = data.get("image_health", {})
          total = int(health.get("products_total", 0))
          valid = int(health.get("products_with_real_image", 0))
          coverage = (valid / total * 100) if total else 0
          print(f"Olist image coverage: {valid}/{total} ({coverage:.2f}%)")
          if total < 180 or coverage < 98:
              raise SystemExit("image coverage below the production threshold")
          PY

      - name: Resumo
        run: |
          echo "### Cobertura de imagens Olist" >> "$GITHUB_STEP_SUMMARY"
          echo "Cache detalhado canônico verificado; mínimo exigido: 98%." >> "$GITHUB_STEP_SUMMARY"
