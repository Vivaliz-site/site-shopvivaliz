name: Sincronizar configuracao estatica na VM Oracle

on:
  schedule:
    - cron: "5 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-env-sync
  cancel-in-progress: false

jobs:
  sync-secrets:
    name: Atualizar ambiente de forma atomica
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 5
    env:
      VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
      VM_USER: ${{ secrets.ORACLE_VM_USER }}
      VM_SSH_KEY: ${{ secrets.ORACLE_VM_SSH_KEY }}
      MELHORENVIO_ACCESS_TOKEN: ${{ secrets.MELHORENVIO_ACCESS_TOKEN }}
      MELHORENVIO_CLIENTE_ID: ${{ secrets.MELHORENVIO_CLIENTE_ID }}
      MELHORENVIO_CLIENTE_SECRET: ${{ secrets.MELHORENVIO_CLIENTE_SECRET }}
      MELHORENVIO_FROM_POSTAL_CODE: ${{ secrets.MELHORENVIO_FROM_POSTAL_CODE }}
      MERCADOPAGO_ACCESS_TOKEN: ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
      MERCADOPAGO_PUBLIC_KEY: ${{ secrets.MERCADOPAGO_PUBLIC_KEY }}
      MERCADOPAGO_WEBHOOK_SECRET: ${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
      ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
      ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
      ML_REDIRECT_URI: ${{ secrets.ML_REDIRECT_URI }}
      SHOPVIVALIZ_BASE_URL: ${{ secrets.SHOPVIVALIZ_BASE_URL }}
      APP_URL: ${{ secrets.APP_URL }}
      SITE_URL: ${{ secrets.SITE_URL }}
      BASE_URL: ${{ secrets.BASE_URL }}
      MELHORENVIO_REDIRECT_URI: ${{ secrets.MELHORENVIO_REDIRECT_URI }}
      OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID != '' && secrets.OLIST_CLIENT_ID || secrets.TINY_CLIENT_ID || secrets.CLIENT_ID_API_OLIST }}
      OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET != '' && secrets.OLIST_CLIENT_SECRET || secrets.TINY_CLIENT_SECRET || secrets.CLIENT_SECRET_OLIST }}
      OLIST_REDIRECT_URI: ${{ secrets.OLIST_REDIRECT_URI }}
      URL_REDIRCT_OLIST: ${{ secrets.URL_REDIRCT_OLIST }}
      URL_TINY_OLIST: ${{ secrets.URL_TINY_OLIST }}
      TINY_REDIRECT_URI: ${{ secrets.TINY_REDIRECT_URI }}
      SHOPEE_REDIRECT_URI: ${{ secrets.SHOPEE_REDIRECT_URI }}
      TIKTOK_REDIRECT_URL: ${{ secrets.TIKTOK_REDIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validar acesso configurado
        id: preflight
        shell: bash
        run: |
          if [[ -z "$VM_HOST" || -z "$VM_USER" || -z "$VM_SSH_KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Credenciais da VM ausentes; sincronizacao ignorada com seguranca."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Atualizar somente configuracao estatica
        if: steps.preflight.outputs.configured == 'true'
        shell: bash
        run: |
          install -d -m 700 ~/.ssh
          printf '%s' "$VM_SSH_KEY" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          jq -n '{
            MELHORENVIO_ACCESS_TOKEN: env.MELHORENVIO_ACCESS_TOKEN,
            MELHORENVIO_CLIENTE_ID: env.MELHORENVIO_CLIENTE_ID,
            MELHORENVIO_CLIENTE_SECRET: env.MELHORENVIO_CLIENTE_SECRET,
            MELHORENVIO_FROM_POSTAL_CODE: env.MELHORENVIO_FROM_POSTAL_CODE,
            MERCADOPAGO_ACCESS_TOKEN: env.MERCADOPAGO_ACCESS_TOKEN,
            MERCADOPAGO_PUBLIC_KEY: env.MERCADOPAGO_PUBLIC_KEY,
            MERCADOPAGO_WEBHOOK_SECRET: env.MERCADOPAGO_WEBHOOK_SECRET,
            ML_CLIENT_ID: env.ML_CLIENT_ID,
            ML_CLIENT_SECRET: env.ML_CLIENT_SECRET,
            ML_REDIRECT_URI: env.ML_REDIRECT_URI,
            SHOPVIVALIZ_BASE_URL: env.SHOPVIVALIZ_BASE_URL,
            APP_URL: env.APP_URL,
            SITE_URL: env.SITE_URL,
            BASE_URL: env.BASE_URL,
            MELHORENVIO_REDIRECT_URI: env.MELHORENVIO_REDIRECT_URI,
            OLIST_CLIENT_ID: env.OLIST_CLIENT_ID,
            OLIST_CLIENT_SECRET: env.OLIST_CLIENT_SECRET,
            OLIST_REDIRECT_URI: env.OLIST_REDIRECT_URI,
            URL_REDIRCT_OLIST: env.URL_REDIRCT_OLIST,
            URL_TINY_OLIST: env.URL_TINY_OLIST,
            TINY_REDIRECT_URI: env.TINY_REDIRECT_URI,
            SHOPEE_REDIRECT_URI: env.SHOPEE_REDIRECT_URI,
            TIKTOK_REDIRECT_URL: env.TIKTOK_REDIRECT_URL
          }' | ssh -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}" \
            'cd /home/ubuntu/site-shopvivaliz && python3 scripts/update-production-env.py && sudo chown "$(id -un)":www-data .env && sudo chmod 0640 .env'

      - name: Remover chave temporaria
        if: always()
        shell: bash
        run: rm -f ~/.ssh/vm_key
