name: Sincronizar secrets na VM Oracle (Ubuntu)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-secrets:
    name: Escrever .env de producao via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Conectar via SSH e atualizar .env
        env:
          VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
          VM_USER: ${{ secrets.ORACLE_VM_USER }}
          MELHORENVIO_ACCESS_TOKEN: ${{ secrets.MELHORENVIO_ACCESS_TOKEN }}
          MELHORENVIO_FROM_POSTAL_CODE: ${{ secrets.MELHORENVIO_FROM_POSTAL_CODE }}
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REDIRECT_URI: ${{ secrets.ML_REDIRECT_URI }}
          OLIST_ACCESS_TOKEN: ${{ secrets.OLIST_ACCESS_TOKEN }}
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          URL_REDIRCT_OLIST: ${{ secrets.URL_REDIRCT_OLIST }}
          URL_TINY_OLIST: ${{ secrets.URL_TINY_OLIST }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_VM_SSH_KEY }}" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Escreve cada linha so se a chave ainda nao existir no .env remoto
          # (nao sobrescreve DB_HOST/DB_USER/DB_PASS que ja estao corretos la).
          cat > /tmp/append-env.sh <<'REMOTE'
          set -e
          cd /home/ubuntu/site-shopvivaliz
          for pair in "$@"; do
            key="${pair%%=*}"
            if ! grep -q "^${key}=" .env 2>/dev/null; then
              echo "$pair" >> .env
              echo "adicionado: $key"
            else
              echo "ja existe, pulando: $key"
            fi
          done
          REMOTE

          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=no "${VM_USER}@${VM_HOST}" \
            "bash -s" -- \
            "MELHORENVIO_ACCESS_TOKEN=${MELHORENVIO_ACCESS_TOKEN}" \
            "MELHORENVIO_FROM_POSTAL_CODE=${MELHORENVIO_FROM_POSTAL_CODE}" \
            "ML_CLIENT_ID=${ML_CLIENT_ID}" \
            "ML_CLIENT_SECRET=${ML_CLIENT_SECRET}" \
            "ML_REDIRECT_URI=${ML_REDIRECT_URI}" \
            "OLIST_ACCESS_TOKEN=${OLIST_ACCESS_TOKEN}" \
            "OLIST_CLIENT_ID=${OLIST_CLIENT_ID}" \
            "OLIST_CLIENT_SECRET=${OLIST_CLIENT_SECRET}" \
            "OLIST_REFRESH_TOKEN=${OLIST_REFRESH_TOKEN}" \
            "URL_REDIRCT_OLIST=${URL_REDIRCT_OLIST}" \
            "URL_TINY_OLIST=${URL_TINY_OLIST}" \
            < /tmp/append-env.sh

          rm -f ~/.ssh/vm_key
