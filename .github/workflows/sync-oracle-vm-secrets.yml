name: Sincronizar configuracao estatica na VM Oracle

on:
  schedule:
    - cron: "5 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-env-sync
  cancel-in-progress: false

jobs:
  sync-secrets:
    name: Atualizar ambiente de forma atomica
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
      VM_USER: ${{ secrets.ORACLE_VM_USER }}
      VM_SSH_KEY: ${{ secrets.ORACLE_VM_SSH_KEY }}
      MELHORENVIO_ACCESS_TOKEN: ${{ secrets.MELHORENVIO_ACCESS_TOKEN }}
      MELHORENVIO_FROM_POSTAL_CODE: ${{ secrets.MELHORENVIO_FROM_POSTAL_CODE }}
      ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
      ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
      ML_REDIRECT_URI: ${{ secrets.ML_REDIRECT_URI }}
      OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID != '' && secrets.OLIST_CLIENT_ID || secrets.TINY_CLIENT_ID || secrets.CLIENT_ID_API_OLIST }}
      OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET != '' && secrets.OLIST_CLIENT_SECRET || secrets.TINY_CLIENT_SECRET || secrets.CLIENT_SECRET_OLIST }}
      URL_REDIRCT_OLIST: ${{ secrets.URL_REDIRCT_OLIST }}
      URL_TINY_OLIST: ${{ secrets.URL_TINY_OLIST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validar acesso configurado
        id: preflight
        shell: bash
        run: |
          if [[ -z "$VM_HOST" || -z "$VM_USER" || -z "$VM_SSH_KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Credenciais da VM ausentes; sincronizacao ignorada com seguranca."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Atualizar somente configuracao estatica
        if: steps.preflight.outputs.configured == 'true'
        shell: bash
        run: |
          install -d -m 700 ~/.ssh
          printf '%s' "$VM_SSH_KEY" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          jq -n '{
            MELHORENVIO_ACCESS_TOKEN: env.MELHORENVIO_ACCESS_TOKEN,
            MELHORENVIO_FROM_POSTAL_CODE: env.MELHORENVIO_FROM_POSTAL_CODE,
            ML_CLIENT_ID: env.ML_CLIENT_ID,
            ML_CLIENT_SECRET: env.ML_CLIENT_SECRET,
            ML_REDIRECT_URI: env.ML_REDIRECT_URI,
            OLIST_CLIENT_ID: env.OLIST_CLIENT_ID,
            OLIST_CLIENT_SECRET: env.OLIST_CLIENT_SECRET,
            URL_REDIRCT_OLIST: env.URL_REDIRCT_OLIST,
            URL_TINY_OLIST: env.URL_TINY_OLIST
          }' | ssh -i ~/.ssh/vm_key "${VM_USER}@${VM_HOST}" \
            'cd /home/ubuntu/site-shopvivaliz && python3 scripts/update-production-env.py'

      - name: Remover chave temporaria
        if: always()
        shell: bash
        run: rm -f ~/.ssh/vm_key
