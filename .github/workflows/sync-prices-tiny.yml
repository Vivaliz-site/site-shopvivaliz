name: Sincronizar Precos - Tiny API

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sincronizar precos do Tiny API v2
        env:
          TOKEN_API_OLIST: ${{ secrets.TOKEN_API_OLIST }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, urllib.request, urllib.error

          TOKEN = os.getenv("TOKEN_API_OLIST", "")
          FALLBACK_PATH = "api/catalog/fallback-products.json"

          if not TOKEN:
              print("ERROR: TOKEN_API_OLIST not set")
              exit(1)

          def tiny_v2_get(page):
              url = f"https://api.tiny.com.br/api/v2/produtos.json?token={TOKEN}&formato=json&pagina={page}&limite=100"
              req = urllib.request.Request(url, headers={"User-Agent": "ShopVivaliz/1.0"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read().decode())
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code} on page {page}")
                  if e.code == 401:
                      print("Token invalido ou expirado")
                      exit(1)
                  return {}
              except Exception as e:
                  print(f"Error on page {page}: {e}")
                  return {}

          with open(FALLBACK_PATH) as f:
              products = json.load(f)

          price_map = {}
          page = 1

          print("Buscando precos do Tiny API v2...")
          while True:
              resp = tiny_v2_get(page)
              retorno = resp.get("retorno", {})
              if retorno.get("status") == "Erro":
                  print(f"API erro: {retorno.get('erros')}")
                  break
              items = retorno.get("produtos", [])
              if not items:
                  break
              for wrapper in items:
                  item = wrapper.get("produto", wrapper)
                  pid = str(item.get("id", ""))
                  sku = str(item.get("codigo", ""))
                  try:
                      price = float(str(item.get("preco", 0) or 0).replace(",", "."))
                  except:
                      price = 0.0
                  if pid:
                      price_map[pid] = price
                  if sku:
                      price_map[f"sku:{sku}"] = price
              print(f"  pagina {page}: {len(items)} produtos")
              if len(items) < 100:
                  break
              page += 1
              time.sleep(0.4)

          print(f"Mapa de precos: {len(price_map)} entradas")
          updated = 0
          for p in products:
              pid = str(p.get("olist_product_id") or p.get("id") or "")
              sku = str(p.get("sku") or "")
              price = price_map.get(pid) or price_map.get(f"sku:{sku}")
              if price and price > 0:
                  p["price"] = price
                  updated += 1

          print(f"Atualizados: {updated}/{len(products)}")
          with open(FALLBACK_PATH, "w") as f:
              json.dump(products, f, ensure_ascii=False)
          PYEOF

      - name: Commit precos atualizados
        run: |
          git config user.name "Claude Autonomo"
          git config user.email "fredmourao@gmail.com"
          git add api/catalog/fallback-products.json
          if git diff --cached --quiet; then
            echo "Sem alteracoes de preco"
          else
            git commit -m "chore: atualiza precos via Tiny API v2 [skip ci]"
            git push
          fi
