name: Sincronizar Preços - Tiny API

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"  # Diariamente às 6h UTC

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sincronizar preços do Tiny API v3
        env:
          OLIST_ACCESS_TOKEN: ${{ secrets.OLIST_ACCESS_TOKEN }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, urllib.request, urllib.error

          ACCESS_TOKEN  = os.getenv("OLIST_ACCESS_TOKEN", "")
          REFRESH_TOKEN = os.getenv("OLIST_REFRESH_TOKEN", "")
          CLIENT_ID     = os.getenv("OLIST_CLIENT_ID", "")
          CLIENT_SECRET = os.getenv("OLIST_CLIENT_SECRET", "")
          FALLBACK_PATH = "api/catalog/fallback-products.json"

          def tiny_get(path, token, retries=3):
              url = f"https://api.tiny.com.br{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/json",
                  "User-Agent": "ShopVivaliz/1.0",
              })
              for attempt in range(retries):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read().decode())
                  except urllib.error.HTTPError as e:
                      if e.code == 401 and attempt == 0:
                          token = refresh_access_token()
                          if not token:
                              raise
                          req.add_header("Authorization", f"Bearer {token}")
                      elif e.code == 429:
                          time.sleep(5 * (attempt + 1))
                      else:
                          raise
              return {}

          def refresh_access_token():
              if not all([REFRESH_TOKEN, CLIENT_ID, CLIENT_SECRET]):
                  return None
              data = json.dumps({
                  "grant_type": "refresh_token",
                  "refresh_token": REFRESH_TOKEN,
                  "client_id": CLIENT_ID,
                  "client_secret": CLIENT_SECRET,
              }).encode()
              req = urllib.request.Request(
                  "https://accounts.tiny.com.br/realms/tiny/protocol/openid-connect/token",
                  data=data, headers={"Content-Type": "application/json"}
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      resp = json.loads(r.read().decode())
                      return resp.get("access_token", "")
              except Exception as e:
                  print(f"refresh failed: {e}")
                  return None

          if not ACCESS_TOKEN:
              print("ERROR: OLIST_ACCESS_TOKEN not set")
              exit(1)

          # Load existing fallback
          with open(FALLBACK_PATH) as f:
              products = json.load(f)

          price_map = {}  # olist_product_id -> price
          updated = 0
          page = 1

          print(f"Fetching prices from Tiny API... ({len(products)} products to update)")

          while True:
              resp = tiny_get(f"/public-api/v3/produtos?pagina={page}&limite=100", ACCESS_TOKEN)
              items = resp.get("data", {}).get("itens", [])
              if not items:
                  break
              for item in items:
                  pid = str(item.get("id", ""))
                  sku = str(item.get("codigo", ""))
                  price = float(item.get("preco", 0) or 0)
                  if pid:
                      price_map[pid] = price
                  if sku:
                      price_map[f"sku:{sku}"] = price
              print(f"  page {page}: {len(items)} products fetched")
              if len(items) < 100:
                  break
              page += 1
              time.sleep(0.5)

          for p in products:
              pid = str(p.get("olist_product_id") or p.get("id") or "")
              sku = str(p.get("sku") or "")
              price = price_map.get(pid) or price_map.get(f"sku:{sku}")
              if price is not None and price > 0:
                  p["price"] = price
                  updated += 1

          print(f"Updated prices for {updated}/{len(products)} products")

          with open(FALLBACK_PATH, "w") as f:
              json.dump(products, f, ensure_ascii=False, indent=None)

          print("Done.")
          PYEOF

      - name: Commit preços atualizados
        run: |
          git config user.name "Claude Autonomo"
          git config user.email "fredmourao@gmail.com"
          git add api/catalog/fallback-products.json
          if git diff --cached --quiet; then
            echo "Nenhum preço alterado — nada a commitar"
          else
            git commit -m "chore: atualiza precos via Tiny API [skip ci]"
            git push
          fi
