name: Sincronizar Produtos ERP (a cada 2h)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Carregar credenciais
        run: |
          {
            echo "OLIST_ACCESS_TOKEN=${OLIST_ACCESS_TOKEN:-${TINY_ACCESS_TOKEN:-${TOKEN_API_OLIST:-}}}"
            echo "TINY_ACCESS_TOKEN=${TINY_ACCESS_TOKEN:-}"
          } > .env
        env:
          OLIST_ACCESS_TOKEN: ${{ secrets.OLIST_ACCESS_TOKEN }}
          TINY_ACCESS_TOKEN: ${{ secrets.TINY_ACCESS_TOKEN }}
          TOKEN_API_OLIST: ${{ secrets.TOKEN_API_OLIST }}
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          TINY_CLIENT_ID: ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TINY_REFRESH_TOKEN: ${{ secrets.TINY_REFRESH_TOKEN }}

      - name: Sincronizar produtos
        run: |
          python sync-products-to-json.py
        env:
          OLIST_ACCESS_TOKEN: ${{ secrets.OLIST_ACCESS_TOKEN }}
          TINY_ACCESS_TOKEN: ${{ secrets.TINY_ACCESS_TOKEN }}
          TOKEN_API_OLIST: ${{ secrets.TOKEN_API_OLIST }}
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}
          TINY_CLIENT_ID: ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TINY_REFRESH_TOKEN: ${{ secrets.TINY_REFRESH_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.email "auto@shopvivaliz.com"
          git config user.name "Auto Sync"
          git add storage/products-cache.json
          git commit -m "auto: sincronizar produtos do ERP" || true
          git push origin main || true
