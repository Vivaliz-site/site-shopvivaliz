name: Sincronizar estoque real da Tiny

# O webhook em api/tiny/stock-webhook.php ja atualiza o estoque em
# tempo real a cada mudanca na Tiny. Este workflow roda 1x/dia so
# como rede de seguranca (webhook perdido, produto novo sem SKU
# mapeado ainda, etc.), nao como mecanismo primario.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  sync-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rodar sincronizacao de estoque
        run: python3 scripts/sync-stock-tiny.py
        env:
          TINY_ACCESS_TOKEN: ${{ secrets.TINY_ACCESS_TOKEN }}
          TINY_API_TOKEN: ${{ secrets.TINY_API_TOKEN }}
          TINY_CLIENT_ID: ${{ secrets.TINY_CLIENT_ID }}
          TINY_CLIENT_SECRET: ${{ secrets.TINY_CLIENT_SECRET }}
          TINY_REFRESH_TOKEN: ${{ secrets.TINY_REFRESH_TOKEN }}
          OLIST_ACCESS_TOKEN: ${{ secrets.OLIST_ACCESS_TOKEN }}
          OLIST_CLIENT_ID: ${{ secrets.OLIST_CLIENT_ID }}
          OLIST_CLIENT_SECRET: ${{ secrets.OLIST_CLIENT_SECRET }}
          OLIST_REFRESH_TOKEN: ${{ secrets.OLIST_REFRESH_TOKEN }}

      - name: Commit do catalogo atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/catalog/fallback-products.json
          git diff --cached --quiet && echo "Sem alteracoes de estoque." || \
            git commit -m "chore: sincronizar estoque real da Tiny $(date +%Y-%m-%d\ %H:%M)" && git push
