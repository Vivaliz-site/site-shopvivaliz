name: Trio 24/7 Guarantee - Runtime Validation

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  SHOPVIVALIZ_BASE_URL: https://dev.shopvivaliz.com.br

jobs:
  validate-runtime:
    name: Validar cobertura real 24/7
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Coletar relatorio autonomo
        shell: bash
        run: |
          mkdir -p reports
          curl -sS -L \
            --max-time 45 \
            --retry 2 \
            --retry-delay 5 \
            --retry-all-errors \
            -H "Accept: application/json" \
            -o reports/autonomous-report.json \
            "${SHOPVIVALIZ_BASE_URL%/}/api/agent/autonomous-report.php"
          cat reports/autonomous-report.json

      - name: Validar saude do runtime
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("reports/autonomous-report.json").read_text(encoding="utf-8"))
          cycle = payload.get("autonomous_cycle", {})
          health = payload.get("system_health", {})

          if payload.get("agent") != "autonomous-report":
              raise SystemExit("relatorio autonomo invalido")
          if not cycle.get("available"):
              raise SystemExit("ciclo autonomo indisponivel")
          if cycle.get("file_age_s") is None or int(cycle["file_age_s"]) > 3600:
              raise SystemExit(f"ciclo autonomo stale: {cycle.get('file_age_s')}")
          if health.get("status") not in {"HEALTHY", "WARNING"}:
              raise SystemExit(f"saude critica: {health.get('status')}")

          print("24/7 real OK")
          print("cycle_status=", cycle.get("status"))
          print("cycle_mode=", cycle.get("mode"))
          print("cycle_age_s=", cycle.get("file_age_s"))
          print("health=", health.get("status"))
          PY

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trio-24-7-runtime-${{ github.run_id }}
          path: reports/autonomous-report.json
          if-no-files-found: ignore
