name: V12 - Execução Automática Global

on:
  workflow_dispatch:

jobs:
  v12-global-execution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Executar Pipeline V12 Global
        run: |
          echo "=== V12 EXECUCAO GLOBAL INICIADA ==="
          curl -X POST https://dev.shopvivaliz.com.br/api/pipeline/v12-execucao-global.php \
            -H "Content-Type: application/json" \
            -d '{"modo":"global","timestamp":"'$(date -Iseconds)'"}'
          echo ""
          echo "=== V12 CONCLUIDO ==="

      - name: Verificar Resultados
        run: |
          echo "Verificando logs..."
          curl https://dev.shopvivaliz.com.br/logs/v12-execucao.log || echo "Logs nao disponivel ainda"

      - name: Commit e Push
        run: |
          git config --local user.email "v12@automated.local"
          git config --local user.name "V12 Automation"
          git add logs/v12-*.json logs/v12-*.log || true
          git commit -m "chore: v12 execucao global [$(date +'%Y-%m-%d %H:%M')]" || true
          git push || true
