name: Shopee Sync - Diário

on:
  schedule:
    # Executar diariamente às 06:00 UTC (03:00 BRT)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-shopee:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Executar Pipeline Shopee
        run: |
          python3 - << 'PYTHON'
          import json
          import csv
          from datetime import datetime
          
          print("[SHOPEE SYNC] Iniciando sincronizacao diaria...")
          
          # Carregar dados
          with open('logs/olist-products-cache.json', 'r') as f:
              data = json.load(f)
          
          products = data['produtos']
          print(f"[{datetime.now()}] Processando {len(products)} produtos...")
          
          # Gerar CSV
          headers = [
              'et_title_product_id', 'et_title_parent_sku', 'et_title_product_name',
              'et_title_product_category', 'ps_item_cover_image',
              'ps_item_image.1', 'ps_item_image.2', 'ps_item_image.3', 'ps_item_image.4',
              'ps_item_image.5', 'ps_item_image.6', 'ps_item_image.7', 'ps_item_image.8',
              'ps_new_size_chart', 'et_title_size_chart', 'et_title_variation_1',
              'et_title_option_1_for_variation_1', 'et_title_option_image_1_for_variation_1',
              'et_title_option_2_for_variation_1', 'et_title_option_image_2_for_variation_1',
              'et_title_option_3_for_variation_1', 'et_title_option_image_3_for_variation_1',
              'et_title_option_4_for_variation_1', 'et_title_option_image_4_for_variation_1',
              'et_title_reason'
          ]
          
          with open('logs/shopee-import-imagens.csv', 'w', newline='', encoding='utf-8-sig') as f:
              writer = csv.DictWriter(f, fieldnames=headers, delimiter=';')
              writer.writeheader()
              
              for product in products:
                  img_url = product.get('primary_image_url', '')
                  img_count = product.get('imagens_count', 1)
                  
                  row = {
                      'et_title_product_id': product.get('id', ''),
                      'et_title_parent_sku': product.get('sku', ''),
                      'et_title_product_name': product.get('nome', ''),
                      'et_title_product_category': product.get('categoria', ''),
                      'ps_item_cover_image': img_url,
                      'ps_item_image.1': img_url if img_count >= 1 else '',
                      'ps_item_image.2': img_url if img_count >= 2 else '',
                      'ps_item_image.3': img_url if img_count >= 3 else '',
                      'ps_item_image.4': img_url if img_count >= 4 else '',
                      'ps_item_image.5': img_url if img_count >= 5 else '',
                      'ps_item_image.6': img_url if img_count >= 6 else '',
                      'ps_item_image.7': img_url if img_count >= 7 else '',
                      'ps_item_image.8': img_url if img_count >= 8 else '',
                      'ps_new_size_chart': '',
                      'et_title_size_chart': '',
                      'et_title_variation_1': '',
                      'et_title_option_1_for_variation_1': '',
                      'et_title_option_image_1_for_variation_1': '',
                      'et_title_option_2_for_variation_1': '',
                      'et_title_option_image_2_for_variation_1': '',
                      'et_title_option_3_for_variation_1': '',
                      'et_title_option_image_3_for_variation_1': '',
                      'et_title_option_4_for_variation_1': '',
                      'et_title_option_image_4_for_variation_1': '',
                      'et_title_reason': ''
                  }
                  writer.writerow(row)
          
          print(f"[{datetime.now()}] CSV gerado com sucesso!")
          print(f"[{datetime.now()}] Total: {len(products)} produtos sincronizados")
          PYTHON
      
      - name: Commit e Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/shopee-import-imagens.csv
          git commit -m "chore: atualizar sincronizacao Shopee [$(date +'%Y-%m-%d')]" || true
          git push
