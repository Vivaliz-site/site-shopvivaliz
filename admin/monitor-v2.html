<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor v2 - Agentes Reais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #2ECC71 0%, #1F3A70 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        header h1 {
            margin-bottom: 5px;
        }

        .chat-box {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            background: #e8f4f8;
            justify-content: flex-end;
        }

        .message.agent {
            background: #f0f8e8;
        }

        .message.system {
            background: #f5f5f5;
            color: #888;
            font-size: 0.9em;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .avatar.user {
            background: #2ECC71;
        }

        .avatar.claude {
            background: #667eea;
        }

        .avatar.gemini {
            background: #ff9500;
        }

        .avatar.gpt {
            background: #10a37f;
        }

        .avatar.system {
            background: #999;
        }

        .msg-content {
            flex: 1;
        }

        .msg-header {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 4px;
        }

        .msg-text {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            resize: none;
            height: 60px;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #2ECC71 0%, #1F3A70 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #888;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #2ECC71;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Monitor de Agentes v2</h1>
            <p>Chat com agentes + Fila de Tarefas Autônomas</p>
        </header>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <!-- TAREFAS PENDENTES -->
            <div style="background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                <h3 style="margin-bottom: 10px; color: #ff6b6b;">📋 Tarefas Pendentes</h3>
                <div id="tasksPending" style="font-size: 0.9em; line-height: 1.6;">
                    <div style="color: #888;">Carregando tarefas...</div>
                </div>
            </div>

            <!-- TAREFAS PROCESSADAS -->
            <div style="background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                <h3 style="margin-bottom: 10px; color: #51cf66;">✅ Tarefas Processadas</h3>
                <div id="tasksProcessed" style="font-size: 0.9em; line-height: 1.6;">
                    <div style="color: #888;">Carregando tarefas...</div>
                </div>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message system">
                <div class="avatar system">S</div>
                <div class="msg-content">
                    <div class="msg-header">Sistema</div>
                    <div class="msg-text">Conectado ao endpoint /api/agent/squad-chat.php - Agentes reais respondendo</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="Digite sua mensagem para os agentes..."></textarea>
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>

        <div class="status">
            <div id="statusText">Pronto</div>
            <div class="loading" id="loadingText">Agentes respondendo...</div>
        </div>
    </div>

    <script>
        const API = 'https://shopvivaliz.com.br/admin/squad-chat.php';
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusText = document.getElementById('statusText');
        const loadingText = document.getElementById('loadingText');

        function addMessage(agent, text, isUser = false) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'agent'}`;

            const avatarClass = isUser ? 'user' : agent;
            const agentName = isUser ? 'Você' : agent.charAt(0).toUpperCase() + agent.slice(1);

            msg.innerHTML = `
                <div class="avatar ${avatarClass}">${isUser ? 'VC' : agent.substring(0,2).toUpperCase()}</div>
                <div class="msg-content">
                    <div class="msg-header">${agentName}</div>
                    <div class="msg-text">${text}</div>
                </div>
            `;

            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Mostrar mensagem do usuário
            addMessage('user', text, true);
            userInput.value = '';

            // Desabilitar botão
            sendBtn.disabled = true;
            loadingText.style.display = 'block';
            statusText.textContent = 'Enviando...';

            try {
                const response = await fetch(API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: text
                    })
                });

                const data = await response.json();

                if (data.response) {
                    addMessage('claude', data.response);
                    statusText.textContent = 'Resposta recebida';
                } else if (data.error) {
                    addMessage('system', `Erro: ${data.error}`);
                    statusText.textContent = `Erro: ${data.error}`;
                } else {
                    addMessage('system', JSON.stringify(data, null, 2));
                    statusText.textContent = 'Resposta processada';
                }
            } catch (error) {
                addMessage('system', `Erro de conexão: ${error.message}`);
                statusText.textContent = 'Erro de conexão';
            } finally {
                sendBtn.disabled = false;
                loadingText.style.display = 'none';
            }
        }

        // Enviar com Enter
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
