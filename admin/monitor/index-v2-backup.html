<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trio IA Monitor - ShopVivaliz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--dark);
            min-height: 100vh;
            padding: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
            height: 100vh;
            grid-template-rows: auto 1fr;
            grid-template-areas: "header header header" "sidebar main chat";
        }

        header {
            grid-area: header;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: #dcfce7;
            border-radius: 20px;
            color: var(--success);
            font-weight: 600;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* SIDEBAR DE CHATS */
        .chat-sidebar {
            grid-area: sidebar;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--dark);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-new-chat {
            width: calc(100% - 20px);
            margin: 10px;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: opacity 0.3s;
        }

        .btn-new-chat:hover {
            opacity: 0.9;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px;
            margin: 5px 0;
            background: var(--light);
            border-radius: 8px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .chat-item:hover {
            background: #e5e7eb;
        }

        .chat-item.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-left-color: white;
        }

        .chat-item-title {
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-item-meta {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* AREA PRINCIPAL */
        .main-area {
            grid-area: main;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, white 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.85em;
        }

        /* AREA DE CHAT */
        .chat-area {
            grid-area: chat;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.agent {
            background: #f3f4f6;
            color: var(--dark);
            align-self: flex-start;
            max-width: 85%;
        }

        .message.user {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            align-self: flex-end;
            max-width: 85%;
        }

        .message.system {
            background: #fef3c7;
            color: #92400e;
            align-self: center;
            text-align: center;
            font-size: 0.85em;
        }

        .timestamp {
            font-size: 0.75em;
            opacity: 0.7;
            margin-top: 5px;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.9em;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-send {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-send:hover {
            transform: scale(1.05);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="header-title">
                <h1>Trio IA Monitor</h1>
                <p>v9.2.85 - ShopVivaliz</p>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span>
                Agentes Online
            </div>
        </header>

        <!-- SIDEBAR COM HISTORICO DE CHATS -->
        <div class="chat-sidebar">
            <div class="sidebar-header">Historico de Chats</div>
            <button class="btn-new-chat" onclick="createNewChat()">+ Nova Conversa</button>
            <div class="chats-list" id="chats-list">
                <div class="chat-item active" onclick="startNewChat()">
                    <div class="chat-item-title">Chat Atual</div>
                    <div class="chat-item-meta">Nova conversa</div>
                </div>
            </div>
        </div>

        <!-- AREA PRINCIPAL -->
        <div class="main-area">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="tasks-total">41</div>
                    <div class="stat-label">Total de Tarefas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="tasks-completed">17</div>
                    <div class="stat-label">Completadas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="tasks-pending">24</div>
                    <div class="stat-label">Pendentes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="uptime">41%</div>
                    <div class="stat-label">Progresso</div>
                </div>
            </div>
        </div>

        <!-- AREA DE CHAT -->
        <div class="chat-area">
            <div class="chat-header">Conversando com Agentes</div>
            <div class="chat-messages" id="chat-messages">
                <div class="message system">
                    Bem-vindo ao chat com Agentes IA (Gemini, Claude, ChatGPT)
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn-send" onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/monitor';
        let currentChatId = null;

        // Carregar lista de chats ao iniciar
        document.addEventListener('DOMContentLoaded', loadChats);

        // Carregar e exibir chats
        async function loadChats() {
            try {
                const response = await fetch(`${API_BASE}/chat-history.php?action=list`);
                const data = await response.json();

                if (data.chats && data.chats.length > 0) {
                    const chatsList = document.getElementById('chats-list');
                    chatsList.innerHTML = '';

                    data.chats.forEach(chat => {
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        div.onclick = () => loadChat(chat.id);
                        div.innerHTML = `
                            <div class="chat-item-title">${chat.title}</div>
                            <div class="chat-item-meta">${chat.messages_count} mensagens</div>
                        `;
                        chatsList.appendChild(div);
                    });
                }
            } catch (error) {
                console.error('Erro ao carregar chats:', error);
            }
        }

        // Criar novo chat
        async function createNewChat() {
            const title = prompt('Nome da conversa:');
            if (!title) return;

            try {
                const response = await fetch(`${API_BASE}/chat-history.php?action=create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });

                const data = await response.json();
                if (data.success) {
                    currentChatId = data.chat_id;
                    document.getElementById('chat-messages').innerHTML =
                        '<div class="message system">Novo chat criado. Comece a conversar!</div>';
                    loadChats();
                }
            } catch (error) {
                console.error('Erro ao criar chat:', error);
            }
        }

        // Iniciar novo chat temporário
        function startNewChat() {
            currentChatId = null;
            document.getElementById('chat-messages').innerHTML =
                '<div class="message system">Bem-vindo ao chat com Agentes IA (Gemini, Claude, ChatGPT)</div>';
        }

        // Carregar chat anterior
        async function loadChat(chatId) {
            try {
                const response = await fetch(`${API_BASE}/chat-history.php?action=load&chat_id=${chatId}`);
                const data = await response.json();

                if (data.chat) {
                    currentChatId = chatId;
                    const messagesContainer = document.getElementById('chat-messages');
                    messagesContainer.innerHTML = '';

                    data.chat.messages.forEach(msg => {
                        addChatMessage(msg.content, msg.role);
                    });

                    // Marcar como ativo
                    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                    event.target.closest('.chat-item')?.classList.add('active');
                }
            } catch (error) {
                console.error('Erro ao carregar chat:', error);
            }
        }

        // Enviar mensagem
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message) return;

            // Se nao tem chat ativo, criar um
            if (!currentChatId) {
                const title = `Conversa ${new Date().toLocaleTimeString('pt-BR')}`;
                const response = await fetch(`${API_BASE}/chat-history.php?action=create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                const data = await response.json();
                currentChatId = data.chat_id;
            }

            // Adicionar mensagem do usuario
            addChatMessage(message, 'user');
            input.value = '';

            try {
                // Registrar mensagem no webhook
                await fetch('/api/monitor/chat-webhook.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                // Salvar no historico
                if (currentChatId) {
                    await fetch(`${API_BASE}/chat-history.php?action=add-message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: currentChatId,
                            message,
                            role: 'user'
                        })
                    });
                }

                addChatMessage('Agentes respondendo em 2 minutos...', 'system');
            } catch (error) {
                console.error('Erro ao enviar:', error);
                addChatMessage('Erro ao processar mensagem.', 'agent');
            }
        }

        // Adicionar mensagem ao chat
        function addChatMessage(text, type) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `
                ${text}
                <div class="timestamp">${new Date().toLocaleTimeString('pt-BR')}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
