name: V12 Execução Automática

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite execução manual através da interface do GitHub

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    # Definir permissões para o GITHUB_TOKEN padrão do GitHub Actions.
    # Ajuste conforme as necessidades do seu workflow.
    permissions:
      contents: read # Necessário para fazer checkout do repositório
      # Se o workflow precisar criar/gerenciar webhooks (como o setup-auto-deploy.ps1 pode fazer),
      # adicione a permissão 'administration: write'.
      # administration: write
      # Se o workflow precisar interagir com issues, pull requests, etc., adicione as permissões correspondentes.

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Use a versão do PHP que seu projeto requer (ex: '7.4', '8.0', '8.1', '8.2', '8.3')
        extensions: curl, json # Adicione extensões PHP necessárias para seus scripts
        ini-values: post_max_size=256M, upload_max_filesize=256M # Exemplo de configurações ini

    - name: Install GitHub CLI (if needed)
      # Adicione este passo se algum script ou comando no seu workflow usar o `gh CLI`.
      # Ele verifica se o gh CLI já está instalado e o instala se não estiver.
      run: |
        if ! type -p gh >/dev/null; then
          echo "Instalando GitHub CLI..."
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y
        else
          echo "GitHub CLI já está instalado."
        fi

    - name: Run Pagarme Diagnostic
      # Este passo executa o script de diagnóstico do Pagarme e passa os segredos necessários como variáveis de ambiente.
      run: php api/pagarme/diagnostic.bkp
      env:
        PAGARME_SECRET_KEY: ${{ secrets.PAGARME_SECRET_KEY }}
        PAGARME_PUBLIC_KEY: ${{ secrets.PAGARME_PUBLIC_KEY }}

    - name: Execute V12 Global Pipeline
      # Este passo executa o endpoint principal do pipeline V12 conforme descrito no V12-STATUS-FINAL.txt.
      run: curl https://dev.shopvivaliz.com.br/api/pipeline/v12-execucao-global.php