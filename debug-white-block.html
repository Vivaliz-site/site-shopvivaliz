<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug: White Block Detector</title>
    <style>
        body { font-family: monospace; background: #f5f5f5; padding: 20px; }
        .debug-panel { background: white; border: 3px solid red; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .debug-item { background: #fff9e6; border-left: 4px solid #ff9800; padding: 12px; margin: 10px 0; }
        .debug-element { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px; margin: 5px 0; font-size: 12px; }
        code { background: #f0f0f0; padding: 4px 8px; border-radius: 4px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 14px; }
        .highlight { background: yellow; padding: 2px; }
    </style>
</head>
<body>
    <div class="debug-panel">
        <h1>🔍 White Block Debug Tool</h1>
        <p>Click buttons below to identify white overlays on homepage</p>

        <button onclick="findWhiteElements()">🎨 Find All White Elements</button>
        <button onclick="findFixedElements()">📌 Find Fixed/Absolute Elements</button>
        <button onclick="findOpaqueElements()">👁️ Find Opaque Elements Blocking Content</button>
        <button onclick="highlightCategories()">📂 Highlight Categories Section</button>
        <button onclick="highlightProducts()">🛍️ Highlight Products Section</button>
        <button onclick="inspectOverlaps()">🔗 Check for Overlapping Elements</button>

        <div id="results" style="margin-top: 20px;"></div>
    </div>

    <script>
        const resultsDiv = document.getElementById('results');

        function clearResults() {
            resultsDiv.innerHTML = '';
        }

        function addResult(title, items) {
            const section = document.createElement('div');
            section.className = 'debug-item';
            section.innerHTML = `<strong>${title}</strong>`;
            if (items.length === 0) {
                section.innerHTML += '<br><code style="color: green;">✅ Nada encontrado</code>';
            } else {
                items.forEach(item => {
                    const elem = document.createElement('div');
                    elem.className = 'debug-element';
                    elem.innerHTML = item;
                    section.appendChild(elem);
                });
            }
            resultsDiv.appendChild(section);
        }

        function findWhiteElements() {
            clearResults();
            const elements = document.querySelectorAll('*');
            const whiteElements = [];

            elements.forEach(el => {
                const style = window.getComputedStyle(el);
                const bgColor = style.backgroundColor;
                const opacity = parseFloat(style.opacity);

                // Check if white or near-white
                if ((bgColor === 'rgb(255, 255, 255)' ||
                     bgColor === 'rgba(255, 255, 255, 1)' ||
                     bgColor.includes('255') && bgColor.includes('255') && bgColor.includes('255')) &&
                    opacity >= 0.8) {

                    const position = style.position;
                    const zIndex = style.zIndex || 'auto';
                    const dims = `${Math.round(el.offsetWidth)}×${Math.round(el.offsetHeight)}`;

                    whiteElements.push(
                        `<code>${el.tagName}</code> class=<code>${el.className}</code> ` +
                        `pos=<code>${position}</code> z=<code>${zIndex}</code> ` +
                        `dim=<code>${dims}</code>`
                    );
                }
            });

            addResult(`🎨 White Elements Found: ${whiteElements.length}`, whiteElements);
        }

        function findFixedElements() {
            clearResults();
            const elements = document.querySelectorAll('*');
            const fixedElements = [];

            elements.forEach(el => {
                const style = window.getComputedStyle(el);
                if (style.position === 'fixed' || style.position === 'sticky') {
                    const display = style.display;
                    if (display !== 'none') {
                        fixedElements.push(
                            `<code>${el.tagName}</code> class=<code>${el.className}</code> ` +
                            `pos=<code>${style.position}</code> z=<code>${style.zIndex || 'auto'}</code>`
                        );
                    }
                }
            });

            addResult(`📌 Fixed/Sticky Elements: ${fixedElements.length}`, fixedElements);
        }

        function findOpaqueElements() {
            clearResults();
            const categories = document.querySelector('.home-categories');
            if (!categories) {
                addResult('❌ Seção .home-categories não encontrada', []);
                return;
            }

            const elements = document.querySelectorAll('*');
            const opaqueElements = [];

            elements.forEach(el => {
                // Check if element might be covering categories
                const rect = el.getBoundingClientRect();
                const catRect = categories.getBoundingClientRect();

                if (rect.top < catRect.bottom && rect.bottom > catRect.top &&
                    rect.left < catRect.right && rect.right > catRect.left) {

                    const style = window.getComputedStyle(el);
                    if (style.opacity >= 0.3 &&
                        (style.position === 'fixed' || style.position === 'absolute' ||
                         style.zIndex > 0)) {

                        opaqueElements.push(
                            `<code>${el.tagName}</code> class=<code>${el.className}</code> ` +
                            `opacity=<code>${style.opacity}</code> z=<code>${style.zIndex}</code> ` +
                            `OVERLAPS categories`
                        );
                    }
                }
            });

            addResult(`🔗 Elements Overlapping Categories: ${opaqueElements.length}`, opaqueElements);
        }

        function highlightCategories() {
            clearResults();
            const cat = document.querySelector('.home-categories');
            if (!cat) {
                resultsDiv.innerHTML = '<div class="debug-item"><strong>❌ Not Found:</strong> .home-categories</div>';
                return;
            }

            cat.style.outline = '5px solid lime';
            cat.style.outlineOffset = '10px';

            const rect = cat.getBoundingClientRect();
            addResult('📂 Categories Section Info', [
                `Position: <code>top=${Math.round(rect.top)}, left=${Math.round(rect.left)}</code>`,
                `Size: <code>${Math.round(rect.width)}×${Math.round(rect.height)}</code>`,
                `Display: <code>${window.getComputedStyle(cat).display}</code>`,
                `Visibility: <code>${window.getComputedStyle(cat).visibility}</code>`,
                `Opacity: <code>${window.getComputedStyle(cat).opacity}</code>`,
                `BG Color: <code>${window.getComputedStyle(cat).backgroundColor}</code>`
            ]);
        }

        function highlightProducts() {
            clearResults();
            const prods = document.querySelector('.home-products');
            if (!prods) {
                resultsDiv.innerHTML = '<div class="debug-item"><strong>❌ Not Found:</strong> .home-products</div>';
                return;
            }

            prods.style.outline = '5px solid cyan';
            prods.style.outlineOffset = '10px';

            const rect = prods.getBoundingClientRect();
            addResult('🛍️ Products Section Info', [
                `Position: <code>top=${Math.round(rect.top)}, left=${Math.round(rect.left)}</code>`,
                `Size: <code>${Math.round(rect.width)}×${Math.round(rect.height)}</code>`,
                `Display: <code>${window.getComputedStyle(prods).display}</code>`,
                `Visibility: <code>${window.getComputedStyle(prods).visibility}</code>`,
                `Opacity: <code>${window.getComputedStyle(prods).opacity}</code>`,
                `BG Color: <code>${window.getComputedStyle(prods).backgroundColor}</code>`
            ]);
        }

        function inspectOverlaps() {
            clearResults();
            const results = [];

            // Get all potential overlays
            const selectors = ['.modal', '.overlay', '[role="dialog"]', '.backdrop', '[class*="popup"]'];
            let found = false;

            selectors.forEach(selector => {
                const els = document.querySelectorAll(selector);
                els.forEach(el => {
                    if (window.getComputedStyle(el).display !== 'none') {
                        results.push(
                            `<code>${selector}</code> → <code>${el.className}</code> ` +
                            `display=<code>${window.getComputedStyle(el).display}</code>`
                        );
                        found = true;
                    }
                });
            });

            if (!found) {
                results.push('✅ Nenhum modal/popup/overlay encontrado');
            }

            addResult('🔗 Modal/Popup/Overlay Elements', results);
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            console.log('Debug tool ready! Use buttons to inspect.');
        });
    </script>
</body>
</html>
