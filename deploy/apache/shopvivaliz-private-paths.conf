# Prevent the repository checkout from becoming a public source/data browser.
# Application routes and public assets remain available.
<Directory "/home/ubuntu/site-shopvivaliz">
    Options -Indexes
</Directory>

<IfModule mod_headers.c>
    Header always set Content-Security-Policy "frame-ancestors 'self'; object-src 'none'; base-uri 'self'"
</IfModule>

<LocationMatch "(?i)(?:^/(?:\.git|\.env(?:\.|$)|storage|logs|config|includes|\.claude|\.codex|\.github|\.githooks|\.vscode|\.tmp_shopvivaliz|\.agent-(?:heartbeats|status)|__pycache__|scripts|tests|test-results|deploy|docs|reports|scratch|tmp-gh-email-artifact|olist|automation|automations|autodev|core|dashboards|imports|kong|listings|medusa|migrations|planilhas|public_html|release-notes|tools|utils|CheckoutPageOptimizer)(?:/|$)|^/(?:tasks-queue|mcp-servers|package(?:-lock)?|composer(?:\.lock)?|pytest)\.(?:json|lock|ini)$|^/\.mcp\.json$|^/(?:AGENTS|Dockerfile|Makefile)(?:\.[^/]*)?$|\.(?:py|sh|ps1|md|ya?ml|toml|bak|backup)$)">
    Require all denied
</LocationMatch>

# Legacy diagnostics and maintenance scripts were historically committed below
# the document root. They can disclose environment state or mutate production
# and must only be executed from the command line.
<LocationMatch "(?i)(?:^/(?:debug|test|teste|check|gen-token)(?:[-_.][^/]*)?$|^/(?:setup-webhooks|update-fallback-prices)\.php$|^/sync(?:[-a-z0-9]*)?\.php$|^/api/(?:catalog/test-normalize\.php|(?:pagarme|melhorenvio|olist)/diagnostic(?:-full)?\.php|sync-cache-endpoint\.php|sync/full-sync\.php)$)">
    Require all denied
</LocationMatch>
