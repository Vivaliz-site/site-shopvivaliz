# Prevent the repository checkout from becoming a public source/data browser.
# Application routes and public assets remain available.
<LocationMatch "(?i)(?:^/(?:\.git|\.env(?:\.|$)|storage|logs|config|includes|\.claude|\.codex|\.github|\.agent-(?:heartbeats|status)|scripts|tests|deploy|docs|reports|scratch|tmp-gh-email-artifact)(?:/|$)|^/(?:tasks-queue|mcp-servers|package(?:-lock)?|composer(?:\.lock)?|pytest)\.(?:json|lock|ini)$|^/\.mcp\.json$|^/(?:AGENTS|Dockerfile|Makefile)(?:\.[^/]*)?$|\.(?:py|sh|ps1|md|ya?ml|toml|bak|backup)$)">
    Require all denied
</LocationMatch>
