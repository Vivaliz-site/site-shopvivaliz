version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: shopvivaliz-medusa-db
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa123
      POSTGRES_DB: shopvivaliz_medusa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
