version: '3.8'

services:
  # API Gateway (Kong) - Port 8000
  kong-migrations:
    image: kong:3.4-alpine
    container_name: shopvivaliz-kong-migrations
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    depends_on:
      - postgres
    command: kong migrations bootstrap
    restart: on-failure

  kong:
    image: kong:3.4-alpine
    container_name: shopvivaliz-kong
    ports:
      - "8000:8000"   # Proxy
      - "8443:8443"   # Proxy SSL
      - "8001:8001"   # Admin API
      - "8444:8444"   # Admin API SSL
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml
    depends_on:
      - postgres
      - kong-migrations
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Agent API - Port 5000 (interno, via Kong em 8000)
  agent-api:
    build: .
    container_name: shopvivaliz-agent-api
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-shopvivaliz-secret-key}
    volumes:
      - ./logs:/app/logs
      - ./shopvivaliz.db:/app/shopvivaliz.db
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MCP Server - Port 5555
  mcp-server:
    image: python:3.10-slim
    container_name: shopvivaliz-mcp-server
    ports:
      - "5555:5555"
    volumes:
      - ./scripts:/app/scripts
      - ./.claude:/app/.claude
    working_dir: /app
    command: python scripts/mcp-server.py --port 5555
    restart: unless-stopped
    depends_on:
      - agent-api

  # Prometheus - Port 9090
  prometheus:
    image: prom/prometheus:latest
    container_name: shopvivaliz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  # Grafana - Port 3000
  grafana:
    image: grafana/grafana:latest
    container_name: shopvivaliz-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=shopvivaliz123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboards/health-monitoring.json:/etc/grafana/provisioning/dashboards/health-monitoring.json
    depends_on:
      - prometheus
    restart: unless-stopped

  # Redis - Port 6379
  redis:
    image: redis:7-alpine
    container_name: shopvivaliz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PostgreSQL - Port 5432 (optional, for advanced storage)
  postgres:
    image: postgres:15-alpine
    container_name: shopvivaliz-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shopvivaliz
      POSTGRES_PASSWORD: shopvivaliz123
      POSTGRES_DB: shopvivaliz
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopvivaliz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  prometheus-data:
  grafana-data:
  redis-data:
  postgres-data:

networks:
  default:
    name: shopvivaliz-net
