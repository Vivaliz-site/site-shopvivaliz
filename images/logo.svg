<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Carrinho de Compras -->
  <g id="cart">
    <!-- Corpo do carrinho -->
    <path d="M 20 25 L 28 10 L 32 10 L 40 25 Z" fill="#4a5568" stroke="#2d3748" stroke-width="1.5"/>

    <!-- Alça do carrinho -->
    <path d="M 24 10 Q 30 5 36 10" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>

    <!-- Rodas -->
    <circle cx="24" cy="28" r="2" fill="#2d3748"/>
    <circle cx="36" cy="28" r="2" fill="#2d3748"/>
  </g>

  <!-- Checkmark -->
  <g id="checkmark">
    <path d="M 42 24 L 46 28 L 54 18" fill="none" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Texto VIVALIZ -->
  <text x="62" y="30" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#2d3748" letter-spacing="0.5">VIVALIZ</text>

  <!-- Linha decorativa -->
  <line x1="62" y1="36" x2="200" y2="36" stroke="#667eea" stroke-width="1" opacity="0.3"/>
</svg>
