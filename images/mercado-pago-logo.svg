  <path d="M50 80 Q40 70 35 60 Q45 65 60 70 Z" fill="#FFFFFF"/>
  <path d="M60 95 Q55 85 50 75 Q65 85 75 95 Z" fill="#FFFFFF"/>
  <path d="M70 110 Q70 95 68 85 Q80 95 85 110 Z" fill="#FFFFFF"/>
  <path d="M75 125 Q78 110 80 100 Q85 115 85 130 Z" fill="#FFFFFF"/>

