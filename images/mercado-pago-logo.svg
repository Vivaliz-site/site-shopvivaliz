  <rect x="180" y="155" width="25" height="18" rx="2" fill="#EB001B"/>
  <text x="187" y="166" font-size="8" fill="white" font-weight="bold" text-anchor="middle">MC</text>

  <rect x="210" y="155" width="25" height="18" rx="2" fill="#FF5F00"/>

  <rect x="240" y="155" width="25" height="18" rx="2" fill="#006FCF"/>

  <rect x="270" y="155" width="25" height="18" rx="2" fill="#0066B2"/>

  <rect x="300" y="155" width="25" height="18" rx="2" fill="#000000"/>
</svg>
