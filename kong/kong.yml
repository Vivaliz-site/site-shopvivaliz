_format_version: "3.0"
_transform: true

services:
  - name: shopvivaliz-api
    url: http://agent-api:5000
    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          hour: 10000
      - name: jwt
        config:
          secret_is_base64: false
          key_claim_name: kid
          cookie_names:
            - jwt
      - name: cors
        config:
          origins:
            - '*'
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Auth-Token
            - Authorization
          expose_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600

routes:
  - name: agents
    service: shopvivaliz-api
    paths:
      - /agents
    methods:
      - GET
      - POST
      - DELETE
    strip_path: false
    plugins:
      - name: request-size-limiting
        config:
          allowed_payload_size: 128

  - name: messages
    service: shopvivaliz-api
    paths:
      - /messages
    methods:
      - GET
      - POST
      - PUT
    strip_path: false
    plugins:
      - name: request-size-limiting
        config:
          allowed_payload_size: 256

  - name: events
    service: shopvivaliz-api
    paths:
      - /events
    methods:
      - POST
    strip_path: false

  - name: metrics
    service: shopvivaliz-api
    paths:
      - /metrics
    methods:
      - GET
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 300
          hour: 3000

  - name: health
    service: shopvivaliz-api
    paths:
      - /health
    methods:
      - GET
    strip_path: false

consumers:
  - username: claude-agent
    custom_id: claude-agent
    plugins:
      - name: rate-limiting
        config:
          minute: 500
          hour: 5000

  - username: gemini-agent
    custom_id: gemini-agent
    plugins:
      - name: rate-limiting
        config:
          minute: 500
          hour: 5000

  - username: gpt-agent
    custom_id: gpt-agent
    plugins:
      - name: rate-limiting
        config:
          minute: 500
          hour: 5000

  - username: monitoring
    custom_id: monitoring
    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          hour: 10000
