services:
  postgres:
    image: postgres:16-alpine
    container_name: shopvivaliz-medusa-postgres
    environment:
      POSTGRES_DB: shopvivaliz_medusa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - medusa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopvivaliz_medusa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopvivaliz-medusa-redis
    ports:
      - "6379:6379"
    volumes:
      - medusa_redis_data:/data

volumes:
  medusa_postgres_data:
  medusa_redis_data:
